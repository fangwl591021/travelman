<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程編輯器</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: sans-serif; color: #334155; }
    .input-ui { width: 100%; border-bottom: 1px solid #f1f5f9; padding: 10px 0; outline: none; transition: 0.2s; font-size: 15px; }
    .input-ui:focus { border-bottom-color: #174a5a; }
    .label-tag { font-size: 10px; font-weight: bold; color: #cbd5e1; margin-top: 15px; display: block; text-transform: uppercase; }
    section { margin-bottom: 50px; }
    .btn-preview { font-size: 10px; font-weight: bold; color: #174a5a; border: 1px solid #174a5a; padding: 2px 8px; border-radius: 4px; margin-left: 10px; }
  </style>
</head>
<body class="p-6 md:p-12 bg-white">
  <div id="app" class="max-w-2xl mx-auto">
    
    <!-- Step 1: Input -->
    <div v-if="step === 'input'">
      <h1 class="text-xl font-bold mb-8">行程上稿解析</h1>
      <textarea v-model="rawText" class="w-full h-80 border-0 bg-slate-50 rounded-xl p-6 text-sm outline-none focus:bg-white focus:ring-1 focus:ring-slate-200" placeholder="貼入 NotebookLM 內容..."></textarea>
      <button @click="parseDraft" :disabled="!rawText || loading" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold mt-8 transition-all active:scale-95 disabled:opacity-30">
        {{ loading ? 'GPT-4o 正在解析...' : '生成預覽編輯框架' }}
      </button>
    </div>

    <!-- Step 2: Edit -->
    <div v-if="step === 'edit'" class="pb-40">
      <section>
        <h2 class="text-sm font-bold text-slate-300 border-b pb-2 mb-4 uppercase tracking-widest">Basic Information</h2>
        <div><label class="label-tag">行程總標題</label><input v-model="course.title" class="input-ui !text-lg font-bold"></div>
        <div class="grid grid-cols-2 gap-10">
          <div><label class="label-tag">價格 (數字)</label><input v-model="course.price" type="number" class="input-ui text-red-500 font-bold"></div>
          <div><label class="label-tag">總天數</label><input v-model="course.days" type="number" class="input-ui font-bold"></div>
        </div>
        <div><label class="label-tag">簡介摘要</label><textarea v-model="course.desc" class="input-ui h-16 resize-none"></textarea></div>
      </section>

      <div v-for="(day, idx) in course.itinerary" :key="idx" class="relative pt-12 border-t mt-12">
        <div class="absolute top-0 left-0 text-slate-100 font-black text-6xl leading-none">0{{ idx + 1 }}</div>
        <div class="space-y-4 relative">
          <div><label class="label-tag">本日路線標題</label><input v-model="day.route" class="input-ui font-bold text-slate-800"></div>
          <div class="grid grid-cols-3 gap-4">
            <div><label class="label-tag">早</label><input v-model="day.b" class="input-ui text-xs"></div>
            <div><label class="label-tag">午</label><input v-model="day.l" class="input-ui text-xs"></div>
            <div><label class="label-tag">晚</label><input v-model="day.d" class="input-ui text-xs"></div>
          </div>
          <div><label class="label-tag">詳細行程內容</label><textarea v-model="day.infosStr" class="input-ui text-sm h-32 leading-relaxed resize-none"></textarea></div>
          <div><label class="label-tag">入住飯店</label><input v-model="day.hotel" class="input-ui text-sm"></div>
          
          <div class="pt-4 border-t mt-4">
            <div class="flex items-center justify-between">
              <label class="label-tag !mt-0">📸 AI 配圖關鍵字 (支援中文)</label>
              <button @click="previewImg(day.kw)" class="btn-preview">測試搜圖</button>
            </div>
            <input v-model="day.kw" class="input-ui text-sm font-bold text-[#174a5a]" placeholder="例如：張家界、澳門大三巴...">
          </div>
        </div>
      </div>

      <div class="fixed bottom-0 left-0 w-full p-6 bg-white/90 backdrop-blur-xl border-t flex gap-4 z-50">
        <button @click="step = 'input'" class="flex-1 text-slate-400 font-bold">重新解析</button>
        <button @click="saveCourse" :disabled="loading" class="flex-[3] bg-slate-900 text-white py-4 rounded-xl font-bold shadow-lg">
          {{ loading ? '正在儲存...' : '確認發布網站' }}
        </button>
      </div>
    </div>

    <!-- Step 3: Success -->
    <div v-if="step === 'success'" class="text-center py-32">
      <div class="text-5xl mb-8">✨</div>
      <h2 class="text-xl font-bold mb-4">發布成功</h2>
      <p class="text-slate-400 text-sm mb-12">您的精彩行程已儲存至雲端。</p>
      <button @click="openSite" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold mb-4">預覽正式網頁</button>
      <button @click="reset" class="text-slate-300 text-xs font-bold underline">處理下一份行程</button>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() { return { step: 'input', loading: false, rawText: '', course: {}, finalId: '' } },
      async mounted() {
        try {
          await liff.init({ liffId: "2008729640-bptxTkoO" });
          const id = new URLSearchParams(window.location.search).get('id');
          if (id) {
            const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/get-course?id=${id}`);
            const data = await res.json();
            this.course = { ...data, id };
            if (this.course.itinerary) {
              this.course.itinerary.forEach(d => d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''));
            }
            this.step = 'edit';
          }
        } catch (e) {}
      },
      methods: {
        async parseDraft() {
          this.loading = true;
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/parse-draft', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: this.rawText })
            });
            const data = await res.json();
            if (data.itinerary) {
              data.itinerary = data.itinerary.map(d => ({ ...d, infosStr: Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || '') }));
            }
            this.course = { ...this.course, ...data };
            this.step = 'edit';
          } catch (e) { alert("解析逾時"); }
          finally { this.loading = false; }
        },
        async saveCourse() {
          this.loading = true;
          if (this.course.itinerary) {
            this.course.itinerary.forEach(d => d.infos = d.infosStr.split('\n').filter(Boolean));
          }
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/save-course', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.course)
            });
            const result = await res.json();
            if (result.success) { this.finalId = result.id; this.step = 'success'; }
          } catch (e) { alert("儲存失敗"); }
          finally { this.loading = false; }
        },
        previewImg(kw) { window.open(`https://images.unsplash.com/featured/?${encodeURIComponent(kw)}`, '_blank'); },
        openSite() { if (this.finalId) window.open(`https://fangwl591021.github.io/travelman/travel_website.html?id=${this.finalId}`, '_blank'); },
        reset() { location.href = "index.html"; }
      }
    }).mount('#app');
  </script>
</body>
</html>
