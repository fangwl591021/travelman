<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travelman</title>
  <style>
    :root {
      --primary: #06c755;
      --primary-dark: #05a847;
      --primary-soft: #e9fff2;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --border: #d9dee5;
      --text: #222;
      --muted: #6b7280;
      --dark: #1f2937;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }

    .topbar {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }

    .brand-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .top-title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      margin: 0;
    }

    .top-sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      filter: brightness(0.98);
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-dark {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #f7fffb 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 16px;
      align-items: stretch;
    }

    .hero-left {
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .hero-small {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      color: var(--primary-dark);
      background: var(--primary-soft);
      border: 1px solid #c7f0d9;
      padding: 5px 10px;
      border-radius: 999px;
      width: fit-content;
    }

    .hero-title {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.25;
      margin: 0;
      word-break: break-word;
    }

    .hero-desc {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef2ff;
      color: #334155;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .hero-price {
      font-size: 36px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
    }

    .hero-right {
      min-height: 320px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #eceff3;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      min-height: 320px;
      object-fit: cover;
      display: block;
      background: #e5e7eb;
    }

    .section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0;
    }

    .section-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .trip-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      transition: 0.18s ease;
      display: flex;
      flex-direction: column;
    }

    .trip-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .trip-cover {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
      background: #e5e7eb;
    }

    .trip-body {
      padding: 14px;
      display: grid;
      gap: 10px;
      flex: 1;
    }

    .trip-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.45;
      word-break: break-word;
      min-height: 52px;
    }

    .trip-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .trip-desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      min-height: 50px;
    }

    .trip-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .trip-price {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
    }

    .list-wrap {
      display: grid;
      gap: 10px;
    }

    .list-item {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 14px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
    }

    .list-thumb {
      width: 120px;
      height: 84px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      background: #e5e7eb;
    }

    .list-main {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .list-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.4;
      word-break: break-word;
    }

    .list-desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .list-side {
      display: grid;
      gap: 8px;
      justify-items: end;
      text-align: right;
    }

    .list-price {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #fafbfc;
    }

    .status-box {
      background: #111827;
      color: #d1fae5;
      border-radius: 10px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.7;
      font-family: Consolas, Monaco, monospace;
      min-height: 80px;
      max-height: 180px;
      overflow: auto;
    }

    .footer-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding-top: 4px;
    }

    @media (max-width: 1024px) {
      .hero,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .list-item {
        grid-template-columns: 1fr;
      }

      .list-thumb {
        width: 100%;
        height: 180px;
      }

      .list-side {
        justify-items: start;
        text-align: left;
      }
    }

    @media (max-width: 768px) {
      .top-actions {
        width: 100%;
      }

      .top-actions .btn {
        flex: 1 1 100%;
      }

      .top-title {
        font-size: 24px;
      }

      .hero-title {
        font-size: 28px;
      }

      .hero-price {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div id="brandBadge" class="brand-badge">TravelKeeper</div>
        <h1 class="top-title">精選旅遊行程</h1>
        <div class="top-sub">簡單看、直接選、快速成交</div>
      </div>
      <div class="top-actions">
        <a id="btnAdmin" class="btn" href="./admin.html" target="_blank">後台上稿</a>
        <a id="btnDistributor" class="btn" href="./distributor-dashboard.html" target="_blank">分銷工作台</a>
        <button id="btnRefresh" class="btn btn-dark" type="button">刷新資料</button>
      </div>
    </div>

    <section class="hero">
      <div class="hero-left">
        <div class="hero-small">本週主打</div>
        <h2 id="heroTitle" class="hero-title">載入中...</h2>
        <div id="heroDesc" class="hero-desc">請稍候，系統正在讀取真實行程資料。</div>
        <div id="heroMeta" class="hero-meta"></div>
        <div id="heroPrice" class="hero-price">--</div>
        <div class="top-actions">
          <button id="btnHeroTrip" class="btn btn-primary" type="button">查看行程</button>
          <a id="btnHeroSuccess" class="btn" href="./success.html" target="_blank">成功頁</a>
        </div>
      </div>
      <div class="hero-right">
        <img id="heroImage" class="hero-image" src="https://picsum.photos/1200/800" alt="featured trip" />
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h3 class="section-title">精選行程</h3>
          <div class="section-sub">先看重點推薦，不先丟太多篩選條件</div>
        </div>
      </div>
      <div id="featuredGrid" class="grid-3">
        <div class="empty">載入中...</div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h3 class="section-title">更多行程</h3>
          <div class="section-sub">保留簡單列表，讓人容易往下挑選</div>
        </div>
      </div>
      <div id="tripList" class="list-wrap">
        <div class="empty">載入中...</div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h3 class="section-title">系統狀態</h3>
          <div class="section-sub">維持小區塊，不干擾主要畫面</div>
        </div>
      </div>
      <div id="statusBox" class="status-box">尚未初始化</div>
    </section>

    <div class="footer-note">
      Travelman 舊模型感首頁｜保留真實資料讀取與成交頁串接
    </div>
  </div>

  <script>
    const BASE = "https://travelkeeper-saas-worker.fangwl591021.workers.dev";
    const DEFAULT_TENANT = "t001";

    let tenantId = DEFAULT_TENANT;
    let tenantData = null;
    let itineraries = [];

    function logStatus(message, append = false) {
      const el = document.getElementById("statusBox");
      const stamp = "[" + new Date().toLocaleString("zh-Hant-TW") + "]";
      const line = stamp + " " + message;
      el.textContent = append ? (el.textContent + "\\n" + line) : line;
      el.scrollTop = el.scrollHeight;
    }

    function qs(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function formatNumber(n) {
      return Number(n || 0).toLocaleString();
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function apiGet(path) {
      return fetch(BASE + path).then(res => res.json());
    }

    function getTenantId() {
      const fromUrl = qs("tenantId");
      const fromStorage = localStorage.getItem("travelman_tenant_id") || localStorage.getItem("tk_tenant_id");
      tenantId = fromUrl || fromStorage || DEFAULT_TENANT;
      localStorage.setItem("travelman_tenant_id", tenantId);
      localStorage.setItem("tk_tenant_id", tenantId);
    }

    function updateLinks() {
      document.getElementById("btnAdmin").href = `./admin.html?tenantId=${encodeURIComponent(tenantId)}`;
      document.getElementById("btnDistributor").href = `./distributor-dashboard.html?tenantId=${encodeURIComponent(tenantId)}`;
      document.getElementById("btnHeroSuccess").href = `./success.html?tenantId=${encodeURIComponent(tenantId)}`;
    }

    function openTrip(itineraryId) {
      if (!itineraryId) return;
      const url = `./trip.html?tenantId=${encodeURIComponent(tenantId)}&it=${encodeURIComponent(itineraryId)}`;
      window.open(url, "_blank");
    }

    async function loadTenant() {
      logStatus(`讀取 Tenant：${tenantId}`);
      const res = await apiGet(`/api/public/tenant?tenantId=${encodeURIComponent(tenantId)}`);
      tenantData = res && res.data ? res.data.data : null;

      if (tenantData) {
        const brand = tenantData.brandName || "TravelKeeper";
        const color = tenantData.primaryColor || "#06c755";

        document.documentElement.style.setProperty("--primary", color);
        document.documentElement.style.setProperty("--primary-dark", color);
        document.documentElement.style.setProperty("--primary-soft", color + "1A");

        document.getElementById("brandBadge").textContent = brand;
        document.title = brand;
      } else {
        document.getElementById("brandBadge").textContent = tenantId;
      }

      logStatus("Tenant 載入完成", true);
    }

    async function loadItineraries() {
      const res = await apiGet(`/api/public/itineraries?tenantId=${encodeURIComponent(tenantId)}`);
      itineraries = res && res.data ? (res.data.items || []) : [];

      itineraries = itineraries.filter(item => {
        const status = String(item.status || "").toLowerCase();
        return status !== "inactive";
      });

      logStatus(`行程資料載入完成：${itineraries.length} 筆`, true);
    }

    function getFeaturedTrip() {
      if (!itineraries.length) return null;

      const published = itineraries.filter(it => String(it.status || "").toLowerCase() === "published");
      if (published.length) return published[0];
      return itineraries[0];
    }

    function renderHero() {
      const hero = getFeaturedTrip();

      if (!hero) {
        document.getElementById("heroTitle").textContent = "目前尚無可展示行程";
        document.getElementById("heroDesc").textContent = "請先到後台上稿，系統就會自動帶入真實行程。";
        document.getElementById("heroMeta").innerHTML = "";
        document.getElementById("heroPrice").textContent = "--";
        document.getElementById("heroImage").src = "https://picsum.photos/1200/800";
        document.getElementById("btnHeroTrip").onclick = null;
        return;
      }

      document.getElementById("heroTitle").textContent = hero.title || "未命名行程";
      document.getElementById("heroDesc").textContent =
        hero.description || hero.subtitle || "歡迎查看本週主打行程。";
      document.getElementById("heroPrice").textContent = "NT$ " + formatNumber(hero.price || 0);
      document.getElementById("heroImage").src = hero.coverImageUrl || "https://picsum.photos/1200/800";

      const meta = [];
      if (hero.region) meta.push("🧭 " + hero.region);
      if (hero.country) meta.push("🌍 " + hero.country);
      if (hero.city) meta.push("📍 " + hero.city);
      if (hero.days) meta.push("🗓️ " + hero.days + " 天");
      if (hero.departureDate) meta.push("✈️ " + hero.departureDate);

      document.getElementById("heroMeta").innerHTML = meta
        .map(item => `<span class="pill">${escapeHtml(item)}</span>`)
        .join("");

      document.getElementById("btnHeroTrip").onclick = () => openTrip(hero.itineraryId || "");
    }

    function renderFeaturedGrid() {
      const container = document.getElementById("featuredGrid");
      const list = itineraries.slice(0, 3);

      if (!list.length) {
        container.innerHTML = `<div class="empty">目前尚無精選行程</div>`;
        return;
      }

      container.innerHTML = list.map(it => {
        const meta = [];
        if (it.country) meta.push("🌍 " + it.country);
        if (it.city) meta.push("📍 " + it.city);
        if (it.days) meta.push("🗓️ " + it.days + " 天");

        return `
          <div class="trip-card">
            <img class="trip-cover" src="${it.coverImageUrl || "https://picsum.photos/600/400"}" alt="trip">
            <div class="trip-body">
              <div class="trip-title">${escapeHtml(it.title || "未命名行程")}</div>
              <div class="trip-meta">
                ${meta.map(item => `<span class="pill">${escapeHtml(item)}</span>`).join("")}
              </div>
              <div class="trip-desc">${escapeHtml((it.description || it.subtitle || "歡迎查看本行程").slice(0, 70))}</div>
              <div class="trip-bottom">
                <div class="trip-price">NT$ ${formatNumber(it.price || 0)}</div>
                <button class="btn btn-primary" type="button" onclick="openTrip('${String(it.itineraryId || "").replace(/'/g, "\\\\'")}')">查看行程</button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderTripList() {
      const container = document.getElementById("tripList");

      if (!itineraries.length) {
        container.innerHTML = `<div class="empty">目前尚無更多行程</div>`;
        return;
      }

      container.innerHTML = itineraries.map(it => {
        const meta = [];
        if (it.country) meta.push("🌍 " + it.country);
        if (it.city) meta.push("📍 " + it.city);
        if (it.days) meta.push("🗓️ " + it.days + " 天");
        if (it.departureDate) meta.push("✈️ " + it.departureDate);

        return `
          <div class="list-item">
            <img class="list-thumb" src="${it.coverImageUrl || "https://picsum.photos/400/300"}" alt="trip">
            <div class="list-main">
              <div class="list-title">${escapeHtml(it.title || "未命名行程")}</div>
              <div class="trip-meta">
                ${meta.map(item => `<span class="pill">${escapeHtml(item)}</span>`).join("")}
              </div>
              <div class="list-desc">${escapeHtml((it.description || it.subtitle || "歡迎查看本行程").slice(0, 120))}</div>
            </div>
            <div class="list-side">
              <div class="list-price">NT$ ${formatNumber(it.price || 0)}</div>
              <button class="btn btn-primary" type="button" onclick="openTrip('${String(it.itineraryId || "").replace(/'/g, "\\\\'")}')">查看行程</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function refreshAll() {
      logStatus("開始刷新資料...");
      try {
        await loadTenant();
        await loadItineraries();
        renderHero();
        renderFeaturedGrid();
        renderTripList();
        updateLinks();
        logStatus("首頁資料刷新完成", true);
      } catch (err) {
        logStatus("刷新失敗：" + (err.message || String(err)), true);
      }
    }

    function bindEvents() {
      document.getElementById("btnRefresh").addEventListener("click", refreshAll);
    }

    async function boot() {
      getTenantId();
      bindEvents();
      updateLinks();
      await refreshAll();
    }

    boot();
  </script>
</body>
</html>
