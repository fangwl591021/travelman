<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程上稿/編修台</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-[#f1f5f9] min-h-screen p-4">
  <div id="app" class="max-w-2xl mx-auto">
    
    <!-- Step 1: Input -->
    <div v-if="step === 'input'" class="bg-white rounded-[2rem] p-8 shadow-xl">
      <h1 class="text-2xl font-black text-[#174a5a] mb-6">🚀 {{ course.id ? '編修行程內容' : '智能上稿' }}</h1>
      <textarea v-model="rawText" class="w-full bg-slate-50 rounded-2xl p-6 h-80 outline-none border-2 border-transparent focus:border-[#174a5a]" placeholder="貼入文案..."></textarea>
      <button @click="parseDraft" :disabled="!rawText || loading" class="w-full mt-6 bg-[#174a5a] text-white py-5 rounded-2xl font-bold shadow-xl">
        {{ loading ? 'AI 正在處理中...' : '生成預覽編輯框架' }}
      </button>
      <div v-if="course.id" class="mt-4 text-center text-xs text-red-500 font-bold">提示：您正在編輯舊行程 {{ course.id }}</div>
    </div>

    <!-- Step 2: Edit -->
    <div v-if="step === 'edit'" class="pb-32 space-y-4">
      <div class="bg-white p-8 rounded-[2rem] shadow-xl">
        <h2 class="font-bold text-slate-800 mb-6">基本資訊校對</h2>
        <div class="space-y-4">
          <input v-model="course.title" class="w-full bg-slate-50 p-4 rounded-xl font-bold border-2 border-transparent" placeholder="行程標題">
          <div class="grid grid-cols-2 gap-4">
            <input v-model="course.price" type="number" class="w-full bg-slate-50 p-4 rounded-xl text-red-500 font-black">
            <input v-model="course.days" type="number" class="w-full bg-slate-50 p-4 rounded-xl font-bold">
          </div>
        </div>
      </div>

      <div v-for="(day, idx) in course.itinerary" :key="idx" class="bg-white p-8 rounded-[2rem] shadow-xl relative">
        <div class="absolute top-0 left-0 bg-slate-900 text-white px-4 py-1 text-[10px] font-black rounded-br-2xl">DAY 0{{ idx + 1 }}</div>
        <div class="mt-4 space-y-4">
          <input v-model="day.route" class="w-full bg-slate-50 p-3 rounded-xl font-bold text-slate-700">
          <textarea v-model="day.infosStr" class="w-full bg-slate-50 p-3 rounded-xl text-xs h-24"></textarea>
          <div class="flex items-center gap-2 bg-teal-50 p-3 rounded-xl">
            <span class="text-[10px] font-bold text-teal-600">配圖關鍵字:</span>
            <input v-model="day.kw" class="flex-1 bg-transparent text-xs font-mono outline-none">
          </div>
        </div>
      </div>

      <div class="fixed bottom-0 left-0 w-full p-6 bg-white/90 backdrop-blur-md border-t flex gap-4 z-50">
        <button @click="step = 'input'" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold">重新解析</button>
        <button @click="saveCourse" :disabled="loading" class="flex-[2] bg-[#174a5a] text-white py-4 rounded-2xl font-black shadow-xl">
          {{ loading ? '正在儲存...' : '確認發布' }}
        </button>
      </div>
    </div>

    <!-- Step 3: Success -->
    <div v-if="step === 'success'" class="bg-white rounded-[3rem] p-16 text-center shadow-2xl">
      <div class="text-6xl mb-6">✅</div>
      <h2 class="text-2xl font-black mb-10 text-slate-800">行程已成功更新！</h2>
      <button @click="openSite" class="w-full bg-[#174a5a] text-white py-5 rounded-2xl font-bold shadow-xl mb-4">預覽行程網站</button>
      <button @click="reset" class="text-slate-400 font-bold underline">處理下一份</button>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() { return { step: 'input', loading: false, rawText: '', course: {}, finalId: '' } },
      async mounted() {
        await liff.init({ liffId: "2008729640-bptxTkoO" });
        // 檢查網址是否有 ID，如果有代表是「編修模式」
        const id = new URLSearchParams(window.location.search).get('id');
        if (id) {
          const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/get-course?id=${id}`);
          const data = await res.json();
          this.course = { ...data, id }; // 保留 ID 以進行覆蓋存儲
          this.step = 'edit';
          this.course.itinerary.forEach(d => { d.infosStr = (d.infos || []).join('\n'); });
        }
      },
      methods: {
        async parseDraft() {
          this.loading = true;
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/parse-draft', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: this.rawText })
            });
            const data = await res.json();
            data.itinerary = (data.itinerary || []).map(d => ({ ...d, infosStr: (d.infos || []).join('\n') }));
            this.course = { ...this.course, ...data };
            this.step = 'edit';
          } catch (e) { alert("AI 解析失敗"); }
          finally { this.loading = false; }
        },
        async saveCourse() {
          this.loading = true;
          this.course.itinerary.forEach(d => { d.infos = d.infosStr.split('\n').filter(Boolean); });
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/save-course', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.course)
            });
            const result = await res.json();
            if (result.success) { this.finalId = result.id; this.step = 'success'; }
          } catch (e) { alert("儲存失敗"); }
          finally { this.loading = false; }
        },
        openSite() { window.open(`https://fangwl591021.github.io/travelman/travel_website.html?id=${this.finalId}`, '_blank'); },
        reset() { location.href = "index.html"; }
      }
    }).mount('#app');
  </script>
</body>
</html>
