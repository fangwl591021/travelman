<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程上稿工作台</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: 'PingFang TC', sans-serif; background-color: #f1f5f9; }
    .editor-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 1rem; }
    .input-flat { width: 100%; background: #f8fafc; border-radius: 0.75rem; padding: 0.75rem; outline: none; border: 1px solid transparent; font-size: 0.875rem; }
    .input-flat:focus { border-color: #174a5a; background: white; }
  </style>
</head>
<body class="p-4">
  <div id="app" class="max-w-xl mx-auto">
    
    <!-- 階段 1: 輸入文案 -->
    <div v-if="step === 'input'" class="editor-card p-6">
      <h1 class="text-xl font-black text-[#174a5a] mb-4">🚀 行程文案貼入</h1>
      <textarea v-model="rawText" class="input-flat h-96 mb-4 text-sm leading-relaxed" placeholder="在此貼入 NotebookLM 行程文字..."></textarea>
      <button @click="parseDraft" :disabled="!rawText || loading" class="w-full bg-[#174a5a] text-white py-4 rounded-xl font-bold transition-all active:scale-95 disabled:opacity-50">
        {{ loading ? 'AI 正在極速拆解中 (約10-20秒)...' : '生成預覽編輯框架' }}
      </button>
    </div>

    <!-- 階段 2: 編輯預覽 -->
    <div v-if="step === 'edit'" class="pb-24 space-y-4">
      <div class="editor-card p-6">
        <h2 class="font-bold text-slate-800 mb-4">基本資訊</h2>
        <div class="space-y-3">
          <input v-model="course.title" class="input-flat font-bold" placeholder="行程標題">
          <div class="grid grid-cols-2 gap-3">
            <input v-model="course.price" type="number" class="input-flat text-red-500 font-bold" placeholder="價格">
            <input v-model="course.days" type="number" class="input-flat" placeholder="天數">
          </div>
        </div>
      </div>

      <div v-for="(day, idx) in course.itinerary" :key="idx" class="editor-card p-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 bg-slate-900 text-white px-3 py-1 text-[10px] font-black">DAY 0{{ idx + 1 }}</div>
        <div class="mt-4 space-y-3">
          <input v-model="day.route" class="input-flat font-bold text-slate-700">
          <div class="grid grid-cols-3 gap-2">
            <input v-model="day.b" placeholder="早" class="input-flat text-xs p-2 text-center">
            <input v-model="day.l" placeholder="午" class="input-flat text-xs p-2 text-center">
            <input v-model="day.d" placeholder="晚" class="input-flat text-xs p-2 text-center">
          </div>
          <textarea v-model="day.infosStr" class="input-flat text-xs h-24" placeholder="詳細內容..."></textarea>
          <input v-model="day.hotel" placeholder="住宿飯店" class="input-flat text-xs">
          <div class="flex items-center gap-2 bg-teal-50 p-2 rounded-lg">
            <span class="text-[10px] font-bold text-teal-600">配圖:</span>
            <input v-model="day.kw" class="flex-1 bg-transparent border-none text-xs font-mono outline-none">
          </div>
        </div>
      </div>

      <div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-md border-t flex gap-3 z-50">
        <button @click="step = 'input'" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold">重新解析</button>
        <button @click="saveCourse" :disabled="loading" class="flex-[2] bg-[#174a5a] text-white py-3 rounded-xl font-bold shadow-lg">
          {{ loading ? '儲存中...' : '確認發布網站' }}
        </button>
      </div>
    </div>

    <!-- 階段 3: 成功 -->
    <div v-if="step === 'success'" class="editor-card p-10 text-center">
      <div class="text-5xl mb-4">✨</div>
      <h2 class="text-xl font-black mb-6">行程已存入雲端！</h2>
      <button @click="openSite" class="w-full bg-[#174a5a] text-white py-4 rounded-xl font-bold mb-3 shadow-lg">立即預覽網頁</button>
      <button @click="step = 'input'" class="text-slate-400 text-sm underline">繼續下一份行程</button>
    </div>

  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() { return { step: 'input', loading: false, rawText: '', course: {}, finalId: '' } },
      async mounted() { try { await liff.init({ liffId: "2008729640-bptxTkoO" }); } catch(e){} },
      methods: {
        async parseDraft() {
          this.loading = true;
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/parse-draft', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: this.rawText })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            data.itinerary = (data.itinerary || []).map(d => ({ ...d, infosStr: (d.infos || []).join('\n') }));
            this.course = data;
            this.step = 'edit';
          } catch (e) { alert(e.message); }
          finally { this.loading = false; }
        },
        async saveCourse() {
          this.loading = true;
          this.course.itinerary.forEach(d => { d.infos = d.infosStr.split('\n').filter(Boolean); });
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/save-course', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.course)
            });
            const result = await res.json();
            if (result.success) { this.finalId = result.id; this.step = 'success'; }
            else { alert("儲存失敗：" + result.msg); }
          } catch (e) { alert("連線超時，但資料可能已寫入，請查看 KV 或列表頁。"); }
          finally { this.loading = false; }
        },
        openSite() { window.open(`https://fangwl591021.github.io/travelman/travel_website.html?id=${this.finalId}`, '_blank'); }
      }
    }).mount('#app');
  </script>
</body>
</html>
