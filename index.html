<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行管家 - 全功能中控台 (WEB1-v1.7)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* WEB1-v1.7 字體統大法：全站強制 18px */
    body { font-family: -apple-system, sans-serif; color: #333; background: #fff; font-size: 18px; line-height: 1.5; }
    .header { height: 60px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 500; }
    .nav-link { font-size: 18px; color: #666; text-decoration: none; margin-left: 25px; cursor: pointer; }
    .nav-link.active { color: #06c755; border-bottom: 2px solid #06c755; padding-bottom: 5px; }
    .sidebar { width: 220px; border-right: 1px solid #e5e7eb; height: calc(100vh - 60px); position: fixed; left: 0; top: 60px; background: #f9fafb; z-index: 400; transition: 0.3s; }
    .main-content { margin-left: 220px; margin-top: 60px; padding: 40px; }
    .form-input { width: 100%; border: none; border-bottom: 1px solid #f0f0f0; padding: 12px 0; font-size: 18px; outline: none; background: transparent; }
    .form-input:focus { border-bottom-color: #06c755; }
    .item-row { border-bottom: 1px solid #f3f4f6; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; }
    .btn-action { background: #febb02; color: #111; padding: 16px; border-radius: 4px; font-size: 18px; width: 100%; cursor: pointer; border: none; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 999; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #999; }
    .region-tag { color: #06c755; margin-right: 10px; font-size: 18px; }
  </style>
</head>
<body>
  <div id="app">
    <div v-if="loading" class="loading-overlay">雲端資料庫連線中...</div>
    
    <header class="header">
        <div class="flex items-center">
            <div class="text-[#06c755] font-normal tracking-tighter">旅遊管家</div>
            <nav class="hidden md:flex">
                <a @click="view = 'list'" :class="['nav-link', view === 'list' ? 'active' : '']">找行程</a>
                <a @click="view = 'parse'" :class="['nav-link', view === 'parse' || view === 'edit' ? 'active' : '']">智能上稿</a>
            </nav>
        </div>
    </header>

    <aside class="sidebar">
        <div class="p-6 border-b">Dashboard</div>
        <nav>
            <a @click="view = 'list'" :class="['p-5 block border-b', view === 'list' ? 'bg-white text-[#06c755]' : '']"><i class="fa-solid fa-list-ul mr-3"></i>行程管理清單</a>
            <a @click="view = 'parse'" :class="['p-5 block border-b', view === 'parse' || view === 'edit' ? 'bg-white text-[#06c755]' : '']"><i class="fa-solid fa-wand-magic-sparkles mr-3"></i>AI 智能解析</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="max-w-4xl mx-auto">
            <!-- 1. 清單 -->
            <div v-if="view === 'list'">
                <div class="flex justify-between items-end mb-8 pb-4 border-b"><h2>已發布項目清單</h2><button @click="view = 'parse'" class="text-[#06c755] underline">新增項目</button></div>
                <div v-for="c in courses" :key="c.id" class="item-row">
                    <div class="flex-1">
                        <div class="text-[#bbb] font-mono">{{ c.id }}</div>
                        <div class="py-2"><span class="region-tag">[{{ c.region || '未分類' }}]</span>{{ c.title }}</div>
                        <div class="text-slate-400">{{ c.days }} DAYS ｜ <span class="text-red-500">NT$ {{ formatPrice(c.price) }}</span></div>
                    </div>
                    <div class="flex gap-6 text-[#003b95]"><a :href="'https://fangwl591021.github.io/travelman/travel_website.html?id=' + c.id" target="_blank" class="underline">預覽</a><span @click="loadEdit(c.id)" class="cursor-pointer underline">編輯</span><span @click="deleteItem(c.id)" class="text-red-300 cursor-pointer underline">刪除</span></div>
                </div>
            </div>

            <!-- 2. 解析 -->
            <div v-if="view === 'parse'">
                <div class="mb-8 font-normal pb-4 border-b">智能解析行程文案</div>
                <div class="flex border-b mb-8"><div @click="inputType='text'" :class="['p-3 cursor-pointer mr-6', inputType==='text' ? 'text-[#06c755] border-b-2 border-[#06c755]' : 'text-slate-400']">文字解析</div></div>
                <textarea v-model="rawText" class="w-full h-80 border-none p-4 bg-slate-50 outline-none font-normal" placeholder="貼入說明..."></textarea>
                <button @click="startParsing" :disabled="loading" class="btn-action mt-10">開始 AI 分類與解析</button>
            </div>

            <!-- 3. 編輯 -->
            <div v-if="view === 'edit'" class="pb-32">
                <div class="mb-10 pb-3 border-b">行程校對 (100% 資料補全)</div>
                <section class="mb-12">
                    <div class="mb-6"><label class="text-[#94a3b8]">地區分類 (AI 自動偵測)</label>
                        <select v-model="course.region" class="form-input">
                            <option v-for="r in ['亞洲','歐洲','美洲','大洋洲','非洲','中東','南極']" :value="r">{{r}}</option>
                        </select>
                    </div>
                    <div><label class="text-[#94a3b8]">行程總標題</label><input v-model="course.title" class="form-input"></div>
                    <div class="grid grid-cols-2 gap-8 mt-6"><div><label class="text-[#94a3b8]">報價</label><input v-model="course.price" type="number" class="form-input text-red-600"></div><div><label class="text-[#94a3b8]">天數</label><input v-model="course.days" type="number" class="form-input"></div></div>
                </section>
                <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t flex justify-center z-50"><button @click="saveCourse" :disabled="loading" class="bg-[#06c755] text-white w-full max-w-lg py-4 rounded">確認儲存並發佈</button></div>
            </div>
        </div>
    </main>
  </div>
  <script>
    const { createApp } = Vue; const API_BASE = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev';
    createApp({
      data() { return { view: 'list', inputType: 'text', loading: false, courses: [], rawText: '', course: { itinerary: [] } } },
      async mounted() { this.fetchList(); },
      methods: {
        formatPrice(p) { return isNaN(Number(p)) ? (p||'0') : Number(p).toLocaleString(); },
        async fetchList() { try { const res = await fetch(`${API_BASE}/api/courses`); this.courses = await res.json(); } catch (e) {} },
        async loadEdit(id) { this.loading = true; try { const res = await fetch(`${API_BASE}/api/get-course?id=${id}`); const data = await res.json(); this.course = { ...data, id }; this.view = 'edit'; } finally { this.loading = false; } },
        async deleteItem(id) { if(!confirm('確認刪除？')) return; await fetch(`${API_BASE}/api/delete-course?id=${id}`, { method: 'POST' }); this.fetchList(); },
        async startParsing() {
          this.loading = true;
          try {
            const res = await fetch(`${API_BASE}/api/parse-draft`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: this.rawText }) });
            this.course = await res.json(); this.view = 'edit';
          } catch (e) { alert("解析失敗"); } finally { this.loading = false; }
        },
        async saveCourse() {
          this.loading = true;
          try { await fetch(`${API_BASE}/api/save-course`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.course) }); alert('發佈成功！'); this.fetchList(); this.view = 'list'; } finally { this.loading = false; }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
