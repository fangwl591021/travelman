                    <thead><tr className="bg-gray-50 border-b border-gray-200"><th className="p-5 font-bold text-gray-500 text-sm">註冊日期</th><th className="p-5 font-bold text-gray-500 text-sm">會員暱稱</th><th className="p-5 font-bold text-gray-500 text-sm">聯絡電話</th><th className="p-5 font-bold text-gray-500 text-sm">推薦來源</th></tr></thead>
                    <tbody className="divide-y divide-gray-100">
                      {crmUsers.length === 0 ? <tr><td colSpan="4" className="p-12 text-center text-gray-400 font-bold text-xl">尚無資料</td></tr> :
                       crmUsers.map(user => { const refDist = crmDistributors.find(d => String(d.uid) === String(user.referredBy)); return (<tr key={user.uid} className="hover:bg-purple-50/30 transition-colors"><td className="p-5 text-sm text-gray-500">{user.joinDate ? String(user.joinDate).substring(0,10) : ''}</td><td className="p-5 font-bold text-gray-800 text-lg">{user.name}</td><td className="p-5 text-sm text-gray-800">{formatPhone(user.phone)}</td><td className="p-5">{refDist ? <span className="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg flex items-center w-fit"><Briefcase className="w-3 h-3 mr-1" /> 經銷商: {refDist.name}</span> : <span className="text-xs text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg flex items-center w-fit">🌱 自然流量</span>}</td></tr>); })}
                    </tbody>
                  </table></div>
                ) : (
                  <div className="flex flex-col h-full">
                    <div className="bg-gray-50 px-5 py-4 border-b border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4">
                      <span className="font-bold text-gray-700 flex items-center">總覽篩選結果 <span className="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-xs ml-3">{filteredCrmOrders.length} 筆</span></span>
                      <div className="flex gap-2 w-full md:w-auto">
                        <select value={crmOrderSearchMonth} onChange={e=>setCrmOrderSearchMonth(e.target.value)} className="rounded-lg border-gray-300 border p-2 text-sm outline-none"><option value="">所有月份</option>{crmOrderMonths.map(m=><option key={m} value={m}>{m}</option>)}</select>
                        <input type="text" value={crmOrderSearchKeyword} onChange={e=>setCrmOrderSearchKeyword(e.target.value)} placeholder="搜尋單號/行程/客戶/電話..." className="rounded-lg border-gray-300 border p-2 text-sm outline-none flex-1 min-w-[200px]" />
                      </div>
                    </div>
                    <div className="overflow-x-auto overflow-y-auto max-h-[800px] custom-scrollbar flex-1"><table className="w-full text-left border-collapse min-w-[1200px]">
                      <thead className="sticky top-0 shadow-sm"><tr className="bg-gray-50 border-b border-gray-200"><th className="p-5 font-bold text-gray-500 text-sm w-48">訂單日期 / 編號</th><th className="p-5 font-bold text-gray-500 text-sm">行程名稱</th><th className="p-5 font-bold text-gray-500 text-sm">報名人資訊</th><th className="p-5 font-bold text-gray-500 text-sm text-right">銷售總額 / 分潤</th><th className="p-5 font-bold text-gray-500 text-sm text-center">付款與訂單狀態 (可修改)</th></tr></thead>
                      <tbody className="divide-y divide-gray-100">
                        {filteredCrmOrders.length === 0 ? <tr><td colSpan="5" className="p-12 text-center text-gray-400 font-bold text-xl">查無符合的訂單資料</td></tr> :
                         filteredCrmOrders.map(order => {
                          const refDist = crmDistributors.find(d => String(d.uid) === String(order.ref_uid));
                          return (
                            <tr key={order.orderId} className="hover:bg-purple-50/20 transition-colors">
                              <td className="p-5"><p className="text-sm text-gray-600 font-bold">{order.orderDate ? String(order.orderDate).substring(0,10) : ''}</p><p className="font-mono text-xs text-gray-400 mt-1">#{order.orderId}</p></td>
                              <td className="p-5"><p className="font-bold text-gray-900 text-lg mb-2">{order.tourTitle}</p>{refDist ? <span className="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded flex items-center w-fit"><Briefcase className="w-3 h-3 mr-1" /> 推: {refDist.name}</span> : <span className="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded flex items-center w-fit">🌱 自來客</span>}</td>
                              <td className="p-5"><p className="font-bold text-gray-800 flex items-center"><UserIcon className="w-4 h-4 mr-1 text-gray-400"/> {order.contactName} <span className="text-sm font-normal text-red-600 ml-1 bg-red-50 px-1.5 rounded">({order.pax}人)</span></p><p className="text-sm text-gray-600 mt-1 flex items-center"><Smartphone className="w-4 h-4 mr-1 text-gray-400"/> {formatPhone(order.contactPhone)}</p>{order.note && <p className="text-xs text-gray-500 mt-2 bg-yellow-50 p-1.5 rounded truncate max-w-[200px]" title={order.note}>備註: {order.note}</p>}</td>
                              <td className="p-5 text-right bg-gray-50/50"><p className="font-black text-[#b82337] text-xl">${Number(order.totalAmount).toLocaleString()}</p>{Number(order.commissionAmount) > 0 && <p className="text-xs text-emerald-600 font-bold mt-1">分潤: ${Number(order.commissionAmount).toLocaleString()}</p>}</td>
                              <td className="p-5 text-center">
                                <div className="flex flex-col gap-2 items-center">
                                  <select value={order.paymentStatus||'未付款'} onChange={(e) => handleUpdateOrder(order.orderId,'paymentStatus',e.target.value)} className={`crm-select text-xs font-bold px-3 py-1.5 rounded-lg border outline-none cursor-pointer w-32 text-center transition-colors ${order.paymentStatus === '已付款' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100'}`}>
                                    <option value="未付款">❌ 未付款</option><option value="已付款">✅ 已付款</option><option value="已退款">退款完成</option>
                                  </select>
                                  <select value={order.orderStatus||'處理中'} onChange={(e) => handleUpdateOrder(order.orderId,'orderStatus',e.target.value)} className={`crm-select text-xs font-bold px-3 py-1.5 rounded-lg border outline-none cursor-pointer w-32 text-center transition-colors ${order.orderStatus === '已確認' || order.orderStatus === '已出發' || order.orderStatus === '已完成' ? 'bg-blue-50 text-blue-700 border-blue-200' : order.orderStatus === '已取消' ? 'bg-gray-100 text-gray-600 border-gray-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>
                                    <option value="處理中">處理中</option><option value="已確認">📌 已確認保位</option><option value="已出發">✈️ 已出發</option><option value="已完成">🎉 已完成</option><option value="已取消">🚫 已取消</option>
                                  </select>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table></div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // ── ADMIN EDITOR TAB ──────────────────────────────────────────────────
      const renderAdminEditorTab = () => {
        if (!isAdmin) return <div className="p-20 text-center text-gray-500 font-bold text-2xl">無權限存取</div>;
        return (
          <div className="w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12 py-8 animate-fade-in pb-20">

                  </div>

        const uid = liffProfile?.userId || '';

          const kw = promoSearchKw.toLowerCase();

          { key:'map',     label:'📍 門市導航',   val:myDistributorData?.mapLink },

        const copySingleUrl = (type) => {
          if (!flexModalItem) return;
          const optsStr = ['phone','line','lineAt','fb','web','map'].map(k => cardOptions[k]?'1':'0').join('');

          if (type==='web')   url = ENDPOINT_URL + '?t=' + flexModalItem.id + '&r=' + uid;

          if (type==='share') url = 'https://liff.line.me/' + LIFF_ID + '?action=share&t=' + flexModalItem.id + '&r=' + uid + '&o=' + optsStr;
          if (!navigator.clipboard) { fallbackCopy(url); return; }
          navigator.clipboard.writeText(url).then(() => showToast('✅ 連結已複製！')).catch(() => fallbackCopy(url));
        };

        const sendSinglePicker = async () => {
          if (!flexModalItem || !liffProfile) return;
          const optsStr = ['phone','line','lineAt','fb','web','map'].map(k => cardOptions[k]?'1':'0').join('');
          const opts = { phone:optsStr[0]==='1', line:optsStr[1]==='1', lineAt:optsStr[2]==='1', fb:optsStr[3]==='1', web:optsStr[4]==='1', map:optsStr[5]==='1' };
          const msg = buildFlexMessage(flexModalItem, myDistributorData||{}, uid, opts);
          try { await liff.shareTargetPicker([msg]); showToast('✅ 已分享！'); }
          catch(e) {
            const url = 'https://liff.line.me/' + LIFF_ID + '?action=share&t=' + flexModalItem.id + '&r=' + uid + '&o=' + optsStr;
            if (!navigator.clipboard) { fallbackCopy(url); return; }
            navigator.clipboard.writeText(url).then(()=>showToast('✅ 已複製分享連結！')).catch(()=>fallbackCopy(url));
          }
        };

        const sendMultiPicker = async () => {
          if (!multiItems.length) return;
          const flex = buildV3Flex(multiItems);
          const msg  = { type:'flex', altText:'精選 ' + multiItems.length + ' 個推薦行程', contents: flex.contents };
          try { await liff.shareTargetPicker([msg]); setDistSelectedIds(new Set()); showToast('✅ 推廣卡片已發送！'); }
          catch(e) {
            const txt = JSON.stringify(msg, null, 2);
            if (!navigator.clipboard) { fallbackCopy(txt); return; }
            navigator.clipboard.writeText(txt).then(()=>showToast('✅ 已複製 Flex JSON！')).catch(()=>fallbackCopy(txt));
          }
        };

        const copyMultiJson = () => {
          if (!multiItems.length) return;
          const flex = buildV3Flex(multiItems);
          const txt  = JSON.stringify(flex, null, 2);
          if (!navigator.clipboard) { fallbackCopy(txt); return; }
          navigator.clipboard.writeText(txt).then(()=>showToast('✅ Flex JSON 已複製！')).catch(()=>fallbackCopy(txt));
        };

        // 右側面板 JSX（直接內嵌，不用子 component 避免 React unmount 問題）
        const rightPanel = distCardMode === 'single' ? (
          !flexModalItem ? (
            <div className="flex flex-col items-center justify-center h-full text-center px-8">

                        {Object.entries(multiSocOpts).filter(([,v])=>v).map(([k])=>(
                          <img key={k} src={SOC_ICONS_MAP[k]||''} className="w-4 h-4 object-contain" />
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                {/* 操作 */}
                <div className="px-4 pb-3 pt-1 space-y-2">
                  <button onClick={copyMultiJson}   className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-bold py-2.5 rounded-xl transition">📋 複製 Flex JSON（貼到 LINE OA）</button>
                  <button onClick={sendMultiPicker} className="w-full bg-[#00B900] hover:bg-[#009900] text-white text-xs font-bold py-2.5 rounded-xl flex items-center justify-center gap-1.5 transition">
                    <Share2 className="w-3.5 h-3.5" /> 立即分享給好友（喚起通訊錄）
                  </button>
                </div>
              </div>
            )}
          </div>
        );

        return (
          <div className="fixed inset-0 z-[90] bg-white flex flex-col animate-fade-in">
            <div className="bg-white w-full flex flex-col" style={{height:'100%'}}>
              {/* Header */}
              <div className="flex-shrink-0 bg-white border-b border-gray-200 shadow-sm px-4 sm:px-6 h-14 flex items-center justify-between gap-3">
                <div className="flex items-center gap-3 min-w-0">
                  <Share2 className="w-5 h-5 text-emerald-600 flex-shrink-0" />
                  <span className="font-black text-gray-800 text-base">推廣工具</span>
                  <div className="flex bg-gray-100 rounded-lg p-0.5 ml-2">
                    <button onClick={() => { setDistCardMode('single'); setDistSelectedIds(new Set()); }}
                      className={'px-3 py-1.5 rounded-md text-xs font-black transition-all ' + (distCardMode==='single' ? 'bg-red-600 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700')}>
                      單張名片
                    </button>
                    <button onClick={() => { setDistCardMode('multi'); setFlexModalItem(null); }}
                      className={'px-3 py-1.5 rounded-md text-xs font-black transition-all ' + (distCardMode==='multi' ? 'bg-emerald-500 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700')}>
                      多頁列表
                    </button>
                  </div>
                  <span className="text-xs text-gray-400 hidden sm:block">
                    {distCardMode==='single' ? '點擊行程卡片即可建立名片' : '勾選多個行程合併成一張名片'}
                  </span>
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  {distCardMode==='multi' && distSelectedIds.size > 0 && (
                    <span className="text-xs bg-emerald-100 text-emerald-700 font-black px-2.5 py-1 rounded-full">已選 {distSelectedIds.size} 個</span>
                  )}
                  <button onClick={() => { setPromoToolOpen(false); setFlexModalItem(null); setDistSelectedIds(new Set()); }}
                    className="w-8 h-8 rounded-full bg-red-600 hover:bg-red-700 flex items-center justify-center text-white transition shadow-sm">
                    <X className="w-4 h-4" />
                  </button>
                </div>
              </div>
              {/* 搜尋列 */}
              <div className="flex-shrink-0 bg-gray-50 border-b border-gray-100 px-4 sm:px-6 py-2.5 flex gap-2">
                <div className="relative flex-1">
                  <Search className="absolute left-3 top-2.5 w-3.5 h-3.5 text-gray-400" />
                  <input type="text" value={promoSearchKw} onChange={e=>setPromoSearchKw(e.target.value)}
                    placeholder="搜尋行程名稱…"
                    className="w-full pl-8 pr-3 py-2 text-sm bg-white border border-gray-200 rounded-lg outline-none focus:border-emerald-400 transition" />
                </div>
                <select value={promoSearchRegion} onChange={e=>setPromoSearchRegion(e.target.value)}
                  className="text-sm bg-white border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-emerald-400 transition">
                  <option value="">全部地區</option>
                  <option value="國旅">國旅</option><option value="亞洲">亞洲</option>
                  <option value="歐洲">歐洲</option><option value="美洲">美洲</option>
                  <option value="大洋洲">大洋洲</option><option value="非洲">非洲</option>
                </select>
              </div>
              {/* 主體 */}
              <div className="flex flex-1 overflow-hidden">
                {/* 左：卡片 (60%) */}
                <div className="overflow-y-auto p-4 sm:p-5" style={{flex:'0 0 60%',minWidth:0}}>
                  <p className="text-xs text-gray-400 font-bold mb-3">共 {promoFiltered.length} 個行程</p>
                  <div className="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    {promoFiltered.map(item => {
                      const isSel     = distCardMode==='multi' && distSelectedIds.has(String(item.id));
                      const isCurrent = distCardMode==='single' && flexModalItem && String(flexModalItem.id)===String(item.id);
                      return (
                        <div key={item.id}
                          onClick={() => {
                            if (distCardMode==='single') {
                              setFlexModalItem(item);
                            } else {
                              const sid = String(item.id);
                              setDistSelectedIds(prev => {
                                const next = new Set(prev);
                                if (next.has(sid)) { next.delete(sid); }
                                else if (next.size < 8) { next.add(sid); }
                                else { showToast('最多只能選 8 個行程'); }
                                return next;
                              });
                            }
                          }}
                          className={'relative bg-white border-2 rounded-xl overflow-hidden cursor-pointer transition-all ' +
                            (isCurrent ? 'border-red-500 shadow-lg ring-2 ring-red-200' :
                             isSel     ? 'border-emerald-500 shadow-md ring-2 ring-emerald-100' :
                             'border-gray-200 hover:border-gray-400 hover:shadow-md')}>
                          {distCardMode==='multi' && (
                            <div className={'absolute top-2 left-2 z-10 w-5 h-5 rounded-md border-2 flex items-center justify-center transition ' +
                              (isSel ? 'bg-emerald-500 border-emerald-500' : 'bg-black/30 border-white')}>
                              {isSel && <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>}
                            </div>
                          )}
                          {isCurrent && (
                            <div className="absolute top-2 right-2 z-10 bg-red-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded-md">選中</div>
                          )}
                          <div className="h-28 overflow-hidden bg-gray-100">
                            <img src={item.image||''} className="w-full h-full object-cover" onError={e=>e.target.style.display='none'} />
                          </div>
                          <div className="p-2.5">
                            <p className="text-[11px] font-bold text-gray-800 line-clamp-2 leading-snug mb-1.5">{item.title}</p>
                            <div className="flex items-center justify-between">
                              <span className="text-[10px] text-gray-400">{item.days}天</span>
                              <span className="text-[12px] font-black text-red-600">${Number(item.price).toLocaleString()}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                {/* 右：設定面板 */}
                <div className="border-l border-gray-200 bg-white flex flex-col overflow-hidden" style={{flex:'0 0 40%',minWidth:'280px'}}>
                  {rightPanel}
                </div>
              </div>
            </div>
          </div>
        );
      };


      const renderModals = () => (
        <>
          {/* Settings Modal */}
          {showSettingsModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
              <div className="bg-white rounded-3xl max-w-2xl w-full shadow-2xl animate-fade-in-up overflow-hidden max-h-[90vh] flex flex-col">
                <div className="bg-gray-50 p-6 border-b border-gray-200 flex justify-between items-center sticky top-0 z-10">
                  <h3 className="text-xl font-bold flex items-center text-gray-800"><Settings className="w-6 h-6 mr-2 text-emerald-600" /> 經銷商名片與推播設定</h3>
                  <button onClick={() => setShowSettingsModal(false)} className="text-gray-400 hover:text-gray-600 transition"><X className="w-6 h-6" /></button>
                </div>
                <div className="p-6 md:p-8 overflow-y-auto custom-scrollbar space-y-8">
                  <div>
                    <h4 className="font-bold text-lg text-gray-800 mb-4 border-b pb-2 flex items-center"><UserIcon className="w-5 h-5 mr-2 text-blue-500"/> 名片聯絡按鈕設定</h4>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div><label className="block text-xs font-bold text-gray-500 mb-1">聯絡電話</label><input type="text" value={myDistributorData?.phone||''} onChange={e=>setMyDistributorData({...myDistributorData,phone:e.target.value})} className="w-full rounded-lg border border-gray-300 p-2.5 outline-none focus:border-blue-500"/></div>
                      <div><label className="block text-xs font-bold text-gray-500 mb-1">個人 LINE 網址</label><input type="text" value={myDistributorData?.lineLink||''} onChange={e=>setMyDistributorData({...myDistributorData,lineLink:e.target.value})} className="w-full rounded-lg border border-gray-300 p-2.5 outline-none focus:border-blue-500" placeholder="https://line.me/..."/></div>
                      <div><label className="block text-xs font-bold text-gray-500 mb-1">官方 LINE@ 網址</label><input type="text" value={myDistributorData?.lineAtLink||''} onChange={e=>setMyDistributorData({...myDistributorData,lineAtLink:e.target.value})} className="w-full rounded-lg border border-gray-300 p-2.5 outline-none focus:border-blue-500" placeholder="https://lin.ee/..."/></div>
                      <div><label className="block text-xs font-bold text-gray-500 mb-1">FB 粉絲專頁網址</label><input type="text" value={myDistributorData?.fbLink||''} onChange={e=>setMyDistributorData({...myDistributorData,fbLink:e.target.value})} className="w-full rounded-lg border border-gray-300 p-2.5 outline-none focus:border-blue-500"/></div>
                      <div className="md:col-span-2"><label className="block text-xs font-bold text-gray-500 mb-1">實體店面導航 (Map)</label><input type="text" value={myDistributorData?.mapLink||''} onChange={e=>setMyDistributorData({...myDistributorData,mapLink:e.target.value})} className="w-full rounded-lg border border-gray-300 p-2.5 outline-none focus:border-blue-500"/></div>
                    </div>
                  </div>
                  <div>
                    <h4 className="font-bold text-lg text-gray-800 mb-2 border-b pb-2 flex items-center"><Send className="w-5 h-5 mr-2 text-blue-500"/> Telegram 訂單自動推播</h4>
                    <p className="text-gray-500 text-xs mb-4">設定您的專屬機器人，當有客戶透過您的連結下單時，將即時發送通知給您。</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                      <div className="md:col-span-2"><label className="block text-xs font-bold text-blue-800 mb-1">Bot Token</label><input type="text" value={myDistributorData?.tgToken||''} onChange={e=>setMyDistributorData({...myDistributorData,tgToken:e.target.value})} className="w-full rounded-lg border border-blue-200 p-2.5 outline-none focus:border-blue-500 font-mono text-sm bg-white" placeholder="123456789:ABCDefghIJKLmnop..." /></div>
                      <div className="md:col-span-2">
                        <label className="block text-xs font-bold text-blue-800 mb-1 flex justify-between items-center"><span>Chat ID</span><button onClick={autoFetchTgChatId} className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200 transition font-bold shadow-sm">轉換自動獲取 ID</button></label>
                        <input type="text" value={myDistributorData?.tgChatId||''} onChange={e=>setMyDistributorData({...myDistributorData,tgChatId:e.target.value})} className="w-full rounded-lg border border-blue-200 p-2.5 outline-none focus:border-blue-500 font-mono text-sm bg-white" placeholder="-5248604938" />
                      </div>
                    </div>
                  </div>
                </div>
                <div className="p-6 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                  <button onClick={() => setShowSettingsModal(false)} className="px-6 py-2.5 rounded-xl font-bold text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 transition">取消</button>
                  <button onClick={saveMySettings} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-8 rounded-xl shadow-md transition flex items-center">儲存設定</button>
                </div>
              </div>
            </div>
          )}

          {/* Booking Modal */}
          {bookingModalData && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
              <div className="bg-white rounded-3xl max-w-lg w-full shadow-2xl animate-fade-in-up overflow-hidden">
                <div className="bg-[#b82337] p-6 text-white flex justify-between items-center"><h3 className="text-xl font-bold flex items-center"><ClipboardList className="w-6 h-6 mr-2" /> 填寫報名資料</h3><button onClick={() => setBookingModalData(null)} className="text-white hover:text-red-200 transition"><X className="w-6 h-6" /></button></div>
                <form onSubmit={submitBooking} className="p-6 md:p-8">
                  <div className="mb-6 pb-6 border-b border-gray-100">
                    <p className="text-sm font-bold text-gray-400 mb-1">預約行程</p>
                    <p className="text-xl font-black text-gray-800 leading-tight mb-2">{bookingModalData.tourTitle}</p>
                    <div className="flex justify-between items-end">
                      <div><label className="block text-sm font-bold text-gray-500 mb-1">報名人數</label><input type="number" min="1" required value={bookingModalData.pax} onChange={(e) => setBookingModalData({...bookingModalData,pax:parseInt(e.target.value)||1,totalAmount:(parseInt(e.target.value)||1)*bookingModalData.price})} className="w-24 rounded-lg border-gray-300 border p-2 outline-none text-center font-bold text-lg"/></div>
                      <div className="text-right"><p className="text-xs text-gray-400 font-bold mb-1">總金額</p><p className="text-2xl font-black text-[#b82337]">TWD {Number(bookingModalData.totalAmount).toLocaleString()}</p></div>
                    </div>
                  </div>
                  <div className="space-y-4 mb-8">
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">主要聯絡人姓名</label><input type="text" required value={bookingModalData.contactName} onChange={(e) => setBookingModalData({...bookingModalData,contactName:e.target.value})} className="w-full rounded-xl border-gray-300 border p-3 outline-none text-base"/></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">聯絡電話</label><input type="tel" required value={bookingModalData.contactPhone} onChange={(e) => setBookingModalData({...bookingModalData,contactPhone:e.target.value})} className="w-full rounded-xl border-gray-300 border p-3 outline-none text-base"/></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">特殊需求備註 (選填)</label><textarea rows="2" value={bookingModalData.note} onChange={(e) => setBookingModalData({...bookingModalData,note:e.target.value})} className="w-full rounded-xl border-gray-300 border p-3 outline-none text-base" placeholder="例如：素食、嬰兒車需求等"/></div>
                  </div>
                  <button type="submit" disabled={isSubmitting} className={`w-full bg-[#b82337] hover:bg-red-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg ${isSubmitting ? 'opacity-70 cursor-not-allowed' : ''}`}>{isSubmitting ? '訂單處理中...' : '確認送出訂單'}</button>
                </form>
              </div>
            </div>
          )}

          {/* Delete Confirm Modal */}
          {deleteModalId && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl animate-fade-in-up">
                <div className="flex items-center text-red-600 mb-5"><AlertCircle className="w-8 h-8 mr-3" /><h3 className="text-2xl font-bold">確認下架此行程？</h3></div>
                <p className="text-gray-600 mb-8 text-lg leading-relaxed">下架後該行程將從前台及資料庫移除，確定要繼續嗎？</p>
                <div className="flex justify-end space-x-4"><button onClick={() => setDeleteModalId(null)} className="px-6 py-2.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 text-lg">取消</button><button onClick={confirmDelete} className="px-6 py-2.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 text-lg">確定下架</button></div>
              </div>
            </div>
          )}
        </>
      );

      return (
        <div className="min-h-screen flex flex-col bg-gray-50">
          {renderNavBar()}
          <div className="flex-grow w-full">
            {activeTab === 'home'        && renderHomeTab()}
            {activeTab === 'member'      && renderMemberTab()}
            {activeTab === 'distributor' && renderDistributorTab()}
            {activeTab === 'crm'         && renderCrmTab()}
            {activeTab === 'admin'       && renderAdminEditorTab()}
          </div>
          {promoToolOpen && renderPromoTool()}
          {renderModals()}
          {toast && (<div className="fixed bottom-6 right-6 z-[90] animate-fade-in-up"><div className={`flex items-center p-5 rounded-2xl shadow-2xl ${toast.type === 'error' ? 'bg-red-50 text-red-800' : 'bg-gray-900 text-white'}`}><span className="font-bold text-lg tracking-wide">{toast.message}</span></div></div>)}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
