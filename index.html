<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Admin - 旅遊內容管理系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .line-green { color: #06C755; }
        .bg-line-green { background-color: #06C755; }
        .border-line-green { border-color: #06C755; }
        .sidebar-item-active { background-color: #f1f5f9; color: #0f172a; font-weight: 500; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .mode-tab-active { border-bottom: 2px solid #06C755; color: #06C755; font-weight: 500;}
        
        /* 編輯器內容樣式 */
        .editor-content { min-height: 400px; outline: none; }
        .editor-content h2 { font-size: 1.5rem; font-weight: bold; color: #06C755; margin-bottom: 1.25rem; border-left: 4px solid #06C755; padding-left: 12px; }
        .editor-content p { font-size: 15px; line-height: 1.8; color: #475569; margin-bottom: 1.5rem; }
        
        /* 讓圖片可以直接點擊替換 */
        .editor-content img { 
            max-width: 100%; height: auto; border-radius: 1rem; margin-bottom: 1.5rem; 
            cursor: pointer; transition: all 0.2s; 
        }
        .editor-content.editable-mode img:hover { 
            opacity: 0.85; outline: 3px dashed #06C755; outline-offset: 2px;
        }
        .editor-content.preview-mode img {
            cursor: default; /* 預覽模式不顯示點擊指標 */
        }
    </style>
</head>
<body class="text-[#333333]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 設定區 ---
        const LIFF_ID = "2009367829-qhw54Uf9"; 
        const WORKER_URL = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/process';
        // --------------

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current, attrs: { class: className, width: size, height: size }});
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState('gallery'); 
            const [travelMode, setTravelMode] = useState('text');
            const [loading, setLoading] = useState(false);
            const [image, setImage] = useState(null);
            const [travelText, setTravelText] = useState('');
            const [result, setResult] = useState(null);
            const [message, setMessage] = useState({ type: '', text: '' });
            
            const [isEditing, setIsEditing] = useState(false);
            const [previewData, setPreviewData] = useState(null); 
            const [shareModalData, setShareModalData] = useState(null); 
            const [records, setRecords] = useState([]);
            const [isUploadingImage, setIsUploadingImage] = useState(false);
            const [imageToReplace, setImageToReplace] = useState(null);
            
            const [liffProfile, setLiffProfile] = useState(null);
            
            const editorRef = useRef(null);
            const savedSelectionRef = useRef(null);

            useEffect(() => {
                const initLiff = async () => {
                    if (!window.liff) return;
                    try { 
                        // 修正：移除 fetch config 導致的時間差，直接同步初始化解決重複跳轉問題
                        if (!LIFF_ID || LIFF_ID === "您的_LIFF_ID_在此") {
                            console.warn("⚠️ 無效的 LIFF ID，跳過初始化");
                            return;
                        }

                        await window.liff.init({ liffId: LIFF_ID }); 
                        console.log("✅ LIFF 初始化成功");

                        if (window.liff.isLoggedIn()) {
                            const profile = await window.liff.getProfile();
                            setLiffProfile(profile);
                        }
                    } catch (err) { 
                        console.error('LIFF 初始化失敗:', err); 
                    }
                };
                initLiff();
                fetchRecords();
            }, []);

            useEffect(() => {
                if (message.text) {
                    const timer = setTimeout(() => setMessage({ type: '', text: '' }), 4000); 
                    return () => clearTimeout(timer);
                }
            }, [message.text]);

            const fetchRecords = async () => {
                setLoading(true);
                try {
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'getRecords' })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    setRecords(data.records || []);
                } catch (err) {
                    setMessage({ type: 'error', text: `無法載入紀錄: ${err.message}` });
                } finally {
                    setLoading(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleEditorImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) {
                    setImageToReplace(null); 
                    return;
                }

                setIsUploadingImage(true);
                setMessage({ type: 'info', text: '圖片上傳至 Google Drive 中...' });

                try {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        const response = await fetch(WORKER_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'uploadImage', imageBase64: base64 })
                        });
                        const data = await response.json();
                        if (data.error) throw new Error(data.error);

                        if (imageToReplace) {
                            imageToReplace.src = data.url;
                            setImageToReplace(null);
                        } else {
                            if (editorRef.current) editorRef.current.focus();
                            if (savedSelectionRef.current && window.getSelection) {
                                const sel = window.getSelection();
                                sel.removeAllRanges();
                                sel.addRange(savedSelectionRef.current);
                            }
                            execCmd('insertImage', data.url);
                        }
                        
                        setMessage({ type: 'success', text: '圖片更新成功！' });
                    };
                    reader.readAsDataURL(file);
                } catch (err) {
                    setMessage({ type: 'error', text: `上傳失敗: ${err.message}` });
                    setImageToReplace(null);
                } finally {
                    setIsUploadingImage(false);
                    e.target.value = ''; 
                }
            };

            const runAI = async () => {
                let payload = { action: 'generateContent' };
                if (activeSection === 'travel') {
                    if (travelMode === 'image') {
                        if (!image) { setMessage({ type: 'error', text: '請先上傳圖片素材' }); return; }
                        payload.imageBase64 = image.split(',')[1];
                        payload.mode = 'ImageToWeb';
                    } else {
                        if (!travelText) { setMessage({ type: 'error', text: '請輸入文章內容' }); return; }
                        payload.textInput = travelText;
                        payload.mode = 'ArticleToWeb';
                    }
                } else if (activeSection === 'copy') {
                    if (!image) { setMessage({ type: 'error', text: '請先上傳商品圖片' }); return; }
                    payload.imageBase64 = image.split(',')[1];
                    payload.mode = 'Product';
                }

                setLoading(true);
                setMessage({ type: 'info', text: 'AI 達人正在為您編排內容與精美配圖...' });
                
                try {
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    setResult(data);
                    setMessage({ type: 'success', text: '生成完畢！可點擊下方編輯器進行修改。' });
                    fetchRecords(); 
                } catch (err) {
                    setMessage({ type: 'error', text: `發生錯誤: ${err.message}` });
                } finally { setLoading(false); }
            };

            const execCmd = (cmd, val = null) => document.execCommand(cmd, false, val);

            const saveEdit = () => {
                if (editorRef.current) {
                    const updatedHtml = editorRef.current.innerHTML;
                    setResult(prev => ({ ...prev, webHtml: updatedHtml }));
                    setIsEditing(false);
                    setMessage({ type: 'success', text: '內容已更新' });
                    fetchRecords(); 
                }
            };

            const shareToContacts = async (recordData) => {
                const flexCardData = recordData.flexCard || recordData;
                let messagePayload = flexCardData;
                if (flexCardData.type !== 'flex') {
                    messagePayload = {
                        type: "flex",
                        altText: "旅遊行程推薦",
                        contents: flexCardData
                    };
                }

                const triggerFallback = () => {
                    const uid = liffProfile?.userId || '';
                    const tourId = recordData.id || Date.now(); 
                    const shareUrl = `https://liff.line.me/${LIFF_ID}?action=share&t=${tourId}&r=${uid}&o=111111`;
                    
                    const fallbackCopy = (text) => {
                        const ta = document.createElement('textarea');
                        ta.value = text;
                        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
                        document.body.appendChild(ta);
                        ta.select();
                        try {
                            document.execCommand('copy');
                            setMessage({ type: 'success', text: '✅ 已自動為您產生並複製專屬分享網址！' });
                        } catch (err) {
                            setMessage({ type: 'error', text: '❌ 複製失敗，請手動分享' });
                        }
                        document.body.removeChild(ta);
                    };

                    if (!navigator.clipboard) {
                        fallbackCopy(shareUrl);
                    } else {
                        navigator.clipboard.writeText(shareUrl)
                            .then(() => setMessage({ type: 'success', text: '✅ 已自動為您產生並複製專屬分享網址！' }))
                            .catch(() => fallbackCopy(shareUrl));
                    }
                    setShareModalData(null);
                };

                if (!window.liff.isLoggedIn()) {
                    setMessage({ type: 'error', text: '⚠️ 權限不足：請先點擊右上角「LINE 登入」' });
                    return;
                }

                if (window.liff && window.liff.isApiAvailable('shareTargetPicker')) {
                    try {
                        const res = await window.liff.shareTargetPicker([messagePayload]);
                        if (res) {
                            setMessage({ type: 'success', text: '✅ 已成功發送至 LINE 通訊錄！' });
                        }
                        setShareModalData(null);
                    } catch (err) {
                        console.error("LINE Share Error:", err);
                        if (err.code !== 1000) { 
                            setMessage({ type: 'error', text: `喚起阻擋: ${err.message} (請確認 Developer 後台開關)` });
                            setTimeout(triggerFallback, 2500);
                        } else {
                            setShareModalData(null); 
                        }
                    }
                } else {
                    setMessage({ type: 'info', text: '當前瀏覽器環境不支援，自動轉為網址分享' });
                    setTimeout(triggerFallback, 2000);
                }
            };

            const copyFlexJson = (recordData) => {
                const flexCardData = recordData.flexCard || recordData;
                let flexPayload = flexCardData;
                if (flexCardData.type !== 'flex') {
                    flexPayload = { type: "flex", altText: "旅遊行程推薦", contents: flexCardData };
                }
                const txt = JSON.stringify(flexPayload, null, 2);
                
                const el = document.createElement('textarea');
                el.value = txt;
                document.body.appendChild(el);
                el.select();
                try {
                    document.execCommand('copy');
                    setMessage({ type: 'success', text: 'Flex JSON 已複製，可用於 OA 群發！' });
                } catch (err) {
                    setMessage({ type: 'error', text: '複製失敗' });
                }
                document.body.removeChild(el);
                setShareModalData(null); 
            };

            const parseCardInfo = (html) => {
                if (!html) return { title: '未命名專案', img: 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=800' };
                const div = document.createElement('div');
                div.innerHTML = html;
                const h2 = div.querySelector('h2');
                const img = div.querySelector('img');
                return {
                    title: h2 ? h2.innerText : '未命名旅遊行程',
                    img: img ? img.src : 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=800'
                };
            };

            return (
                <div className="flex min-h-screen relative">
                    <input id="editorFileInput" type="file" className="hidden" onChange={handleEditorImageUpload} accept="image/*" />

                    <aside className="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
                        <div className="p-6 flex items-center gap-2 border-b border-slate-100">
                            <span className="font-bold text-xl italic text-slate-800">SaaS <span className="text-blue-600">Admin</span></span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 mt-2">
                            <SidebarItem active={activeSection === 'gallery'} onClick={() => { setActiveSection('gallery'); fetchRecords(); }} icon="layout-grid" label="內容庫" />
                            <SidebarItem active={activeSection === 'travel'} onClick={() => { setActiveSection('travel'); setResult(null); }} icon="map" label="新增行程網頁" />
                            <SidebarItem active={activeSection === 'copy'} onClick={() => { setActiveSection('copy'); setResult(null); }} icon="edit-3" label="新增社群文案" />
                        </nav>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 bg-[#fbfbfb]">
                        <div className="p-6 lg:p-10 max-w-6xl w-full mx-auto">
                            
                            {/* --- 導覽列與登入按鈕 --- */}
                            <div className="flex justify-end mb-4">
                                {liffProfile ? (
                                    <div className="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100">
                                        <img src={liffProfile.pictureUrl || 'https://via.placeholder.com/150'} className="w-8 h-8 rounded-full border border-slate-200 object-cover" />
                                        <span className="text-sm font-bold text-slate-700">{liffProfile.displayName}</span>
                                    </div>
                                ) : (
                                    <button onClick={() => window.liff.login({ redirectUri: window.location.href })} className="bg-[#00B900] hover:bg-[#009900] text-white px-5 py-2.5 rounded-full text-sm font-bold transition shadow-sm flex items-center gap-2">
                                        <Icon name="log-in" size={16} /> LINE 登入以使用分享功能
                                    </button>
                                )}
                            </div>

                            {/* --- 內容庫 (首頁展示) --- */}
                            {activeSection === 'gallery' && (
                                <div>
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-2xl font-bold text-slate-800">全部行程與內容</h2>
                                        <button onClick={fetchRecords} className="text-slate-500 hover:text-slate-800 flex items-center gap-1 text-sm">
                                            <Icon name="refresh-cw" size={14}/> 重新整理
                                        </button>
                                    </div>

                                    {loading && records.length === 0 ? (
                                        <div className="flex justify-center py-20 text-slate-400">
                                            <Icon name="loader-2" className="animate-spin" size={32} />
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {records.map((rec, idx) => {
                                                const { title, img } = parseCardInfo(rec.webHtml);
                                                const mockTags = idx % 2 === 0 ? "熱門 · 推薦" : "最新 · 企劃";
                                                const mockPrice = idx % 2 === 0 ? "$22,900" : "$9,500";

                                                return (
                                                    <div key={rec.id} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                                                        <div className="h-48 w-full overflow-hidden cursor-pointer" onClick={() => setPreviewData(rec)}>
                                                            <img src={img} alt={title} className="w-full h-full object-cover hover:scale-105 transition-transform duration-500" />
                                                        </div>
                                                        <div className="p-5 flex-1 flex flex-col">
                                                            <div className="text-xs font-bold text-blue-600 mb-2">{mockTags}</div>
                                                            <h3 className="text-lg font-bold text-slate-800 mb-6 flex-1 cursor-pointer hover:text-blue-600 transition-colors" onClick={() => setPreviewData(rec)}>{title}</h3>
                                                            
                                                            <div className="flex justify-between items-center mt-auto pt-4 border-t border-slate-50">
                                                                <span className="text-red-500 font-bold text-xl">{mockPrice}</span>
                                                                <div className="flex items-center gap-2">
                                                                    <button onClick={() => setPreviewData(rec)} className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors text-xs font-bold">
                                                                        <Icon name="eye" size={14} /> 預覽
                                                                    </button>
                                                                    <button onClick={() => { setResult({ webHtml: rec.webHtml, flexCard: rec.flexCard }); setIsEditing(true); }} className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-slate-50 text-slate-600 hover:bg-slate-100 transition-colors text-xs font-bold">
                                                                        <Icon name="edit-2" size={14} /> 編輯
                                                                    </button>
                                                                    <button onClick={() => setShareModalData(rec)} className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-green-50 text-green-600 hover:bg-green-100 transition-colors text-xs font-bold">
                                                                        <Icon name="send" size={14} /> 發送
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* --- 新增內容區塊 --- */}
                            {(activeSection === 'travel' || activeSection === 'copy') && (
                                <div className="max-w-3xl mx-auto">
                                    <header className="mb-8">
                                        <h2 className="text-2xl font-bold text-slate-800 mb-1">
                                            {activeSection === 'travel' ? "新增行程網頁" : "新增社群文案"}
                                        </h2>
                                        <p className="text-sm text-slate-500">
                                            {activeSection === 'travel' ? "AI 自動分段並匹配 16:9 旅遊圖庫" : "快速生成跨平台社群素材"}
                                        </p>
                                    </header>

                                    {activeSection === 'travel' && (
                                        <div className="flex gap-6 mb-6">
                                            <button onClick={() => setTravelMode('text')} className={`pb-2 text-sm transition-all ${travelMode === 'text' ? 'mode-tab-active' : 'text-slate-400 hover:text-slate-600'}`}>文章生網頁</button>
                                            <button onClick={() => setTravelMode('image')} className={`pb-2 text-sm transition-all ${travelMode === 'image' ? 'mode-tab-active' : 'text-slate-400 hover:text-slate-600'}`}>圖片生網頁</button>
                                        </div>
                                    )}

                                    <section className="bg-white rounded-2xl border border-slate-100 shadow-sm p-8 mb-8">
                                        {activeSection === 'travel' && travelMode === 'text' ? (
                                            <textarea value={travelText} onChange={(e) => setTravelText(e.target.value)} placeholder="在此貼上旅遊行程文章，AI 將為您自動分段並配圖..." className="w-full h-48 p-4 rounded-xl bg-slate-50 border border-slate-200 focus:border-line-green focus:ring-1 focus:ring-line-green outline-none text-sm transition-all resize-none" />
                                        ) : (
                                            <div onClick={() => !loading && document.getElementById('fileInput').click()} className={`border-2 border-dashed rounded-2xl py-14 flex flex-col items-center justify-center transition-all cursor-pointer ${image ? 'border-line-green bg-green-50/20' : 'border-slate-200 hover:bg-slate-50'}`}>
                                                {image ? <img src={image} className="max-h-56 rounded-xl shadow-sm" /> : <p className="text-sm text-slate-400">點擊上傳原始素材或商品照片</p>}
                                                <input id="fileInput" type="file" className="hidden" onChange={handleImageUpload} accept="image/*" />
                                            </div>
                                        )}

                                        <div className="mt-8 flex justify-end">
                                            <button disabled={loading} onClick={runAI} className="bg-line-green text-white px-8 py-3 rounded-xl text-sm font-bold hover:bg-[#05b34c] transition-all disabled:opacity-50 flex items-center gap-2 shadow-md shadow-green-100">
                                                {loading ? <Icon name="loader-2" className="animate-spin" size={16} /> : <Icon name="sparkles" size={16} />}
                                                立即生成並存入內容庫
                                            </button>
                                        </div>
                                    </section>

                                    {result && activeSection === 'travel' && (
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 animate-in fade-in slide-in-from-bottom-4">
                                            <div className="flex justify-between items-center mb-6">
                                                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                                    <Icon name="check-circle-2" className="text-green-500" /> 生成完畢
                                                </h3>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => setIsEditing(true)} className="flex items-center gap-1.5 text-sm font-bold text-slate-700 bg-slate-100 px-5 py-2.5 rounded-lg hover:bg-slate-200 transition-colors shadow-sm">
                                                        <Icon name="edit-2" size={16} /> ✏️ 編輯網頁
                                                    </button>
                                                    <button onClick={() => setShareModalData(result)} className="flex items-center gap-1.5 text-sm font-bold text-white bg-[#06C755] px-5 py-2.5 rounded-lg hover:bg-[#05b34c] transition-colors shadow-md shadow-green-200">
                                                        <Icon name="send" size={16} /> 發送至 LINE
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="text-xs text-slate-400 mb-3 bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full inline-flex items-center gap-1">
                                                <Icon name="info" size={14} /> 點擊上方「編輯網頁」按鈕，可直接修改文字與替換圖片
                                            </div>

                                            <div className="editor-content preview-mode border border-slate-100 rounded-2xl p-8 md:p-12 bg-slate-50 relative pointer-events-none" dangerouslySetInnerHTML={{ __html: result.webHtml }} />
                                        </div>
                                    )}

                                    {result && activeSection === 'copy' && (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4">
                                            {['fb', 'ig', 'threads'].map(platform => (
                                                <div key={platform} className="bg-white rounded-2xl border border-slate-100 p-5 flex flex-col shadow-sm">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase tracking-wider">{platform}</span>
                                                    </div>
                                                    <div className="text-xs text-slate-600 leading-relaxed flex-1 whitespace-pre-wrap">
                                                        {result.socialCopy?.[platform] || "無內容"}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* 純瀏覽預覽彈窗 */}
                    {previewData && (
                        <div className="fixed inset-0 z-[100] bg-[#f8fafc] flex flex-col animate-in fade-in duration-200">
                            <header className="border-b border-slate-200 p-4 flex justify-between items-center bg-white shadow-sm">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setPreviewData(null)} className="text-slate-400 hover:text-slate-800 transition-colors"><Icon name="arrow-left" size={20} /></button>
                                    <h3 className="font-bold text-slate-800">瀏覽行程內容</h3>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button 
                                        onClick={() => {
                                            setResult({ webHtml: previewData.webHtml, flexCard: previewData.flexCard });
                                            setIsEditing(true);
                                            setPreviewData(null);
                                        }} 
                                        className="flex items-center gap-1.5 text-sm font-bold text-slate-700 bg-slate-100 px-5 py-2.5 rounded-lg hover:bg-slate-200 transition-colors"
                                    >
                                        <Icon name="edit-2" size={16} /> 編輯內容
                                    </button>
                                    <button 
                                        onClick={() => setShareModalData(previewData)} 
                                        className="flex items-center gap-1.5 text-sm font-bold text-white bg-[#06C755] px-5 py-2.5 rounded-lg hover:bg-[#05b34c] transition-colors shadow-md shadow-green-200"
                                    >
                                        <Icon name="send" size={16} /> 分享與發送
                                    </button>
                                </div>
                            </header>

                            <div className="flex-1 overflow-auto p-6 md:p-12">
                                <div className="max-w-3xl mx-auto bg-white shadow-xl rounded-2xl p-8 md:p-14 border border-slate-100">
                                    <div className="editor-content preview-mode" dangerouslySetInnerHTML={{ __html: previewData.webHtml }} />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 全螢幕視覺編輯器彈窗 */}
                    {isEditing && (
                        <div className="fixed inset-0 z-[100] bg-[#f8fafc] flex flex-col animate-in fade-in duration-200">
                            <header className="border-b border-slate-200 p-4 flex justify-between items-center bg-white shadow-sm">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setIsEditing(false)} className="text-slate-400 hover:text-slate-800 transition-colors"><Icon name="arrow-left" size={20} /></button>
                                    <h3 className="font-bold text-slate-800">網頁內容編輯器</h3>
                                </div>
                                <button onClick={saveEdit} className="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 transition-colors">
                                    儲存修改
                                </button>
                            </header>
                            
                            {/* 編輯器工具列 */}
                            <div className="border-b border-slate-200 bg-white p-2 flex flex-wrap gap-1 justify-center shadow-sm z-10">
                                <EditorTool onClick={() => execCmd('formatBlock', 'H2')} icon="heading" label="段落標題" />
                                <div className="w-px h-6 bg-slate-200 mx-2 self-center"></div>
                                <EditorTool onClick={() => execCmd('bold')} icon="bold" />
                                <EditorTool onClick={() => execCmd('italic')} icon="italic" />
                                <EditorTool onClick={() => execCmd('underline')} icon="underline" />
                                <div className="w-px h-6 bg-slate-200 mx-2 self-center"></div>
                                <EditorTool onClick={() => execCmd('justifyLeft')} icon="align-left" />
                                <EditorTool onClick={() => execCmd('justifyCenter')} icon="align-center" />
                                <EditorTool onClick={() => execCmd('justifyRight')} icon="align-right" />
                                <div className="w-px h-6 bg-slate-200 mx-2 self-center"></div>
                                <EditorTool onClick={() => {
                                    const url = prompt('請輸入連結網址:', 'https://');
                                    if(url) execCmd('createLink', url);
                                }} icon="link" />
                                
                                <EditorTool onClick={() => {
                                    if(isUploadingImage) return;
                                    setImageToReplace(null); 
                                    if (window.getSelection) {
                                        const sel = window.getSelection();
                                        if (sel.getRangeAt && sel.rangeCount > 0) {
                                            savedSelectionRef.current = sel.getRangeAt(0);
                                        }
                                    }
                                    document.getElementById('editorFileInput').click();
                                }} icon={isUploadingImage && !imageToReplace ? "loader-2" : "image"} iconClass={isUploadingImage && !imageToReplace ? "animate-spin" : ""} label="插入新圖片" />
                                
                                <div className="w-px h-6 bg-slate-200 mx-2 self-center"></div>
                                <EditorTool onClick={() => execCmd('removeFormat')} icon="eraser" label="清除格式" />
                            </div>

                            <div className="flex-1 overflow-auto p-6 md:p-12">
                                <div className="max-w-3xl mx-auto bg-white shadow-xl rounded-2xl p-8 md:p-14 border border-slate-100 relative">
                                    <div className="absolute top-4 right-4 text-xs text-slate-400 flex items-center gap-1 bg-slate-50 px-3 py-1.5 rounded-full">
                                        <Icon name="mouse-pointer-click" size={14} />
                                        提示：直接點擊圖片即可上傳替換
                                    </div>

                                    <div 
                                        ref={editorRef}
                                        contentEditable
                                        className="editor-content editable-mode mt-4"
                                        dangerouslySetInnerHTML={{ __html: result?.webHtml }}
                                        onClick={(e) => {
                                            if (e.target.tagName === 'IMG') {
                                                setImageToReplace(e.target);
                                                document.getElementById('editorFileInput').click();
                                            }
                                        }}
                                    />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ★ 發送名片：推廣與分享格式彈窗 ★ */}
                    {shareModalData && (
                        <div className="fixed inset-0 z-[120] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center animate-in fade-in duration-200 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col">
                                <header className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2">
                                        <Icon name="share-2" size={18} className="text-blue-600" /> 推廣與發送格式
                                    </h3>
                                    <button onClick={() => setShareModalData(null)} className="text-slate-400 hover:text-slate-600 transition-colors">
                                        <Icon name="x" size={20} />
                                    </button>
                                </header>
                                <div className="p-5 bg-slate-50">
                                    <p className="text-sm text-slate-500 mb-4 font-medium">請選擇您要將此行程推廣出去的方式：</p>
                                    <div className="space-y-3">
                                        <button onClick={() => shareToContacts(shareModalData)} className="w-full flex items-center justify-between p-4 rounded-xl border border-green-200 bg-white hover:bg-green-50 transition-all group shadow-sm hover:shadow">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-full bg-green-100 text-green-600 flex items-center justify-center group-hover:bg-green-500 group-hover:text-white transition-colors">
                                                    <Icon name="message-circle" size={20} />
                                                </div>
                                                <div className="text-left">
                                                    <p className="font-bold text-slate-800 text-sm group-hover:text-green-700 transition-colors">分享至 LINE 通訊錄</p>
                                                    <p className="text-xs text-slate-500 mt-0.5 group-hover:text-green-600 transition-colors">呼叫好友/群組清單發送卡片</p>
                                                </div>
                                            </div>
                                            <Icon name="chevron-right" size={20} className="text-slate-300 group-hover:text-green-500 group-hover:translate-x-1 transition-all" />
                                        </button>
                                        
                                        <button onClick={() => copyFlexJson(shareModalData)} className="w-full flex items-center justify-between p-4 rounded-xl border border-blue-200 bg-white hover:bg-blue-50 transition-all group shadow-sm hover:shadow">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                                    <Icon name="code" size={20} />
                                                </div>
                                                <div className="text-left">
                                                    <p className="font-bold text-slate-800 text-sm group-hover:text-blue-700 transition-colors">複製 Flex JSON 代碼</p>
                                                    <p className="text-xs text-slate-500 mt-0.5 group-hover:text-blue-600 transition-colors">用於 LINE OA 官方群發訊息</p>
                                                </div>
                                            </div>
                                            <Icon name="copy" size={18} className="text-slate-300 group-hover:text-blue-500 transition-colors" />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast 提示 */}
                    {message.text && (
                        <div className={`fixed bottom-8 right-8 z-[130] flex items-center gap-2 px-6 py-3.5 rounded-xl shadow-xl text-sm text-white font-medium animate-in slide-in-from-right-8 ${message.type === 'error' ? 'bg-red-500' : 'bg-slate-800'}`}>
                            <Icon name={message.type === 'success' ? "check-circle-2" : (isUploadingImage ? "loader-2" : "info")} className={isUploadingImage ? "animate-spin" : ""} size={18} />
                            {message.text}
                        </div>
                    )}
                </div>
            );
        };

        const SidebarItem = ({ active, onClick, icon, label }) => (
            <button 
                onClick={onClick} 
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm transition-all ${active ? 'sidebar-item-active' : 'text-slate-500 hover:bg-slate-100'}`}
            >
                <Icon name={icon} size={18} />
                <span>{label}</span>
            </button>
        );

        const EditorTool = ({ onClick, icon, iconClass = "", label }) => (
            <button 
                onClick={onClick}
                className="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-600 transition-colors"
                title={label}
            >
                <Icon name={icon} size={16} className={iconClass} />
                {label && <span className="text-xs font-medium">{label}</span>}
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
