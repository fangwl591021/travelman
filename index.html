<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程上稿編輯器</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; color: #1e293b; background: #fff; }
    .input-line { 
        width: 100%; 
        border-bottom: 1px solid #e2e8f0; 
        padding: 16px 0; 
        outline: none; 
        transition: 0.2s; 
        font-size: 18px; 
        color: #0f172a;
        background: transparent;
    }
    .input-line:focus { border-bottom-color: #174a5a; }
    .label-hint { 
        font-size: 14px; 
        color: #94a3b8; 
        margin-top: 24px; 
        display: block; 
        font-weight: 600; 
    }
    section { margin-bottom: 60px; }
  </style>
</head>
<body class="p-6 md:p-12">
  <div id="app" class="max-w-3xl mx-auto">
    
    <!-- Step 1: 解析 -->
    <div v-if="step === 'input'">
      <h1 class="text-2xl font-bold mb-10 text-slate-800">行程文案解析上稿</h1>
      <textarea v-model="rawText" class="w-full h-96 bg-slate-50 rounded-lg p-6 text-base border-0 outline-none focus:bg-white focus:ring-2 focus:ring-slate-200 leading-relaxed" placeholder="請將 NotebookLM 整理後的文字貼在此處..."></textarea>
      <button @click="parseDraft" :disabled="!rawText || loading" class="w-full bg-slate-900 text-white py-5 rounded-lg font-bold text-lg mt-10 transition-all active:scale-95 disabled:opacity-20">
        {{ loading ? 'GPT-4o 正在解析...' : '確認解析行程' }}
      </button>
    </div>

    <!-- Step 2: 編輯 -->
    <div v-if="step === 'edit'" class="pb-40">
        <h2 class="text-sm font-bold text-slate-400 border-b pb-4 mb-10 tracking-widest uppercase">基本資訊校對</h2>
        <section>
          <div><label class="label-hint">行程總標題</label><input v-model="course.title" class="input-line font-bold !text-2xl"></div>
          <div class="grid grid-cols-2 gap-12">
            <div><label class="label-hint">報價 (純數字)</label><input v-model="course.price" type="number" class="input-line text-red-500 font-bold !text-xl"></div>
            <div><label class="label-hint">天數</label><input v-model="course.days" type="number" class="input-line !text-xl font-medium"></div>
          </div>
          <div><label class="label-hint">摘要簡介</label><textarea v-model="course.desc" class="input-line h-24 resize-none leading-relaxed"></textarea></div>
          
          <!-- Banner 圖 -->
          <div class="mt-6 p-4 bg-slate-50 border rounded flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <label class="font-medium text-sm text-slate-700">主視覺配圖</label>
                <div class="flex gap-2">
                    <input v-model="course.searchKw" placeholder="輸入關鍵字..." class="border px-2 py-1 text-sm rounded outline-none w-32">
                    <button @click="searchImg(course, course.searchKw || course.title)" class="bg-slate-200 text-slate-600 px-3 py-1 rounded text-sm">搜尋圖片</button>
                </div>
            </div>
            <input v-model="course.imgUrl" class="input-line !text-sm text-slate-500 !py-2" placeholder="圖片網址將顯示於此...">
            <img v-if="course.imgUrl" :src="course.imgUrl" class="w-full h-40 object-cover rounded border mt-2">
          </div>
        </section>

        <section v-for="(day, idx) in course.itinerary" :key="idx" class="relative pt-16 border-t mt-16 border-slate-100">
            <div class="absolute top-4 left-0 text-slate-100 font-black text-7xl leading-none opacity-60">0{{ idx + 1 }}</div>
            <div class="space-y-6 relative z-10">
              <div><label class="label-hint">路線標題</label><input v-model="day.route" class="input-line font-bold !text-xl"></div>
              <div class="grid grid-cols-3 gap-8">
                <div><label class="label-hint">早餐</label><input v-model="day.b" class="input-line"></div>
                <div><label class="label-hint">午餐</label><input v-model="day.l" class="input-line"></div>
                <div><label class="label-hint">晚餐</label><input v-model="day.d" class="input-line"></div>
              </div>
              <div><label class="label-hint">行程細節說明</label><textarea v-model="day.infosStr" class="input-line h-48 leading-relaxed resize-none"></textarea></div>
              <div><label class="label-hint">入住飯店</label><input v-model="day.hotel" class="input-line"></div>
              
              <!-- 每日配圖自動化 -->
              <div class="mt-6 p-4 bg-slate-50 border rounded flex flex-col gap-2">
                  <div class="flex justify-between items-center">
                      <label class="font-medium text-sm text-slate-700">本日配圖</label>
                      <div class="flex gap-2">
                          <input v-model="day.searchKw" placeholder="輸入關鍵字..." class="border px-2 py-1 text-sm rounded outline-none w-32">
                          <button @click="searchImg(day, day.searchKw || day.route)" class="bg-slate-200 text-slate-600 px-3 py-1 rounded text-sm">搜尋圖片</button>
                      </div>
                  </div>
                  <input v-model="day.imgUrl" class="input-line !text-sm text-slate-500 !py-2" placeholder="圖片網址將顯示於此...">
                  <img v-if="day.imgUrl" :src="day.imgUrl" class="w-full h-48 object-cover rounded border mt-2">
              </div>
            </div>
        </section>

        <div class="fixed bottom-0 left-0 w-full p-6 bg-white/95 backdrop-blur-md border-t border-slate-100 flex gap-6 z-50">
            <button @click="step = 'input'" class="flex-1 text-slate-400 font-bold text-base hover:text-slate-600 transition-colors">重新解析</button>
            <button @click="saveCourse" :disabled="loading" class="flex-[3] bg-slate-900 text-white py-5 rounded-lg font-bold text-lg shadow-2xl active:scale-95 transition-all">
                {{ loading ? '資料更新中...' : '確認儲存並發布' }}
            </button>
        </div>
    </div>

    <!-- Step 3: Success -->
    <div v-if="step === 'success'" class="text-center py-40">
      <div class="text-6xl mb-10 text-green-500">✓</div>
      <h2 class="text-2xl font-bold mb-12 text-slate-800">行程發布成功</h2>
      <button @click="openSite" class="w-full bg-slate-900 text-white py-5 rounded-lg font-bold text-lg mb-6 hover:bg-slate-800 transition-colors">查看行程網頁</button>
      <button @click="reset" class="text-slate-400 text-sm underline hover:text-slate-600">處理下一份行程</button>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() { return { step: 'input', loading: false, rawText: '', course: {}, finalId: '' } },
      async mounted() {
        try {
          await liff.init({ liffId: "2008729640-bptxTkoO" });
          const id = new URLSearchParams(window.location.search).get('id');
          if (id) {
            const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/get-course?id=${id}`);
            const data = await res.json();
            this.course = { ...data, id };
            if (this.course.itinerary) {
                this.course.itinerary.forEach(d => {
                    d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || '');
                    d.searchKw = d.searchKw || ''; // 確保欄位存在
                });
            }
            this.step = 'edit';
          }
        } catch (e) {}
      },
      methods: {
        async parseDraft() {
          this.loading = true;
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/parse-draft', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: this.rawText })
            });
            const data = await res.json();
            
            // 初始化並清理變數
            data.searchKw = data.title.substring(0, 4); // Banner 預設用標題前四字搜
            data.imgUrl = '';
            
            if (data.itinerary) {
              data.itinerary = data.itinerary.map(d => ({ 
                  ...d, 
                  infosStr: Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''),
                  // AI 若沒給，則預設拿路線的純中文進行搜尋
                  searchKw: d.searchKw || d.route.replace(/[^\u4e00-\u9fa5]/g, '').substring(0, 4),
                  imgUrl: ''
              }));
            }
            
            this.course = { ...this.course, ...data };
            this.step = 'edit';
            
            // 解析完成後，【自動】觸發所有圖片的搜尋！您不需手動按！
            this.searchImg(this.course, this.course.searchKw);
            if(this.course.itinerary) {
                this.course.itinerary.forEach(d => {
                    if (d.searchKw) this.searchImg(d, d.searchKw);
                });
            }
          } catch (e) { alert("解析失敗，請確認網路連線"); }
          finally { this.loading = false; }
        },
        async searchImg(targetObj, keyword) {
            if (!keyword) return;
            try {
                const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/search-image?q=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                targetObj.imgUrl = data.url;
            } catch (e) { console.error("搜圖失敗"); }
        },
        async saveCourse() {
          this.loading = true;
          if (this.course.itinerary) {
            this.course.itinerary.forEach(d => d.infos = d.infosStr.split('\n').filter(Boolean));
          }
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/save-course', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.course)
            });
            const result = await res.json();
            if (result.success) { this.finalId = result.id; this.step = 'success'; }
          } catch (e) { alert("儲存失敗"); }
          finally { this.loading = false; }
        },
        openSite() { if (this.finalId) window.open(`https://fangwl591021.github.io/travelman/travel_website.html?id=${this.finalId}`, '_blank'); },
        reset() { location.href = "index.html"; }
      }
    }).mount('#app');
  </script>
</body>
</html>
