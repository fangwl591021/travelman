<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行管家 - 文案智能上稿</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: 'PingFang TC', sans-serif; background-color: #f1f5f9; }
    textarea { scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div id="app" class="w-full max-w-xl">
    <div v-if="loading" class="text-center text-slate-400 font-bold">系統初始化...</div>

    <div v-else class="bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-slate-50">
        <div class="flex items-center gap-3 mb-6">
          <span class="text-3xl">📝</span>
          <h1 class="text-2xl font-black text-slate-800 tracking-tight">智能文案上稿</h1>
        </div>

        <div v-if="!processing && !resultUrl">
          <p class="text-slate-400 text-xs mb-4">請將 NotebookLM 解析出的行程文字貼在下方：</p>
          <textarea v-model="rawText" class="w-full h-80 p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 focus:border-[#174a5a] focus:ring-0 transition-all text-sm leading-relaxed outline-none" placeholder="在此貼入行程內容..."></textarea>
          
          <button @click="submitText" :disabled="!rawText" class="w-full mt-6 bg-[#174a5a] text-white py-5 rounded-2xl font-bold shadow-xl shadow-teal-900/20 active:scale-95 transition-all disabled:opacity-30">
            開始合成文章網頁
          </button>
        </div>

        <div v-if="processing" class="py-16 text-center">
          <div class="inline-block animate-spin w-12 h-12 border-4 border-[#174a5a] border-t-transparent rounded-full mb-6"></div>
          <p class="text-slate-800 font-black">AI 正在合成圖片與文章...</p>
          <p class="text-slate-400 text-xs mt-2">這包含結構化與自動媒合圖庫</p>
        </div>

        <div v-if="resultUrl" class="py-10 text-center">
          <div class="text-6xl mb-6">✨</div>
          <h3 class="text-xl font-black text-slate-800 mb-6">行程網站合成成功</h3>
          <button @click="openSite" class="w-full bg-[#174a5a] text-white py-5 rounded-2xl font-bold shadow-xl mb-4">預覽圖文行程</button>
          <button @click="reset" class="text-slate-400 font-bold">上傳下一份文案</button>
        </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    const liffId = "2008729640-bptxTkoO";

    createApp({
      data() { return { loading: true, rawText: '', processing: false, resultUrl: null } },
      async mounted() {
        await liff.init({ liffId });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        this.loading = false;
      },
      methods: {
        async submitText() {
          this.processing = true;
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/upload-text', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: this.rawText })
            });
            const data = await res.json();
            if (data.success) {
              this.resultUrl = `https://fangwl591021.github.io/travelman/travel_website.html?id=${data.courseId}`;
            } else { alert("合成失敗：" + data.msg); }
          } catch (e) { alert("連線超時"); }
          finally { this.processing = false; }
        },
        openSite() { liff.openWindow({ url: this.resultUrl, external: true }); },
        reset() { this.rawText = ''; this.resultUrl = null; }
      }
    }).mount('#app');
  </script>
</body>
</html>
