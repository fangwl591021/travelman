    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @keyframes run { 0% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-8px) rotate(5deg); } 50% { transform: translateY(0) rotate(0deg); } 75% { transform: translateY(-8px) rotate(-5deg); } 100% { transform: translateY(0) rotate(0deg); } }

<body class="bg-gray-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef, useCallback } = React;

    const IconWrapper = ({ children, className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const Search = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Calendar = ({ className }) => <IconWrapper className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
    const Type = ({ className }) => <IconWrapper className={className}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></IconWrapper>;
    const UploadCloud = ({ className }) => <IconWrapper className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></IconWrapper>;
    const ImageIcon = ({ className }) => <IconWrapper className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const Send = ({ className }) => <IconWrapper className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconWrapper>;
    const Sparkles = ({ className }) => <IconWrapper className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
    const CheckCircle = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
    const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
    const X = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
    const Edit2 = ({ className }) => <IconWrapper className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const Trash2 = ({ className }) => <IconWrapper className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
    const Camera = ({ className }) => <IconWrapper className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
    const UserIcon = ({ className }) => <IconWrapper className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
    const ArrowLeft = ({ className }) => <IconWrapper className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconWrapper>;
    const ArrowUp = ({ className }) => <IconWrapper className={className}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></IconWrapper>;
    const ClipboardList = ({ className }) => <IconWrapper className={className}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></IconWrapper>;
    const LinkIcon = ({ className }) => <IconWrapper className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></IconWrapper>;
    const Smartphone = ({ className }) => <IconWrapper className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></IconWrapper>;
    const BadgeDollarSign = ({ className }) => <IconWrapper className={className}><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></IconWrapper>;
    const FileCheck = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></IconWrapper>;
    const Settings = ({ className }) => <IconWrapper className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;

    const RunningMan = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="16" cy="5" r="2"/><path d="M12 9l3-2 1.5 2.5"/><path d="M10.5 16.5L8 11h3l2.5 4 4.5-1.5"/><path d="M14.5 22l-2-6-3.5 2.5"/><path d="M5.5 22L8 17"/>
      </svg>
    );

    const WORKER_URL  = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev';
    const LIFF_ID     = '2009367829-BDZCGti8';
    const ENDPOINT_URL= 'https://fangwl591021.github.io/travelman/';
    const LOGIN_URL   = 'login.html';
    const MODEL_URL   = 'model.html'; // ← 新增：推廣工具頁面

    const formatPhone = (phone) => {
      if (!phone) return '';
      const p = String(phone).trim();
      if (p.length === 9 && p.startsWith('9')) return '0' + p;
      return p;
    };


    /* ===== Legacy UI → New API compatibility layer ===== */
    const getCompatTenantId = () => {
      const q = new URLSearchParams(window.location.search);
      return q.get('tenantId') || localStorage.getItem('tk_tenant_id') || localStorage.getItem('travelman_tenant_id') || 't001';
    };

    const safeJsonParse = (value, fallback) => {
      try {
        if (!value) return fallback;
        if (Array.isArray(value) || typeof value === 'object') return value;
        return JSON.parse(value);
      } catch (e) {
        return fallback;
      }
    };

    const arrayToNotes = (value) => {
      const arr = safeJsonParse(value, []);
      if (!Array.isArray(arr)) return '';
      return arr.map(v => typeof v === 'string' ? v : (v?.title || v?.name || v?.label || v?.content || '')).filter(Boolean).join(' / ');
    };

    const mapNewItineraryToOld = (it) => ({
      id: String(it.itineraryId || it.id || Date.now()),
      title: it.title || '',
      region: it.region || it.country || '',
      price: Number(it.price || 0),
      days: Number(it.days || 0),
      startDate: it.departureDate || it.startDate || '',
      endDate: it.returnDate || it.endDate || '',
      image: it.coverImageUrl || it.image || '',
      description: it.description || it.subtitle || '',
      notes: arrayToNotes(it.highlightsJson || it.notes || []),
      _raw: it
    });

    const mapOldToNew = (item, overrides = {}) => ({
      tenantId: getCompatTenantId(),
      itineraryId: String(overrides.itineraryId || item.id || item.itineraryId || Date.now()),
      title: item.title || '',
      subtitle: item.subtitle || '',
      region: item.region || '',
      country: item.country || '',
      city: item.city || '',
      days: Number(item.days || 0),
      nights: Number(item.nights || 0),
      price: Number(item.price || 0),
      currency: item.currency || 'TWD',
      departureDate: item.startDate || item.departureDate || '',
      returnDate: item.endDate || item.returnDate || '',
      status: overrides.status || item.status || 'published',
      productType: item.productType || 'group_tour',
      coverImageUrl: item.image || item.coverImageUrl || '',
      galleryJson: safeJsonParse(item.galleryJson, []),
      highlightsJson: safeJsonParse(item.highlightsJson, safeJsonParse(item.notes, [])),
      description: item.description || '',
      dayByDayJson: safeJsonParse(item.dayByDayJson, []),
      includesJson: safeJsonParse(item.includesJson, []),
      excludesJson: safeJsonParse(item.excludesJson, []),
      noticeJson: safeJsonParse(item.noticeJson, []),
      faqJson: safeJsonParse(item.faqJson, []),
      tagsJson: safeJsonParse(item.tagsJson, []),
      promoConfigJson: safeJsonParse(item.promoConfigJson, {}),
      draftId: item.draftId || '',
      createdBy: item.createdBy || 'legacy_index',
      updatedBy: 'legacy_index'
    });

    const jsonResponse = (obj, status = 200) => new Response(JSON.stringify(obj), {
      status,
      headers: { 'Content-Type': 'application/json; charset=utf-8' }
    });

    const realFetch = window.fetch.bind(window);

    const getLocalOrders = () => {
      try { return JSON.parse(localStorage.getItem('tk_local_orders') || '[]'); } catch(e) { return []; }
    };
    const setLocalOrders = (orders) => localStorage.setItem('tk_local_orders', JSON.stringify(orders || []));
    const setLocalMember = (data) => localStorage.setItem('tk_member_profile', JSON.stringify(data || {}));
    const getLocalMember = () => { try { return JSON.parse(localStorage.getItem('tk_member_profile') || 'null'); } catch(e) { return null; } };

    window.fetch = async function(input, init = {}) {
      const url = typeof input === 'string' ? input : (input && input.url ? input.url : '');
      const method = ((init && init.method) || (typeof input !== 'string' && input && input.method) || 'GET').toUpperCase();
      if (!url || !url.startsWith(WORKER_URL)) return realFetch(input, init);

      const u = new URL(url, window.location.origin);
      const tenantId = getCompatTenantId();

      // ---- old AI upload endpoint -> new AI upload endpoint ----
      if (u.pathname === '/api/upload-dm' && method === 'POST') {
        const body = typeof init.body === 'string' ? JSON.parse(init.body || '{}') : {};
        const res = await realFetch(`${WORKER_URL}/api/ai/upload-dm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tenantId,
            imageBase64: body.image || body.imageBase64 || '',
            createdBy: 'legacy_index',
            sourceType: 'dm_image'
          })
        });
        const out = await res.json().catch(() => ({}));
        const p = out.parsed || out.data?.parsed || out.data || {};
        const legacy = {
          id: Date.now(),
          title: p.title || '',
          region: p.region || p.country || '',
          price: Number(p.price || 0),
          days: Number(p.days || 0),
          startDate: p.departureDate || p.startDate || '',
          endDate: p.returnDate || p.endDate || '',
          image: '',
          description: p.description || p.subtitle || '',
          notes: Array.isArray(p.highlights) ? p.highlights.join(' / ') : arrayToNotes(p.highlightsJson || []),
          draftId: out.draftResult?.data?.draftId || out.draftResult?.draftId || ''
        };
        return jsonResponse({ success: !!out.ok, data: legacy, raw: out }, out.ok ? 200 : 500);
      }

      // ---- old catch-all itineraries endpoint -> compatibility adapter ----
      if (u.pathname === '/api/itineraries') {
        // GET list / query actions
        if (method === 'GET') {
          const action = u.searchParams.get('action') || '';

          if (!action) {
            const res = await realFetch(`${WORKER_URL}/api/public/itineraries?tenantId=${encodeURIComponent(tenantId)}`);
            const out = await res.json().catch(() => ({}));
            const items = out?.data?.items || out?.data || [];
            const mapped = Array.isArray(items) ? items.filter(it => String(it.status || '').toLowerCase() !== 'inactive').map(mapNewItineraryToOld) : [];
            window.__LEGACY_IT_RAW = {};
            mapped.forEach(m => { window.__LEGACY_IT_RAW[String(m.id)] = m._raw || {}; });
            return jsonResponse(mapped);
          }

          if (action === 'checkUserStatus') {
            const uid = u.searchParams.get('uid') || '';
            const member = getLocalMember();
            const isMe = member && member.uid === uid;
            return jsonResponse({
              success: true,
              data: isMe ? {
                role: 'user',
                isAdmin: false,
                status: 'approved',
                userData: { phone: member.phone || '', name: member.name || '' }
              } : {
                role: 'guest',
                isAdmin: false,
                status: 'guest'
              }
            });
          }

          if (action === 'getUserOrders') {
            const uid = u.searchParams.get('uid') || '';
            const list = getLocalOrders().filter(o => String(o.uid || '') === String(uid));
            return jsonResponse({ success: true, data: list });
          }

          if (action === 'getDistributorPerformance') {
            return jsonResponse({ success: true, users: [], orders: [] });
          }

          if (action === 'getDistributors') return jsonResponse([]);
          if (action === 'getUsers') return jsonResponse([]);
          if (action === 'getAllOrders') return jsonResponse({ success: true, data: getLocalOrders() });
        }

        // POST actions
        if (method === 'POST') {
          const body = typeof init.body === 'string' ? JSON.parse(init.body || '{}') : {};
          const action = body.action || '';

          if (action === 'registerUser') {
            const payload = {
              tenantId,
              uid: body.uid || '',
              name: body.name || '',
              phone: body.phone || '',
              email: body.email || '',
              role: 'member',
              status: 'active',
              refDistributorUid: body.ref_uid || body.refUid || ''
            };
            try {
              await realFetch(`${WORKER_URL}/api/member/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
            } catch (e) {}
            setLocalMember({ uid: payload.uid, name: payload.name, phone: payload.phone, refUid: payload.refDistributorUid });
            return jsonResponse({ success: true, data: payload });
          }

          if (action === 'addOrder') {
            const orderId = 'ORD' + Date.now();
            const order = {
              orderId,
              tenantId,
              itineraryId: String(body.tourId || body.itineraryId || ''),
              uid: body.uid || '',
              customerName: body.contactName || '',
              customerPhone: body.contactPhone || '',
              qty: Number(body.pax || 1),
              totalAmount: Number(body.totalAmount || body.price || 0),
              refUid: body.ref_uid || body.refUid || '',
              createdAt: new Date().toISOString(),
              status: 'pending'
            };
            const orders = getLocalOrders();
            orders.unshift(order);
            setLocalOrders(orders);
            return jsonResponse({ success: true, data: order, orderId });
          }

          if (action === 'updateOrder') {
            const orders = getLocalOrders();
            const idx = orders.findIndex(o => String(o.orderId) === String(body.orderId));
            if (idx > -1) {
              orders[idx] = { ...orders[idx], ...body };
              setLocalOrders(orders);
            }
            return jsonResponse({ success: true });
          }

          if (action === 'uploadImage') {
            return jsonResponse({ success: true, url: body.base64 || '' });
          }

          if (action === 'addItinerary' || action === 'updateItinerary') {
            const payload = mapOldToNew(body, { status: body.status || 'published' });
            const res = await realFetch(`${WORKER_URL}/api/admin/save-itinerary`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            const out = await res.json().catch(() => ({}));
            return jsonResponse({ success: !!(out && out.ok !== false), data: out.data || out, message: out.message || '' }, out && out.ok === false ? 500 : 200);
          }

          if (action === 'deleteItinerary') {
            const id = String(body.id || '');
            let raw = (window.__LEGACY_IT_RAW && window.__LEGACY_IT_RAW[id]) || null;
            if (!raw) {
              const r = await realFetch(`${WORKER_URL}/api/public/itinerary?tenantId=${encodeURIComponent(tenantId)}&itineraryId=${encodeURIComponent(id)}`);
              const o = await r.json().catch(() => ({}));
              raw = o?.data?.data || o?.data || null;
            }
            if (!raw) return jsonResponse({ success: false, message: '找不到行程' }, 404);
            const payload = { ...raw, itineraryId: raw.itineraryId || id, title: raw.title || body.title || '未命名行程', status: 'inactive', updatedBy: 'legacy_index' };
            const res = await realFetch(`${WORKER_URL}/api/admin/save-itinerary`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            const out = await res.json().catch(() => ({}));
            return jsonResponse({ success: !!(out && out.ok !== false), data: out.data || out }, out && out.ok === false ? 500 : 200);
          }

          if (action === 'updateDistributorInfo') {
            localStorage.setItem('tk_local_distributor', JSON.stringify(body || {}));
            return jsonResponse({ success: true, data: body });
          }
        }
      }

      return realFetch(input, init);
    };
    /* ===== /compatibility layer ===== */

    // buildFlexMessage 保留供 action=share/send 自動處理流程使用
    const buildFlexMessage = (tourItem, distributorData, refUidStr, options) => {
      const trackingUrl = `${ENDPOINT_URL}?t=${tourItem.id}&r=${refUidStr || 'GUEST'}`;
      const optsStr = [options.phone, options.line, options.lineAt, options.fb, options.web, options.map].map(b=>b?'1':'0').join('');
      const shareLiffUrl = `https://liff.line.me/${LIFF_ID}?action=share&t=${tourItem.id}&r=${refUidStr || ''}&o=${optsStr}`;
      const buttons = [

          "body": { "type": "box", "layout": "vertical", "contents": [
              { "type": "text", "text": tourItem.title, "weight": "bold", "size": "xl", "wrap": true },
              { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                  { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "天數", "color": "#aaaaaa", "size": "sm", "flex": 1 }, { "type": "text", "text": `${tourItem.days} 天`, "wrap": true, "color": "#666666", "size": "sm", "flex": 5 } ] },
                  { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "價格", "color": "#aaaaaa", "size": "sm", "flex": 1 }, { "type": "text", "text": `TWD ${Number(tourItem.price).toLocaleString()}`, "wrap": true, "color": "#b82337", "size": "md", "weight": "bold", "flex": 5 } ] },
                  { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "介紹", "color": "#aaaaaa", "size": "sm", "flex": 1 }, { "type": "text", "text": tourItem.description ? tourItem.description.substring(0, 120) + '...' : '點擊下方按鈕了解行程！', "wrap": true, "maxLines": 5, "color": "#666666", "size": "sm", "flex": 5 } ] }
                ] } ] },
          "footer": { "type": "box", "layout": "vertical", "spacing": "sm", "contents": buttons, "flex": 0 }
        }
      };
    };

    const renderAgencyBlogDescription = (text) => {
      if (!text) return null;
      const lines = text.split('\n');
      const blocks = [];
      let currentBlock = { type: 'intro', dayText: '行程介紹', title: '', content: [], meals: [], hotels: [] };
      let inMeal = false; let inHotel = false;
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) { currentBlock.content.push({ type: 'space' }); continue; }
        const dayMatch = line.match(/^(Day\s*\d+|第\s*[\d一二三四五六七八九十]+\s*天)(.*)/i);
        if (dayMatch) {
          if (currentBlock.content.length > 0 || currentBlock.meals.length > 0 || currentBlock.hotels.length > 0 || currentBlock.dayText !== '行程介紹') blocks.push(currentBlock);
          currentBlock = { type: 'day', dayText: dayMatch[1].replace(/\s+/g, ''), title: dayMatch[2].replace(/^[:：\-\s]+/, ''), content: [], meals: [], hotels: [] };
          inMeal = false; inHotel = false; continue;
        }
        if (line.match(/^(餐食|早餐|午餐|晚餐)[:：]/)) { inMeal = true; inHotel = false; currentBlock.meals.push(line); continue; }
        if (line.match(/^(住宿|飯店|旅館|酒店)[:：]/)) { inHotel = true; inMeal = false; currentBlock.hotels.push(line); continue; }
        if (inMeal && line.match(/^(早餐|午餐|晚餐|早|午|晚)[:：]/)) { currentBlock.meals.push(line); continue; }
        if (inHotel && line.length < 40) { currentBlock.hotels.push(line); continue; }
        inMeal = false; inHotel = false;
        const parts = line.split(/(!\[.*?\]\(.*?\))/g);
        const parsedLine = parts.filter(p => p).map((part) => {
          const mdMatch = part.match(/^!\[(.*?)\]\((.*?)\)$/);
          if (mdMatch) return { type: 'image', alt: mdMatch[1], url: mdMatch[2] };
          if (part.startsWith('http') && !part.includes(' ') && parts.length === 1) return { type: 'image', alt: '圖片', url: part };
          return { type: 'text', text: part };
        });
        currentBlock.content.push({ type: 'mixed', elements: parsedLine });
      }
      blocks.push(currentBlock);
      return blocks.map((block, bIdx) => (
        <div key={bIdx} className="mb-12 w-full max-w-full">
          {block.dayText !== '行程介紹' && (
            <div className="mb-10 mt-16 w-full">
              <div className="text-center relative mb-8"><div className="absolute top-1/2 left-0 w-full border-t-[2px] border-dashed border-[#b82337] -z-10"></div><h2 className="inline-block px-6 bg-white text-4xl md:text-5xl font-black text-gray-900 tracking-widest">{block.dayText}</h2></div>
              {block.title && (<div className="flex items-start mb-6 px-2"><span className="text-[#b82337] font-light text-2xl mr-3 flex-shrink-0">— {block.dayText.replace(/\D/g, '') || '*'}</span><h3 className="text-xl md:text-2xl font-bold text-gray-800 leading-snug pt-0.5">{block.title}</h3></div>)}
            </div>
          )}
          <div className="text-[1.15rem] leading-[2.2] text-gray-700 tracking-wide text-justify w-full break-words">
            {block.content.map((item, idx) => {
              if (item.type === 'space') return <div key={idx} className="h-6"></div>;
              if (item.type === 'mixed') {
                return (
                  <p key={idx} className="mb-5 break-words whitespace-pre-wrap">
                    {item.elements.map((el, eIdx) => {
                      if (el.type === 'image') return (
                        <span key={eIdx} className="block my-10 w-full relative group">
                          <img src={el.url} className="w-full h-auto max-w-full object-cover rounded-none md:rounded-2xl max-h-[800px] border border-gray-100" alt={el.alt} onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }} />
                          <span className="hidden bg-blue-50 p-5 border-l-[6px] border-blue-500 my-4 rounded-lg text-sm text-blue-800 shadow-sm font-medium tracking-wider w-full overflow-hidden break-words"><span className="font-extrabold mr-2 text-red-600">⚠️ 防盜鏈阻擋：</span>原網站禁止直接顯示圖片，請改用系統「上傳雲端圖片」按鈕，或 <a href={el.url} target="_blank" rel="noreferrer" className="text-blue-600 hover:text-blue-800 underline font-bold">點此查看圖片</a></span>
                        </span>
                      );
                      return <span key={eIdx}>{el.text}</span>;
                    })}
                  </p>
                );
              }
              return null;
            })}
          </div>
          {(block.meals.length > 0 || block.hotels.length > 0) && (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mt-10">
              {block.meals.length > 0 && (<div className="border border-gray-200 p-6 flex items-start bg-white w-full rounded-md shadow-sm hover:shadow-md transition"><div className="text-3xl mr-4 opacity-90 flex-shrink-0 text-[#b82337]">🍽️</div><div className="w-full border-l-[3px] border-[#b82337] pl-5 min-w-0"><p className="font-bold text-gray-900 mb-2 text-lg">餐食</p><div className="space-y-1 text-gray-600 font-medium text-[0.95rem] break-words">{block.meals.map((m, mIdx) => { const parts = m.split(/[:：](.+)/); if (parts.length > 1) return (<div key={mIdx} className="flex"><span className="font-bold text-gray-900 w-14 flex-shrink-0">{parts[0]}</span><span className="text-gray-600 break-words flex-1">: {parts[1]}</span></div>); return <p key={mIdx}>{m}</p>; })}</div></div></div>)}
              {block.hotels.length > 0 && (<div className="border border-gray-200 p-6 flex items-start bg-white w-full rounded-md shadow-sm hover:shadow-md transition"><div className="text-3xl mr-4 opacity-90 flex-shrink-0 text-[#b82337]">🏨</div><div className="w-full border-l-[3px] border-[#b82337] pl-5 min-w-0"><p className="font-bold text-gray-900 mb-2 text-lg">住宿</p><div className="space-y-1 text-gray-600 font-medium text-[0.95rem] break-words">{block.hotels.map((h, hIdx) => { const parts = h.split(/[:：](.+)/); if (parts.length > 1) return (<div key={hIdx} className="flex"><span className="font-bold text-gray-900 w-14 flex-shrink-0">{parts[0]}</span><span className="text-gray-600 break-words flex-1">: {parts[1]}</span></div>); return <p key={hIdx}>{h}</p>; })}</div></div></div>)}
            </div>
          )}
        </div>
      ));
    };

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const actionParam = urlParams.get('action');
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home');
      const [tourDetailTab, setTourDetailTab] = useState('itinerary');
      const [shareStatusText, setShareStatusText] = useState('搜尋中...');
      const [selectedTourId, setSelectedTourId] = useState(() => urlParams.get('t') || urlParams.get('tour_id') || null);
      const [refUid, setRefUid] = useState(() => {
        const urlRef = urlParams.get('r') || urlParams.get('ref_uid');
        if (urlRef) localStorage.setItem('tracking_ref_uid', urlRef);
        return urlRef || localStorage.getItem('tracking_ref_uid') || '';
      });

      const [crmSubTab, setCrmSubTab] = useState('orders');
      const [distPanel, setDistPanel] = useState('tours');
      const [itineraries, setItineraries] = useState([]);
      const [toast, setToast] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [isUploadingImage, setIsUploadingImage] = useState(false);
      const [isInsertingContentImage, setIsInsertingContentImage] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      const [liffProfile, setLiffProfile] = useState(null);
      const [isLiffReady, setIsLiffReady] = useState(false);
      const [distributorStatus, setDistributorStatus] = useState(null);
      const [isGeneralMember, setIsGeneralMember] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);

      const [myDistributorData, setMyDistributorData] = useState(null);
      const [myUserData, setMyUserData] = useState(null);
      const [distributorStats, setDistributorStats] = useState({ users: [], orders: [] });
      const [isStatusChecked, setIsStatusChecked] = useState(false);

      const [crmDistributors, setCrmDistributors] = useState([]);
      const [crmUsers, setCrmUsers] = useState([]);
      const [crmOrders, setCrmOrders] = useState([]);
      const [myOrders, setMyOrders] = useState([]);

      const [searchOpen, setSearchOpen] = useState(false); // mobile collapse
      const [searchRegion, setSearchRegion] = useState('');
      const [searchStartDate, setSearchStartDate] = useState('');
      const [searchEndDate, setSearchEndDate] = useState('');
      const [searchKeyword, setSearchKeyword] = useState('');
      const [filteredResults, setFilteredResults] = useState([]);

      const [distOrderSearchMonth, setDistOrderSearchMonth] = useState('');
      const [distOrderSearchKeyword, setDistOrderSearchKeyword] = useState('');

      const [crmOrderSearchMonth, setCrmOrderSearchMonth] = useState('');
      const [crmOrderSearchKeyword, setCrmOrderSearchKeyword] = useState('');

      const [bannerImage, setBannerImage] = useState(() => localStorage.getItem('travel_keeper_banner') || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80');
      const [uploadMode, setUploadMode] = useState('dm');
      const [ocrStatus, setOcrStatus] = useState('idle');

      const [draftData, setDraftData] = useState({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '', notes: '' });
      const [deleteModalId, setDeleteModalId] = useState(null);
      const [bookingModalData, setBookingModalData] = useState(null);
      const [editingDistributor, setEditingDistributor] = useState(null);
      const [editFormData, setEditFormData] = useState({});
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [promoToolOpen, setPromoToolOpen] = useState(false);
      const [promoSearchKw, setPromoSearchKw] = useState('');
      const [promoSearchRegion, setPromoSearchRegion] = useState('');

      // ★ 推廣名片功能
      const [distCardMode, setDistCardMode] = useState('single'); // 'single' | 'multi'
      const [distSelectedIds, setDistSelectedIds] = useState(new Set());
      const [flexModalItem, setFlexModalItem] = useState(null);
      const [cardOptions, setCardOptions] = useState({ phone:false, line:false, lineAt:false, fb:false, web:false, map:false });
      const [multiFlexOpen, setMultiFlexOpen] = useState(false);
      const [multiHeroUrl, setMultiHeroUrl] = useState('');
      const [multiBtnColor, setMultiBtnColor] = useState('#00B900');
      const [multiBtnTxt, setMultiBtnTxt] = useState('#FFFFFF');
      const [multiSocOpts, setMultiSocOpts] = useState({ YT:false, FB:false, IG:false, LINE:false, MAP:false, TEL:false });

      const articleTopRef = useRef(null);
      const priceCardAnchorRef = useRef(null);
      const articleBodyRef = useRef(null);
      const [priceCardStyle, setPriceCardStyle] = useState({});

      useEffect(() => {
        if (!selectedTourId) return;
        const CARD_WIDTH = 360;
        const TOP_OFFSET = 130;
        const updateCardPos = () => {
          if (!priceCardAnchorRef.current || !articleBodyRef.current) return;
          const anchorRect  = priceCardAnchorRef.current.getBoundingClientRect();
          const articleRect = articleBodyRef.current.getBoundingClientRect();
          const rightGap    = window.innerWidth - anchorRect.right;
          if (articleRect.top > TOP_OFFSET) { setPriceCardStyle({ display: 'none' }); }
          else { setPriceCardStyle({ position:'fixed', top:TOP_OFFSET+'px', right:Math.max(rightGap,12)+'px', width:CARD_WIDTH+'px', zIndex:20, display:'block' }); }
        };
        const tid = setTimeout(updateCardPos, 80);
        window.addEventListener('scroll', updateCardPos, { passive: true });
        window.addEventListener('resize', updateCardPos, { passive: true });
        return () => { clearTimeout(tid); window.removeEventListener('scroll', updateCardPos); window.removeEventListener('resize', updateCardPos); };
      }, [selectedTourId]);

      const getTimestamp = () => new Date().getTime();

      useEffect(() => { initLiff(); fetchItineraries(); }, []);

      useEffect(() => {
        const processAutoAction = async () => {
          if (!isLiffReady || isLoading || !liffProfile) return;
          const tourId    = urlParams.get('t') || urlParams.get('tour_id');
          const rUid      = urlParams.get('r') || urlParams.get('ref_uid');
          const optsParam = urlParams.get('o') || urlParams.get('opts') || '000000';
          const tour      = itineraries.find(i => String(i.id) === String(tourId));
          if (!tour) { setShareStatusText('❌ 找不到該行程資訊'); setTimeout(() => window.location.replace(ENDPOINT_URL), 2000); return; }
          let targetDistData = {};
          if (rUid === liffProfile.userId && myDistributorData) { targetDistData = myDistributorData; }
          else if (rUid) {
            try {
              const res  = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${rUid}&_t=${getTimestamp()}`);
              const data = await res.json();
              if (data.success && data.data.role === 'distributor') targetDistData = data.data.distributorData;
            } catch(e) {}
          }
          const cOptions = { phone:optsParam[0]==='1', line:optsParam[1]==='1', lineAt:optsParam[2]==='1', fb:optsParam[3]==='1', web:optsParam[4]==='1', map:optsParam[5]==='1' };
          const flexMsg  = buildFlexMessage(tour, targetDistData, rUid, cOptions);
          if (actionParam === 'send') {
            setShareStatusText("極速傳送中...");
            try {
              const context = liff.getContext();
              if (context && context.type !== 'none' && context.type !== 'external') { await liff.sendMessages([flexMsg]); liff.closeWindow(); }
              else { setShareStatusText('電腦版無聊天室，即將展開網頁...'); setTimeout(() => window.location.replace(`${ENDPOINT_URL}?t=${tourId}&r=${rUid}`), 1000); }
            } catch(e) { window.location.replace(`${ENDPOINT_URL}?t=${tourId}&r=${rUid}`); }
          } else if (actionParam === 'share') {
            setShareStatusText("準備通訊錄...");
            try { await liff.shareTargetPicker([flexMsg]); liff.closeWindow(); }
            catch(e) { if (e.message && e.message.includes('not allowed')) { liff.logout(); window.location.reload(); } else { liff.closeWindow(); } }
          }
        };
        if (actionParam === 'share' || actionParam === 'send') processAutoAction();
      }, [isLiffReady, isLoading, liffProfile, actionParam]);

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          setIsLiffReady(true);
          if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); }
          else {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            const activeRef = urlParams.get('r') || urlParams.get('ref_uid') || localStorage.getItem('tracking_ref_uid');
            if (activeRef && activeRef !== profile.userId) {
              fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'registerUser', uid:profile.userId, name:profile.displayName, ref_uid:activeRef }) }).catch(e => console.error("Silent tracking error", e));
            }
            checkMyStatus(profile.userId);
          }
        } catch(err) { console.error('LIFF 初始化失敗', err); }
      };

      const checkMyStatus = async (uid) => {
        try {
          const res  = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${uid}&_t=${getTimestamp()}`);
          const data = await res.json();
          if (data.success) {
            const info = data.data;
            if (info.isAdmin) setIsAdmin(true);
            if (info.role === 'distributor') { setDistributorStatus(info.status ? info.status.toString().trim().toLowerCase() : 'pending'); setMyDistributorData(info.distributorData); setIsGeneralMember(true); fetchUserOrders(uid); }
            if (info.role === 'user') { if (info.userData && info.userData.phone) { setMyUserData(info.userData); setIsGeneralMember(true); fetchUserOrders(uid); } }
          }
        } catch(e) { console.error('Status check error', e); } finally { setIsStatusChecked(true); }
      };

      useEffect(() => {
        if (activeTab === 'crm' && isAdmin) fetchFullCrmData();
        if (activeTab === 'distributor' && distributorStatus === 'approved' && liffProfile) fetchDistributorStats(liffProfile.userId);
        if (activeTab === 'member' && isGeneralMember && liffProfile) fetchUserOrders(liffProfile.userId);
      }, [activeTab, isAdmin, distributorStatus, isGeneralMember, liffProfile]);

      const fetchUserOrders = async (uid) => {
        try {
          const res  = await fetch(`${WORKER_URL}/api/itineraries?action=getUserOrders&uid=${uid}&_t=${getTimestamp()}`);
          const data = await res.json();
          if (data.success) setMyOrders(data.data);
        } catch(e) { console.error('Fetch Orders error', e); }
      };

      const fetchDistributorStats = async (uid) => {
        try {
          const res  = await fetch(`${WORKER_URL}/api/itineraries?action=getDistributorPerformance&uid=${uid}&_t=${getTimestamp()}`);
          const data = await res.json();
          if (data.success) setDistributorStats({ users: data.users || [], orders: data.orders || [] });
        } catch(e) { console.error('Fetch Dist Stats error', e); }
      };

      const fetchFullCrmData = async () => {
        try {
          const [resD, resU, resO] = await Promise.all([
            fetch(`${WORKER_URL}/api/itineraries?action=getDistributors&_t=${getTimestamp()}`),
            fetch(`${WORKER_URL}/api/itineraries?action=getUsers&_t=${getTimestamp()}`),
            fetch(`${WORKER_URL}/api/itineraries?action=getAllOrders&_t=${getTimestamp()}`)
          ]);
          const [dataD, dataU, dataO] = await Promise.all([resD.json(), resU.json(), resO.json()]);
          setCrmDistributors(Array.isArray(dataD) ? dataD : []);
          setCrmUsers(Array.isArray(dataU) ? dataU : []);
          if (dataO && dataO.success) setCrmOrders(Array.isArray(dataO.data) ? dataO.data : []);
        } catch(e) { console.error('CRM Fetch error', e); }
      };

      const fetchItineraries = async () => {
        setIsLoading(true);
        try {
          const res  = await fetch(`${WORKER_URL}/api/itineraries?_t=${getTimestamp()}`);
          const data = await res.json();
          if (data && Array.isArray(data)) { setItineraries(data); setFilteredResults(data); }
          else if (data && data.data && Array.isArray(data.data)) { setItineraries(data.data); setFilteredResults(data.data); }
        } catch(error) { console.error('Fetch error', error); } finally { setIsLoading(false); }
      };

      const handleUpdateOrder = async (orderId, field, value) => {
        setCrmOrders(prev => prev.map(o => String(o.orderId) === String(orderId) ? { ...o, [field]: value } : o));
        try {
          const res    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'updateOrder', orderId, [field]: value }) });
          const result = await res.json();
          if (result.success) showToast('✅ 訂單狀態已更新');
          else throw new Error();
        } catch(e) { showToast('❌ 更新失敗，請重試', 'error'); fetchFullCrmData(); }
      };

      const changeTab = (newTab) => { setActiveTab(newTab); setSelectedTourId(null); setTourDetailTab('itinerary'); window.history.replaceState({}, '', `?tab=${newTab}`); };
      const showToast  = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
      const loginAsDistributor = () => { window.location.href = `${LOGIN_URL}?type=distributor&ref_uid=${refUid || ''}`; };
      const loginAsMember      = () => { window.location.href = `${LOGIN_URL}?type=user&ref_uid=${refUid || ''}`; };

      // ★ 推廣工具（同頁 overlay）
      const openFlexModal = (item) => {
        if (item) { setFlexModalItem(item); setDistCardMode('single'); }
        setPromoToolOpen(true);
      };
      const openModelTool = () => { setDistCardMode('single'); setPromoToolOpen(true); };

      const fallbackCopy = (text) => {
        const ta = document.createElement('textarea'); ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showToast('✅ 網址已成功複製！'); } catch { showToast('❌ 複製失敗','error'); }
        document.body.removeChild(ta);
      };

      const handleCopyUrl = (type) => {
        const optsStr = [cardOptions.phone,cardOptions.line,cardOptions.lineAt,cardOptions.fb,cardOptions.web,cardOptions.map].map(b=>b?'1':'0').join('');
        const uid = liffProfile?.userId || '';
        let url = '';
        if (type==='share') url = `https://liff.line.me/${LIFF_ID}?action=share&t=${flexModalItem.id}&r=${uid}&o=${optsStr}`;
        else if (type==='send') url = `https://liff.line.me/${LIFF_ID}?action=send&t=${flexModalItem.id}&r=${uid}&o=${optsStr}`;
        else if (type==='web')  url = `${ENDPOINT_URL}?t=${flexModalItem.id}&r=${uid}`;
        if (!navigator.clipboard) { fallbackCopy(url); return; }
        navigator.clipboard.writeText(url).then(() => showToast('✅ 網址已成功複製！')).catch(() => fallbackCopy(url));
      };

      const triggerFlexSharing = async () => {
        if (!flexModalItem || !liffProfile) return;
        const optsStr = [cardOptions.phone,cardOptions.line,cardOptions.lineAt,cardOptions.fb,cardOptions.web,cardOptions.map].map(b=>b?'1':'0').join('');
        const opts = { phone:optsStr[0]==='1',line:optsStr[1]==='1',lineAt:optsStr[2]==='1',fb:optsStr[3]==='1',web:optsStr[4]==='1',map:optsStr[5]==='1' };
        const flexMsg = buildFlexMessage(flexModalItem, myDistributorData||{}, liffProfile.userId, opts);
        try { await liff.shareTargetPicker([flexMsg]); }
        catch(e) {
          const url = `https://liff.line.me/${LIFF_ID}?action=share&t=${flexModalItem.id}&r=${liffProfile.userId}&o=${optsStr}`;
          if (!navigator.clipboard) { fallbackCopy(url); return; }
          navigator.clipboard.writeText(url).then(()=>showToast('✅ 已複製分享連結！')).catch(()=>fallbackCopy(url));
        }
      };

      // ★ 多頁名片 Flex 建立
      const SOC_ICONS_MAP = {
        YT:'https://aiwe.cc/wp-content/uploads/2026/02/87e6f8054bd3672f2885e38bddb112e2.png',
        FB:'https://aiwe.cc/wp-content/uploads/2026/02/3986d1fd62384c8cdaa0e7c82f2740d1.png',
        IG:'https://aiwe.cc/wp-content/uploads/2026/02/0089b4a4960e49eba9140544307711c6.png',
        LINE:'https://aiwe.cc/wp-content/uploads/2026/02/b75a5831fd553c7130aeafbb9783cf79.png',
        MAP:'https://aiwe.cc/wp-content/uploads/2026/02/5af1a3a285c2bdee4192223e31e1f833.png',
        TEL:'https://aiwe.cc/wp-content/uploads/2026/02/7254567388850a6b4d77b75208ebd4b8.png',
      };
      const SOC_URLS_MAP = () => ({
        YT: myDistributorData?.webLink||'https://youtube.com',
        FB: myDistributorData?.fbLink||'https://facebook.com',
        IG: myDistributorData?.webLink||'https://instagram.com',
        LINE: myDistributorData?.lineAtLink||myDistributorData?.lineLink||'https://line.me',
        MAP: myDistributorData?.mapLink||'https://maps.google.com',
        TEL: myDistributorData?.phone ? `tel:${formatPhone(myDistributorData.phone)}` : 'https://line.me',
      });

      const buildV3Flex = (items) => {
        const uid = liffProfile?.userId || '';
        const heroUrl = multiHeroUrl || (items[0]?.image) || 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800&q=80';
        const btnColor = multiBtnColor || '#00B900';
        const btnTxt   = multiBtnTxt   || '#FFFFFF';
        const socUrls  = SOC_URLS_MAP();
        const bodyContents = items.flatMap((item, i) => {
          const trackingUrl = `${ENDPOINT_URL}?t=${item.id}&r=${uid}`;
          const row = {
            type:'box', layout:'horizontal', paddingAll:'5px',
            contents:[
              { type:'image', url:item.image||'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=400&q=70', size:'sm', aspectMode:'cover', aspectRatio:'1:1', flex:1 },
              { type:'box', layout:'vertical', flex:4, offsetStart:'8px', contents:[
                { type:'text', text:item.title, size:'xs', wrap:true, color:'#111111', weight:'bold' },
                { type:'text', text:`NT$ ${Number(item.price).toLocaleString()}`, weight:'bold', size:'xs', color:'#FF0000', margin:'xs' },
              ]},
              { type:'box', layout:'vertical', width:'36px', height:'36px', backgroundColor:btnColor, cornerRadius:'100px', justifyContent:'center', alignItems:'center', flex:0,
                contents:[{ type:'text', text:'報名', color:btnTxt, size:'xxs', weight:'bold', align:'center' }],
                action:{ type:'uri', uri:trackingUrl }
              }
            ]
          };
          return i < items.length-1 ? [row,{type:'separator',color:'#F0F0F0'}] : [row];
        });
        bodyContents.push({ type:'box', layout:'vertical', height:'8px', contents:[] });
        const checkedSocs = Object.entries(multiSocOpts).filter(([,v])=>v).map(([k])=>k);
        const footerContents = checkedSocs.length > 0
          ? checkedSocs.map(k=>({ type:'image', url:SOC_ICONS_MAP[k]||'', size:'xs', aspectRatio:'1:1', animated:true, action:{ type:'uri', uri:socUrls[k]||'https://line.me' } }))
          : [{ type:'text', text:'立即報名精選行程', size:'xs', color:'#aaaaaa', align:'center' }];
        return {
          type:'flex', altText:`精選 ${items.length} 個推薦行程`,
          contents:{ type:'bubble', size:'giga',
            hero:{ type:'box', layout:'vertical', paddingAll:'0px', contents:[{ type:'image', url:heroUrl, size:'full', aspectRatio:'12:5', aspectMode:'cover' }] },
            body:{ type:'box', layout:'vertical', paddingAll:'0px', contents:bodyContents },
            footer:{ type:'box', layout:'horizontal', paddingAll:'10px', contents:footerContents, justifyContent:'center', spacing:'lg' }
          }
        };
      };

      // ★ 多選操作
      const toggleDistCard = (id) => {
        const sid = String(id);
        setDistSelectedIds(prev => {
          const next = new Set(prev);
          if (next.has(sid)) { next.delete(sid); } else { if (next.size < 8) next.add(sid); else { showToast('最多只能選 8 個行程'); } }
          return next;
        });
      };

      const openMultiModal = () => {
        const items = [...distSelectedIds].map(id=>itineraries.find(t=>String(t.id)===id)).filter(Boolean);
        if (!items.length) return;
        if (!multiHeroUrl && items[0]?.image) setMultiHeroUrl(items[0].image);
        setPromoToolOpen(true);
      };

      const multiShareAction = async (type) => {
        const items = [...distSelectedIds].map(id=>itineraries.find(t=>String(t.id)===id)).filter(Boolean);
        if (!items.length) return;
        const flex = buildV3Flex(items);
        if (type==='copy') {
          const txt = JSON.stringify(flex, null, 2);
          if (!navigator.clipboard) { fallbackCopy(txt); return; }
          navigator.clipboard.writeText(txt).then(()=>showToast('✅ Flex JSON 已複製！貼到 LINE OA 使用')).catch(()=>fallbackCopy(txt));
        } else if (type==='picker') {
          const msg = { type:'flex', altText:`精選 ${items.length} 個推薦行程`, contents: flex.contents };
          try { await liff.shareTargetPicker([msg]); setMultiFlexOpen(false); setDistSelectedIds(new Set()); showToast('✅ 推廣卡片已成功發送！'); }

      const handleBookNow = (tour) => {
        if (!isGeneralMember) { window.location.href = `${LOGIN_URL}?type=user&ref_uid=${refUid || ''}&t=${tour.id}`; return; }

          contactName: liffProfile?.displayName || '',

          note: ''

      const submitBooking = async (e) => {
        e.preventDefault(); setIsSubmitting(true);

          if (result.success) {

            if (liffProfile) { fetchUserOrders(liffProfile.userId); if (distributorStatus === 'approved') fetchDistributorStats(liffProfile.userId); }
            if (isAdmin) fetchFullCrmData();
            setTimeout(() => { changeTab('member'); setIsSubmitting(false); }, 500);
          } else throw new Error(result.message || '報名失敗');
        } catch(err) { showToast('訂單送出失敗，請重試', 'error'); setIsSubmitting(false); }
      };

      const handleSearch = () => {
        let results = itineraries;
        if (searchRegion)    results = results.filter(item => item.region.includes(searchRegion));
        if (searchKeyword)   { const kw = searchKeyword.toLowerCase(); results = results.filter(item => (item.title && item.title.toLowerCase().includes(kw)) || (item.description && item.description.toLowerCase().includes(kw))); }
        if (searchStartDate) results = results.filter(item => item.startDate && item.startDate >= searchStartDate);
        if (searchEndDate)   results = results.filter(item => item.endDate   && item.endDate   <= searchEndDate);
        setFilteredResults(results); showToast(`為您找到 ${results.length} 筆符合的行程`);
      };

      const handleImageUploadToDrive = async (e, type = 'itinerary') => {
        const file = e.target.files[0]; if (!file) return;
        if (type === 'itinerary') setIsUploadingImage(true); else showToast('Banner 上傳中，請稍候...');
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onloadend = async () => {
          try {
            const res    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'uploadImage', base64:reader.result }) });
            const result = await res.json();
            if (result.success) {
              if (type === 'itinerary') { setDraftData({ ...draftData, image: result.url }); showToast('✅ 圖片已成功上傳！'); }
              else { setBannerImage(result.url); localStorage.setItem('travel_keeper_banner', result.url); showToast('✅ Banner 已成功更新！'); }
            } else throw new Error(result.message || result.error);
          } catch(err) { showToast('上傳失敗: ' + err.message, 'error'); } finally { if (type === 'itinerary') setIsUploadingImage(false); }
        };
      };

      const handleInsertImageToDescription = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsInsertingContentImage(true); showToast('內文圖片上傳中，請稍候...');
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onloadend = async () => {
          try {
            const res    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'uploadImage', base64:reader.result }) });
            const result = await res.json();
            if (result.success) { setDraftData(prev => ({ ...prev, description:(prev.description ? prev.description + '\n\n' : '') + `![](${result.url})\n\n` })); showToast('✅ 圖片已成功插入文案！'); }
            else throw new Error(result.message || result.error);
          } catch(err) { showToast('圖片插入失敗: ' + err.message, 'error'); } finally { setIsInsertingContentImage(false); e.target.value = null; }
        };
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setOcrStatus('processing'); setIsUploadingImage(true);
        try {
          const reader = new FileReader(); reader.readAsDataURL(file);
          reader.onloadend = async () => {
            const base64data = reader.result;
            let uploadedUrl = '';
            try {
              const driveRes    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'uploadImage', base64:base64data }) });
              const driveResult = await driveRes.json();
              if (driveResult.success) uploadedUrl = driveResult.url;
            } catch(err) { console.warn('圖片上傳失敗', err); }
            const res      = await fetch(`${WORKER_URL}/api/upload-dm`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ image:base64data }) });
            const aiResult = await res.json();
            if (aiResult.success) {
              const parsedData   = aiResult.data;
              const REGION_IMAGES = { '國旅':'https://images.unsplash.com/photo-1578338944883-7eecc7a95079?auto=format&fit=crop&w=800&q=80','亞洲':'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80','歐洲':'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=800&q=80','美洲':'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80','大洋洲':'https://images.unsplash.com/photo-1523482580672-f109ba8cb9be?auto=format&fit=crop&w=800&q=80','非洲':'https://images.unsplash.com/photo-1516426122078-c23e76319801?auto=format&fit=crop&w=800&q=80','預設':'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=800&q=80' };
              parsedData.image   = uploadedUrl || REGION_IMAGES[parsedData.region] || REGION_IMAGES['預設'];
              parsedData.id      = Date.now(); setDraftData(parsedData); showToast('✅ AI 解析完成！系統正自動寫入資料庫...');
              const newItinerary = { ...parsedData, action:'addItinerary', price:parseInt(parsedData.price, 10) || 0 };
              setItineraries(prev => [newItinerary, ...prev]);
              try {
                const dbRes    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(newItinerary) });
                const dbResult = await dbRes.json();
                if (dbResult.success) { showToast('🎉 行程已成功上架！'); setDraftData({ id:null, title:'', region:'', price:'', days:'', startDate:'', endDate:'', description:'', image:'', notes:'' }); setOcrStatus('idle'); fetchItineraries(); }
                else throw new Error('寫入失敗');
              } catch(dbErr) { setOcrStatus('done'); showToast('寫入失敗，請手動點擊「儲存」', 'error'); }
            } else throw new Error(aiResult.error || '解析失敗');
            setIsUploadingImage(false);
          };
        } catch(error) { setOcrStatus('idle'); setIsUploadingImage(false); showToast(error.message || '解析失敗', 'error'); }
      };

      const handleUpdateContent = async () => {
        if (!draftData.title) return showToast('請先填寫內容', 'error');
        const isEditing  = !!draftData.id;
        const submitData = { ...draftData, id:draftData.id || Date.now(), price:parseInt(draftData.price, 10) || 0, action:isEditing ? 'updateItinerary' : 'addItinerary' };
        try {
          const res    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(submitData) });
          const result = await res.json();
          if (result.success) { showToast(isEditing ? '修改成功！' : '新增成功！'); setDraftData({ id:null, title:'', region:'', price:'', days:'', startDate:'', endDate:'', description:'', image:'', notes:'' }); setOcrStatus('idle'); setUploadMode('dm'); fetchItineraries(); }
          else throw new Error('操作失敗');
        } catch(error) { showToast('寫入資料庫錯誤', 'error'); }
      };

      const handleEditClick = (item) => { setUploadMode('manual'); setOcrStatus('done'); setDraftData(item); window.scrollTo({ top:0, behavior:'smooth' }); };

      const confirmDelete = async () => {
        if (!deleteModalId) return;
        try {
          const res    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'deleteItinerary', id:deleteModalId }) });
          const result = await res.json();
          if (result.success) { showToast('已成功下架！'); setDeleteModalId(null); fetchItineraries(); }
          else throw new Error('刪除失敗');
        } catch(error) { showToast('下架發生錯誤', 'error'); }
      };

      const saveDistributorEdit = async () => {
        try {
          const res    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'updateDistributorInfo', ...editFormData }) });
          const result = await res.json();
          if (result.success) { showToast('✅ 經銷商資料已更新！'); setEditingDistributor(null); fetchFullCrmData(); }
          else throw new Error('儲存失敗');
        } catch(e) { showToast('更新失敗', 'error'); }
      };

      const autoFetchTgChatId = async () => {
        if (!myDistributorData?.tgToken) { showToast('請先輸入 Bot Token', 'error'); return; }
        showToast('正在轉換獲取 ID...', 'success');
        try {
          const res  = await fetch(`https://api.telegram.org/bot${myDistributorData.tgToken}/getUpdates`);
          const data = await res.json();
          if (data.ok && data.result.length > 0) {
            const latestUpdate = data.result[data.result.length - 1];
            const chatId       = latestUpdate.message?.chat?.id || latestUpdate.my_chat_member?.chat?.id;
            if (chatId) { setMyDistributorData(prev => ({ ...prev, tgChatId:String(chatId) })); showToast('✅ 成功轉換 Chat ID！請記得點擊儲存。'); }
            else throw new Error();
          } else { alert('【轉換失敗】\n請先前往 Telegram，搜尋您的機器人並隨便發送一則訊息給它，然後再次點擊「轉換」按鈕！'); }
        } catch(err) { showToast('轉換失敗，請確認 Token 是否正確', 'error'); }
      };

      const saveMySettings = async () => {
        try {
          const res    = await fetch(`${WORKER_URL}/api/itineraries`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'updateDistributorInfo', uid:liffProfile.userId, phone:myDistributorData.phone, lineLink:myDistributorData.lineLink, lineAtLink:myDistributorData.lineAtLink, fbLink:myDistributorData.fbLink, webLink:myDistributorData.webLink, mapLink:myDistributorData.mapLink, tgToken:myDistributorData.tgToken, tgChatId:myDistributorData.tgChatId }) });
          const result = await res.json();
          if (result.success) { showToast('✅ 設定已成功儲存！'); setShowSettingsModal(false); checkMyStatus(liffProfile.userId); }
          else throw new Error('儲存失敗');
        } catch(e) { showToast('設定儲存失敗，請稍後再試', 'error'); }
      };

      let roleBadge = <span className="bg-gray-100 text-gray-600 text-[11px] px-2 py-0.5 rounded font-bold border border-gray-200">訪客</span>;

      else if (distributorStatus === 'approved') roleBadge = <span className="bg-emerald-100 text-emerald-700 text-[11px] px-2 py-0.5 rounded font-bold border border-emerald-200">💼 金牌經銷商</span>;
      else if (distributorStatus === 'pending')  roleBadge = <span className="bg-yellow-100 text-yellow-700 text-[11px] px-2 py-0.5 rounded font-bold border border-yellow-200">⏳ 經銷審核中</span>;
      else if (isGeneralMember) roleBadge = <span className="bg-orange-100 text-orange-700 text-[11px] px-2 py-0.5 rounded font-bold border border-orange-200">👤 一般會員</span>;

      if (actionParam === 'share' || actionParam === 'send') {
        return (<div className="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center"><div className="text-blue-600 mb-6"><RunningMan className="w-20 h-20 animate-run" /></div><p className="text-gray-600 font-bold text-2xl tracking-widest animate-pulse">{shareStatusText}</p></div>);
      }

      // ── NAV ──────────────────────────────────────────────────────────────
      const renderNavBar = () => (
        <nav className="bg-white shadow-sm sticky top-0 z-50">
          <div className="w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12">

              <div className="flex justify-between items-center w-full md:w-auto">
                <div className="flex items-center cursor-pointer mr-8" onClick={() => changeTab('home')}><Navigation className="h-8 w-8 text-blue-600 mr-2" /><span className="font-bold text-xl tracking-wider text-blue-900">旅遊管家</span></div>
                <div className="md:hidden flex items-center">{liffProfile ? (<div className="flex items-center gap-2"><div className="flex flex-col items-end">{roleBadge}</div><img src={liffProfile.pictureUrl || 'https://via.placeholder.com/150'} className="w-9 h-9 rounded-full border-2 border-white shadow-sm object-cover" /></div>) : (<button onClick={() => liff.login({ redirectUri: window.location.href })} className="bg-[#00B900] hover:bg-[#009900] text-white px-3 py-1.5 rounded-lg text-xs font-bold transition shadow-sm">LINE 登入</button>)}</div>
              </div>
              <div className="flex items-center space-x-1 overflow-x-auto custom-scrollbar mt-3 md:mt-0 pb-1 md:pb-0 w-full md:w-auto flex-nowrap">
                <button onClick={() => changeTab('home')} className={`shrink-0 px-4 py-2 rounded-lg text-sm font-bold transition-colors ${activeTab === 'home' ? 'text-blue-700 bg-blue-50' : 'text-gray-600 hover:bg-gray-100'}`}>找行程</button>
                <button onClick={() => changeTab('member')} className={`shrink-0 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center ${activeTab === 'member' ? 'text-orange-700 bg-orange-50' : 'text-gray-600 hover:bg-gray-100'}`}><Users className="w-4 h-4 mr-1.5" /> 會員中心</button>
                <button onClick={() => changeTab('distributor')} className={`shrink-0 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center ${activeTab === 'distributor' ? 'text-emerald-700 bg-emerald-50' : 'text-gray-600 hover:bg-gray-100'}`}><Briefcase className="w-4 h-4 mr-1.5" /> 經銷商專區</button>
                {isAdmin && (<><button onClick={() => changeTab('crm')} className={`shrink-0 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center ${activeTab === 'crm' ? 'text-purple-700 bg-purple-50' : 'text-gray-600 hover:bg-gray-100'}`}>後台 CRM</button><button onClick={() => changeTab('admin')} className={`shrink-0 px-4 py-2 rounded-lg text-sm font-bold transition-colors ${activeTab === 'admin' ? 'text-blue-700 bg-blue-50' : 'text-gray-600 hover:bg-gray-100'}`}>後台上稿</button></>)}

                  </button>

              <div className="p-4 border-t border-gray-100">
                <button onClick={() => fetchDistributorStats(liffProfile.userId)} className="w-full flex items-center justify-center gap-2 text-sm text-gray-500 hover:text-emerald-600 font-bold py-2.5 rounded-lg hover:bg-gray-50 transition-colors border border-gray-200"><RefreshCw className="w-4 h-4" /> 同步資料</button>
              </div>
            </div>
            <div className="flex-1 bg-gray-50 min-h-screen">
              {isPending ? (
                <div className="flex flex-col items-center justify-center py-40 text-center px-8"><div className="text-6xl mb-6">⏳</div><h3 className="text-xl font-bold text-gray-700 mb-3">審核中，請稍候</h3><p className="text-gray-400 max-w-xs">您的經銷商申請正在審核中，開通後即可使用所有功能。</p></div>
              ) : (
                <div className="p-8 lg:p-10">{renderPanel()}</div>
              )}
            </div>
          </div>
        );

            <div className="flex items-center justify-between mb-6"><button onClick={() => setEditingDistributor(null)} className="flex items-center text-gray-500 hover:text-purple-600 font-bold transition"><ArrowLeft className="w-5 h-5 mr-1" /> 返回名單列表</button><button onClick={saveDistributorEdit} className="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-bold shadow-md">儲存修改</button></div>
            <div className="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden mb-8">
              <div className="p-6 border-b border-gray-100 bg-purple-50/30 flex items-center"><div className="bg-purple-100 p-3 rounded-full mr-4"><Briefcase className="text-purple-600 w-6 h-6"/></div><div><h2 className="text-2xl font-bold text-gray-800">編輯經銷商: {editFormData.name}</h2><p className="text-sm font-mono text-gray-500 mt-1">UID: {editFormData.uid}</p></div></div>
              <div className="p-6 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="space-y-4 bg-gray-50 p-6 rounded-2xl border border-gray-100">

                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="block text-xs font-bold text-gray-500 mb-1">姓名</label><input type="text" value={editFormData.name||''} onChange={e=>setEditFormData({...editFormData,name:e.target.value})} className="w-full rounded-lg border border-gray-300 p-2 outline-none"/></div>
                    <div><label className="block text-xs font-bold text-gray-500 mb-1">手機</label><input type="text" value={editFormData.phone||''} onChange={e=>setEditFormData({...editFormData,phone:e.target.value})} className="w-full rounded-lg border border-gray-300 p-2 outline-none"/></div>
                    <div><label className="block text-xs font-bold text-purple-500 mb-1">公司/門市名稱</label><input type="text" value={editFormData.companyName||''} onChange={e=>setEditFormData({...editFormData,companyName:e.target.value})} className="w-full rounded-lg border border-purple-300 bg-purple-50/30 p-2 outline-none"/></div>
                    <div><label className="block text-xs font-bold text-purple-500 mb-1">統編</label><input type="text" value={editFormData.taxId||''} onChange={e=>setEditFormData({...editFormData,taxId:e.target.value})} className="w-full rounded-lg border border-purple-300 bg-purple-50/30 p-2 outline-none"/></div>
                    <div className="col-span-2"><label className="block text-xs font-bold text-gray-500 mb-1">個人 LINE 網址</label><input type="text" value={editFormData.lineLink||''} onChange={e=>setEditFormData({...editFormData,lineLink:e.target.value})} className="w-full rounded-lg border border-gray-300 p-2 outline-none"/></div>

                  </div>
                </div>

                  <div><label className="block text-sm font-bold text-gray-700 mb-2">開通狀態</label><select value={editFormData.status||'pending'} onChange={e=>setEditFormData({...editFormData,status:e.target.value})} className="w-full rounded-lg border-2 border-purple-300 p-3 outline-none font-bold"><option value="pending">待審核 (停權中)</option><option value="approved">✅ 已核准開通</option></select></div>
                  <div><label className="block text-sm font-bold text-gray-700 mb-2 mt-4">專屬分潤比例 (%)</label><input type="number" value={editFormData.commission||''} onChange={e=>setEditFormData({...editFormData,commission:e.target.value})} className="w-full rounded-lg border border-gray-300 p-3 outline-none text-lg font-bold text-red-500" placeholder="例如：10" /></div>
                  <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 mt-4">
                    <label className="block text-xs font-bold text-blue-800 mb-1">Telegram Bot Token</label>
                    <input type="text" value={editFormData.tgToken||''} onChange={e=>setEditFormData({...editFormData,tgToken:e.target.value})} className="w-full rounded-lg border border-blue-200 bg-white p-2 mb-3 outline-none font-mono text-xs"/>
                    <label className="block text-xs font-bold text-blue-800 mb-1">Telegram Chat ID</label>
                    <input type="text" value={editFormData.tgChatId||''} onChange={e=>setEditFormData({...editFormData,tgChatId:e.target.value})} className="w-full rounded-lg border border-blue-200 bg-white p-2 outline-none font-mono text-xs"/>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );

        let filteredCrmOrders = crmOrders;
        if (crmOrderSearchMonth)   filteredCrmOrders = filteredCrmOrders.filter(o => o.orderDate && o.orderDate.startsWith(crmOrderSearchMonth));
        if (crmOrderSearchKeyword) { const kw = crmOrderSearchKeyword.toLowerCase(); filteredCrmOrders = filteredCrmOrders.filter(o => (o.tourTitle&&o.tourTitle.toLowerCase().includes(kw))||(o.contactName&&o.contactName.toLowerCase().includes(kw))||(o.orderId&&o.orderId.toLowerCase().includes(kw))||(o.contactPhone&&o.contactPhone.includes(kw))); }
        const crmOrderMonths    = [...new Set(crmOrders.map(o => o.orderDate ? o.orderDate.substring(0,7) : '').filter(Boolean))].sort().reverse();
        const crmTotalRevenue   = crmOrders.filter(o => o.orderStatus !== '已取消').reduce((sum, o) => sum + Number(o.totalAmount    || 0), 0);
        const crmTotalCommission= crmOrders.filter(o => o.orderStatus !== '已取消').reduce((sum, o) => sum + Number(o.commissionAmount|| 0), 0);

        return (
          <div className="w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12 py-8 animate-fade-in pb-20">

              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><p className="text-gray-500 font-bold text-sm mb-1">總訂單數</p><p className="text-3xl font-black text-emerald-600">{crmOrders.length} 筆</p></div>

                <button onClick={() => fetchFullCrmData()} className="text-purple-600 hover:text-purple-800 font-bold flex items-center text-sm bg-white px-4 py-2 border border-purple-200 rounded-lg shadow-sm"><RefreshCw className="w-4 h-4 mr-1"/> 重新整理</button>
              </div>
              <div className="flex border-b border-gray-200 px-6 pt-4 bg-gray-50 overflow-x-auto">
                <button onClick={() => setCrmSubTab('orders')}       className={`pb-3 px-6 font-bold text-lg transition-colors whitespace-nowrap ${crmSubTab === 'orders'       ? 'text-purple-600 border-b-4 border-purple-600' : 'text-gray-500 hover:text-purple-500'}`}>全站訂單總覽</button>
                <button onClick={() => setCrmSubTab('distributors')} className={`pb-3 px-6 font-bold text-lg transition-colors whitespace-nowrap ${crmSubTab === 'distributors' ? 'text-purple-600 border-b-4 border-purple-600' : 'text-gray-500 hover:text-purple-500'}`}>經銷商名單與審核</button>
                <button onClick={() => setCrmSubTab('users')}        className={`pb-3 px-6 font-bold text-lg transition-colors whitespace-nowrap ${crmSubTab === 'users'        ? 'text-purple-600 border-b-4 border-purple-600' : 'text-gray-500 hover:text-purple-500'}`}>一般會員列表</button>
              </div>
              <div className="p-0 flex-1 overflow-hidden flex flex-col">
                {crmSubTab === 'distributors' ? (
                  <div className="overflow-x-auto"><table className="w-full text-left border-collapse min-w-[1000px]">
                    <thead><tr className="bg-gray-50 border-b border-gray-200"><th className="p-5 font-bold text-gray-500 text-sm">申請日期</th><th className="p-5 font-bold text-gray-500 text-sm">經銷商資訊</th><th className="p-5 font-bold text-gray-500 text-sm">審核資料</th><th className="p-5 font-bold text-gray-500 text-sm">資格狀態</th><th className="p-5 font-bold text-gray-500 text-sm text-right">累積業績</th><th className="p-5 font-bold text-gray-500 text-sm text-center">操作</th></tr></thead>
                    <tbody className="divide-y divide-gray-100">
                      {crmDistributors.length === 0 ? <tr><td colSpan="6" className="p-12 text-center text-gray-400 font-bold text-xl">尚無資料</td></tr> :
                       crmDistributors.map(user => {
                        const distOrders = crmOrders.filter(o => String(o.ref_uid) === String(user.uid) && o.orderStatus !== '已取消');
                        const calcSales  = distOrders.reduce((sum, o) => sum + Number(o.totalAmount || 0), 0);
                        return (<tr key={user.uid} className="hover:bg-purple-50/30 transition-colors"><td className="p-5 text-sm text-gray-500">{user.joinDate ? String(user.joinDate).substring(0,10) : ''}</td><td className="p-5"><p className="font-bold text-gray-800 text-lg mb-1">{user.name}</p><p className="text-sm text-gray-600">{formatPhone(user.phone)}</p></td><td className="p-5"><p className="font-bold text-purple-700">{user.companyName || '未填寫'}</p><p className="text-sm text-gray-500 font-mono mt-1">統編: {user.taxId || '未填寫'}</p></td><td className="p-5">{user.status && user.status.trim().toLowerCase() === 'approved' ? (<div><span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">已核准</span><span className="text-xs text-gray-500 font-bold ml-2">分潤 {user.commission||10}%</span></div>) : <span className="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">待審核</span>}</td><td className="p-5 text-right"><p className="font-bold text-gray-800 text-lg">{distOrders.length} 筆</p><p className="text-xs text-gray-500 font-medium">${calcSales.toLocaleString()}</p></td><td className="p-5 text-center"><button onClick={() => { setEditingDistributor(user); setEditFormData(user); }} className="bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold px-4 py-2 rounded-lg shadow-sm transition">編輯 / 審核</button></td></tr>);
