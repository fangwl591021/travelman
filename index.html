<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行管家 - 多模態旗艦中控台 (v12.9.5)</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, sans-serif; color: #333; background: #fff; font-size: 18px; line-height: 1.6; font-weight: 400; }
    .header { height: 60px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 500; }
    .nav-link { font-size: 18px; color: #666; text-decoration: none; margin-left: 30px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
    .nav-link.active { color: #06c755; border-bottom-color: #06c755; }
    .sidebar { width: 220px; border-right: 1px solid #e5e7eb; height: calc(100vh - 60px); position: fixed; left: 0; top: 60px; background: #f9fafb; z-index: 400; }
    .main-content { margin-left: 220px; margin-top: 60px; padding: 40px; }
    .menu-item { padding: 18px 20px; font-size: 18px; color: #555; display: flex; align-items: center; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
    .menu-item.active { background: #fff; color: #06c755; }
    .form-input { width: 100%; border: none; border-bottom: 1px solid #f0f0f0; padding: 15px 0; font-size: 18px; outline: none; background: transparent; }
    .form-input:focus { border-bottom-color: #06c755; }
    .form-label { font-size: 18px; color: #94a3b8; margin-bottom: 10px; display: block; }
    .btn-action { background: #febb02; color: #111; padding: 20px; border-radius: 4px; font-size: 18px; width: 100%; cursor: pointer; border: none; }
    .day-card { margin-top: 40px; padding-top: 40px; border-top: 1px solid #f3f4f6; }
    .img-box { width: 100%; aspect-ratio: 16/9; background: #fcfcfc; border-radius: 4px; overflow: hidden; border: 1px solid #eee; margin-top: 10px; }
    .parse-box { background: #fafafa; padding: 30px; border-radius: 4px; margin-bottom: 30px; border: 1px solid #f0f0f0; }
  </style>
</head>
<body>
  <div id="app">
    <div v-if="loading" class="loading-overlay fixed inset-0 bg-white/90 z-[999] flex items-center justify-center italic">與雲端核心同步校核中...</div>
    <header class="header">
        <div class="flex items-center"><div class="text-[#06c755] font-normal tracking-tighter">旅遊管家</div>
            <nav class="hidden md:flex"><a @click="view = 'list'" :class="['nav-link', view === 'list' ? 'active' : '']">行程管理</a><a @click="view = 'parse'" :class="['nav-link', view === 'parse' || view === 'edit' ? 'active' : '']">智能上稿</a></nav>
        </div>
    </header>
    <aside class="sidebar">
        <div class="p-6 border-b text-slate-400">Dashboard</div>
        <nav>
            <a @click="view = 'list'" :class="['menu-item', view === 'list' ? 'active' : '']"><i class="fa-solid fa-list-ul mr-4"></i>已發佈清單</a>
            <a @click="view = 'parse'" :class="['menu-item', view === 'parse' ? 'active' : '']"><i class="fa-solid fa-wand-magic-sparkles mr-4"></i>AI 智能分析</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="max-w-4xl mx-auto">
            <!-- 1. 清單視圖 -->
            <div v-if="view === 'list'">
                <div class="flex justify-between items-end mb-10 pb-4 border-b"><h2>全球行程管理中心</h2><button @click="view = 'parse'" class="text-[#06c755] underline">新增行程</button></div>
                <div v-if="courses.length === 0 && !loading" class="py-32 text-center text-slate-300 italic">目前無資料，請開始解析...</div>
                <div v-for="c in courses" :key="c.id" class="border-b py-8 flex justify-between items-center">
                    <div class="flex-1">
                        <div class="text-[#bbb] font-mono text-[10px]">{{ c.id }}</div>
                        <div class="py-1"><span class="text-[#06c755] mr-4">[{{ c.region || '未分類' }}]</span>{{ c.title }}</div>
                        <div class="text-slate-400 text-sm">{{ c.days }} DAYS ｜ <span class="text-red-500">NT$ {{ formatPrice(c.price) }}</span></div>
                    </div>
                    <div class="flex gap-10 text-[#003b95]"><a :href="'https://fangwl591021.github.io/travelman/travel_website.html?id=' + c.id" target="_blank" class="underline">預覽</a><span @click="loadEdit(c.id)" class="cursor-pointer underline">編輯</span><span @click="deleteItem(c.id)" class="text-red-300 cursor-pointer underline">刪除</span></div>
                </div>
            </div>
            <!-- 2. 解析視圖 -->
            <div v-if="view === 'parse'">
                <div class="mb-10 pb-4 border-b font-normal">AI 多模態分析 (展開模式)</div>
                <section class="parse-box">
                    <div class="mb-4 text-slate-500">模型 A：貼入文案解析</div>
                    <textarea v-model="rawText" class="w-full h-60 border-none p-6 bg-white outline-none text-[18px] mb-6" placeholder="請貼入詳細行程文案..."></textarea>
                    <button @click="startParsingText" :disabled="loading || !rawText" class="btn-action">啟動 AI 解析與內容擴寫</button>
                </section>
                <section class="parse-box border-dashed border-2">
                    <div class="mb-4 text-slate-500">模型 B：DM 圖片視覺辨識</div>
                    <div class="flex flex-col items-center py-10">
                        <input type="file" ref="fileInput" class="hidden" accept="image/*,application/pdf" @change="handleFileChange">
                        <button @click="$refs.fileInput.click()" class="border p-4 w-full max-w-sm mb-4 bg-white">選取圖片或 PDF</button>
                        <div v-if="selectedFile" class="text-sm text-[#06c755] mb-6">{{ selectedFile.name }}</div>
                        <button v-if="selectedFile" @click="startParsingFile" :disabled="loading" class="btn-action max-w-sm bg-[#174a5a] text-white">啟動 Vision 視覺辨識</button>
                    </div>
                </section>
            </div>
            <!-- 3. 編輯視圖 -->
            <div v-if="view === 'edit'" class="pb-40">
                <div class="mb-12 pb-4 border-b font-normal text-slate-800">行程明細校對 (18px 旗艦版)</div>
                <section class="space-y-12">
                    <div><label class="form-label">地區分類</label><select v-model="course.region" class="form-input"><option v-for="r in ['亞洲','歐洲','美洲','大洋洲','非洲','中東','南極']" :value="r">{{r}}</option></select></div>
                    <div><label class="form-label">行程總標題</label><input v-model="course.title" class="form-input"></div>
                    <div class="grid grid-cols-2 gap-12"><div><label class="form-label">成人報價</label><input v-model="course.price" type="number" class="form-input text-red-600"></div><div><label class="form-label">天數</label><input v-model="course.days" type="number" class="form-input"></div></div>
                    <div><label class="form-label">封面視覺</label><input v-model="course.imgUrl" class="form-input text-xs text-slate-300" placeholder="https://..."><div class="img-box"><img v-if="course.imgUrl" :src="course.imgUrl" class="w-full h-full object-cover"></div></div>
                </section>
                <div v-for="(day, idx) in (course.itinerary || [])" :key="idx" class="day-card">
                    <div class="text-[#06c755] mb-4">Day {{ idx + 1 }}</div>
                    <input v-model="day.route" class="form-input mb-8" placeholder="路線與景點標題">
                    <div class="grid grid-cols-3 gap-6 mb-8">
                        <div><label class="text-xs text-center block">早</label><input v-model="day.b" class="form-input text-center"></div>
                        <div><label class="text-xs text-center block">午</label><input v-model="day.l" class="form-input text-center"></div>
                        <div><label class="text-xs text-center block">晚</label><input v-model="day.d" class="form-input text-center"></div>
                    </div>
                    <div><label class="form-label">行程描述</label><textarea v-model="day.infosStr" class="w-full h-44 border-none bg-slate-50 p-6 outline-none mb-8"></textarea></div>
                    <div class="mb-8"><label class="form-label">當晚飯店</label><input v-model="day.hotel" class="form-input"></div>
                    <div><label class="form-label">配圖預覽</label><div class="img-box"><img v-if="day.imgUrl" :src="day.imgUrl" class="w-full h-full object-cover"></div></div>
                </div>
                <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/95 border-t flex justify-center z-50 shadow-2xl"><button @click="saveCourse" :disabled="loading" class="bg-[#06c755] text-white w-full max-w-lg py-6 rounded font-normal text-[18px]">確認儲存並同步至試算表</button></div>
            </div>
        </div>
    </main>
  </div>
  <script>
    const { createApp } = Vue; const API_BASE = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev';
    createApp({
      data() { return { view: 'list', loading: false, courses: [], rawText: '', course: { itinerary: [] }, selectedFile: null } },
      async mounted() { await this.fetchList(); try { await liff.init({ liffId: "2008729640-bptxTkoO" }); const p = new URLSearchParams(window.location.search); if (p.get('id')) this.loadEdit(p.get('id')); } catch (e) {} },
      methods: {
        formatPrice(p) { return (isNaN(Number(p)) || p === null || p === "") ? '0' : Number(p).toLocaleString(); },
        async fetchList() { this.loading = true; try { const res = await fetch(`${API_BASE}/api/courses`); this.courses = await res.json(); } catch (e) { this.courses = []; } finally { this.loading = false; } },
        async loadEdit(id) { this.loading = true; try { const res = await fetch(`${API_BASE}/api/get-course?id=${id}`); const data = await res.json(); if(data && data.itinerary) { data.itinerary.forEach(d => d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || '')); this.course = { ...data, id }; this.view = 'edit'; } } finally { this.loading = false; } },
        async deleteItem(id) { if(!confirm('確認刪除？')) return; this.loading = true; await fetch(`${API_BASE}/api/delete-course?id=${id}`, { method: 'POST' }); await this.fetchList(); this.loading = false; },
        async startParsingText() { if (!this.rawText) return; this.loading = true; try { const res = await fetch(`${API_BASE}/api/parse-draft`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: this.rawText }) }); const data = await res.json(); if(data.itinerary) { data.itinerary.forEach(d => d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || '')); this.course = data; this.view = 'edit'; } } finally { this.loading = false; } },
        handleFileChange(e) { this.selectedFile = e.target.files[0]; },
        async startParsingFile() { if (!this.selectedFile) return; this.loading = true; const r = new FileReader(); r.readAsDataURL(this.selectedFile); r.onload = async () => { const b64 = r.result.split(',')[1]; try { const res = await fetch(`${API_BASE}/api/upload-pdf`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fileData: b64, fileName: this.selectedFile.name, mimeType: this.selectedFile.type }) }); const d = await res.json(); if (d.success) await this.loadEdit(d.courseId); } finally { this.loading = false; this.selectedFile = null; } }; },
        async saveCourse() { this.loading = true; if(this.course.itinerary) this.course.itinerary.forEach(d => d.infos = (d.infosStr||'').split('\n').filter(l => l.trim() !== '')); try { const res = await fetch(`${API_BASE}/api/save-course`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.course) }); if (res.ok) { alert('儲存成功！'); await this.fetchList(); this.view = 'list'; } } finally { this.loading = false; } }
      }
    }).mount('#app');
  </script>
</body>
</html>
