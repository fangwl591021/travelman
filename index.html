<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 旅遊內容管理後台 - 視覺編輯版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .line-green { color: #06C755; }
        .bg-line-green { background-color: #06C755; }
        .border-line-green { border-color: #06C755; }
        .sidebar-item-active { background-color: #06C755; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .mode-tab-active { border-bottom: 2px solid #06C755; color: #06C755; }
        
        /* 編輯器內容樣式 */
        .editor-content { min-height: 400px; outline: none; }
        .editor-content img { max-width: 100%; height: auto; border-radius: 0.75rem; margin-bottom: 1rem; }
        .editor-content h2 { font-size: 1.25rem; color: #06C755; margin-bottom: 1rem; }
        .editor-content p { font-size: 0.875rem; line-height: 1.6; color: #4b5563; margin-bottom: 1rem; }
    </style>
</head>
<body class="text-[#333333]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 設定區 ---
        const LIFF_ID = "您的_LIFF_ID_在此"; 
        const WORKER_URL = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/process';
        // --------------

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState('travel');
            const [travelMode, setTravelMode] = useState('text');
            const [loading, setLoading] = useState(false);
            const [image, setImage] = useState(null);
            const [travelText, setTravelText] = useState('');
            const [result, setResult] = useState(null);
            const [message, setMessage] = useState({ type: '', text: '' });
            const [isEditing, setIsEditing] = useState(false);
            const editorRef = useRef(null);

            useEffect(() => {
                const initLiff = async () => {
                    if (!window.liff || LIFF_ID === "您的_LIFF_ID_在此") return;
                    try { await window.liff.init({ liffId: LIFF_ID }); } catch (err) { console.error(err); }
                };
                initLiff();
            }, []);

            useEffect(() => {
                if (message.text) {
                    const timer = setTimeout(() => setMessage({ type: '', text: '' }), 3000);
                    return () => clearTimeout(timer);
                }
            }, [message.text]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const runAI = async () => {
                let payload = { action: 'generateContent' };
                if (activeSection === 'travel') {
                    if (travelMode === 'image') {
                        if (!image) { setMessage({ type: 'error', text: '請先上傳圖片素材' }); return; }
                        payload.imageBase64 = image.split(',')[1];
                        payload.mode = 'ImageToWeb';
                    } else {
                        if (!travelText) { setMessage({ type: 'error', text: '請輸入文章內容' }); return; }
                        payload.textInput = travelText;
                        payload.mode = 'ArticleToWeb';
                    }
                } else if (activeSection === 'copy') {
                    if (!image) { setMessage({ type: 'error', text: '請先上傳商品圖片' }); return; }
                    payload.imageBase64 = image.split(',')[1];
                    payload.mode = 'Product';
                } else {
                    if (!image) { setMessage({ type: 'error', text: '請先上傳參考圖片' }); return; }
                    payload.imageBase64 = image.split(',')[1];
                    payload.mode = 'ImageGenSuggestion';
                }

                setLoading(true);
                setMessage({ type: 'info', text: 'AI 正在規劃分段內容與配圖...' });
                
                try {
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    setResult(data);
                    setMessage({ type: 'success', text: '生成完畢！' });
                } catch (err) {
                    setMessage({ type: 'error', text: `發生錯誤: ${err.message}` });
                } finally { setLoading(false); }
            };

            // 編輯器指令
            const execCmd = (cmd, val = null) => {
                document.execCommand(cmd, false, val);
            };

            const saveEdit = () => {
                if (editorRef.current) {
                    const updatedHtml = editorRef.current.innerHTML;
                    setResult(prev => ({ ...prev, webHtml: updatedHtml }));
                    setIsEditing(false);
                    setMessage({ type: 'success', text: '內容已更新' });
                }
            };

            return (
                <div className="flex min-h-screen">
                    {/* 左方儀錶板導覽列 */}
                    <aside className="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
                        <div className="p-6 border-b border-slate-50 flex items-center gap-2">
                            <div className="w-7 h-7 bg-line-green rounded flex items-center justify-center text-white">
                                <Icon name="layout" size={16} />
                            </div>
                            <span className="font-medium text-slate-700 tracking-wide">AI 內容管理系統</span>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-1">
                            <SidebarItem active={activeSection === 'travel'} onClick={() => { setActiveSection('travel'); setResult(null); }} icon="map" label="旅遊區" />
                            <SidebarItem active={activeSection === 'copy'} onClick={() => { setActiveSection('copy'); setResult(null); }} icon="file-edit" label="文案區" />
                            <SidebarItem active={activeSection === 'imageGen'} onClick={() => { setActiveSection('imageGen'); setResult(null); }} icon="image" label="圖生圖" />
                        </nav>
                    </aside>

                    {/* 主要內容區 */}
                    <main className="flex-1 flex flex-col min-w-0">
                        <div className="p-6 lg:p-10 max-w-4xl w-full mx-auto">
                            <header className="mb-8 flex justify-between items-end">
                                <div>
                                    <h2 className="text-2xl font-normal text-slate-800 mb-1">
                                        {activeSection === 'travel' && "旅遊內容擴增"}
                                        {activeSection === 'copy' && "社群貼文產生器"}
                                        {activeSection === 'imageGen' && "AI 意境圖建議"}
                                    </h2>
                                    <p className="text-sm text-slate-400">
                                        {activeSection === 'travel' ? "AI 自動分段並匹配 16:9 旅遊圖庫" : "快速生成高品質社群素材"}
                                    </p>
                                </div>
                                <div className="text-[10px] text-slate-300 font-mono">ID: {LIFF_ID.substring(0,8)}...</div>
                            </header>

                            {activeSection === 'travel' && (
                                <div className="flex gap-6 mb-6 border-b border-slate-200">
                                    <button onClick={() => setTravelMode('text')} className={`pb-3 text-sm font-medium transition-all ${travelMode === 'text' ? 'mode-tab-active' : 'text-slate-400'}`}>文章生網頁</button>
                                    <button onClick={() => setTravelMode('image')} className={`pb-3 text-sm font-medium transition-all ${travelMode === 'image' ? 'mode-tab-active' : 'text-slate-400'}`}>圖片生網頁</button>
                                </div>
                            )}

                            <section className="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-8">
                                {activeSection === 'travel' && travelMode === 'text' ? (
                                    <textarea 
                                        value={travelText}
                                        onChange={(e) => setTravelText(e.target.value)}
                                        placeholder="在此貼上旅遊行程文章，AI 將為您自動分段並配圖..."
                                        className="w-full h-48 p-4 rounded-xl bg-slate-50 border border-slate-100 focus:border-line-green outline-none text-sm transition-all resize-none"
                                    />
                                ) : (
                                    <div 
                                        onClick={() => !loading && document.getElementById('fileInput').click()}
                                        className={`border-2 border-dashed rounded-xl py-12 flex flex-col items-center justify-center transition-all cursor-pointer ${image ? 'border-line-green bg-green-50/20' : 'border-slate-100 hover:bg-slate-50'}`}
                                    >
                                        {image ? <img src={image} className="max-h-56 rounded border border-slate-200 shadow-sm" /> : <p className="text-sm text-slate-400 text-center px-4">點擊上傳原始素材或商品照片</p>}
                                        <input id="fileInput" type="file" className="hidden" onChange={handleImageUpload} accept="image/*" />
                                    </div>
                                )}

                                <div className="mt-6 flex justify-end">
                                    <button disabled={loading} onClick={runAI} className="bg-line-green text-white px-10 py-3 rounded-lg text-sm font-medium hover:bg-[#05b34c] transition-all disabled:opacity-50 flex items-center gap-2 shadow-lg shadow-green-100">
                                        {loading ? <Icon name="loader" className="animate-spin" size={16} /> : <Icon name="zap" size={16} />}
                                        立即生成內容
                                    </button>
                                </div>
                            </section>

                            {/* 結果預覽區 */}
                            {result && (
                                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2 duration-500">
                                    <div className="flex items-center justify-between mb-2">
                                        <div className="flex items-center gap-2">
                                            <div className="w-1.5 h-4 bg-line-green rounded-full"></div>
                                            <h3 className="text-sm font-medium text-slate-700 uppercase">生成結果預覽</h3>
                                        </div>
                                        {activeSection === 'travel' && (
                                            <button 
                                                onClick={() => setIsEditing(true)}
                                                className="flex items-center gap-1.5 text-xs line-green border border-line-green px-3 py-1 rounded-full hover:bg-green-50 transition-colors"
                                            >
                                                <Icon name="edit-3" size={12} /> 進入視覺編輯模式
                                            </button>
                                        )}
                                    </div>

                                    {activeSection === 'travel' ? (
                                        <div className="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                                            <div className="border border-slate-50 rounded-xl bg-slate-50 p-6 sm:p-10 cursor-pointer hover:ring-2 hover:ring-line-green/20 transition-all" onClick={() => setIsEditing(true)}>
                                                <div dangerouslySetInnerHTML={{ __html: result.webHtml }} />
                                            </div>
                                            <div className="mt-4 flex justify-between items-center">
                                                <p className="text-[10px] text-slate-400">提示：點擊上方預覽區塊即可進入編輯</p>
                                                <button onClick={() => {
                                                    const blob = new Blob([result.webHtml], {type: 'text/html'});
                                                    const url = URL.createObjectURL(blob);
                                                    const a = document.createElement('a');
                                                    a.href = url;
                                                    a.download = 'travel-page.html';
                                                    a.click();
                                                }} className="text-[10px] text-slate-500 hover:text-line-green">下載 HTML 檔案</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <CopyBox title="Facebook" content={result.socialCopy?.fb} onCopy={(txt) => {
                                                const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                                setMessage({type:'success', text:'文案已複製'});
                                            }} />
                                            <CopyBox title="Instagram" content={result.socialCopy?.ig} onCopy={(txt) => {
                                                const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                                setMessage({type:'success', text:'文案已複製'});
                                            }} />
                                            <CopyBox title="Threads" content={result.socialCopy?.threads} onCopy={(txt) => {
                                                const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                                setMessage({type:'success', text:'文案已複製'});
                                            }} />
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* 全螢幕視覺編輯器彈窗 */}
                    {isEditing && (
                        <div className="fixed inset-0 z-[100] bg-white flex flex-col animate-in fade-in duration-300">
                            <header className="border-b border-slate-200 p-4 flex justify-between items-center bg-white">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setIsEditing(false)} className="text-slate-400 hover:text-slate-600"><Icon name="x" size={24} /></button>
                                    <h3 className="font-medium text-slate-700">視覺內容編輯器</h3>
                                </div>
                                <button 
                                    onClick={saveEdit}
                                    className="bg-line-green text-white px-6 py-2 rounded-lg text-sm font-medium shadow-lg shadow-green-100"
                                >
                                    儲存並套用
                                </button>
                            </header>
                            
                            {/* 編輯器工具列 */}
                            <div className="border-b border-slate-100 bg-slate-50 p-2 flex flex-wrap gap-1 justify-center">
                                <EditorTool onClick={() => execCmd('formatBlock', 'H2')} icon="heading" label="標題" />
                                <div className="w-px h-6 bg-slate-200 mx-1 self-center"></div>
                                <EditorTool onClick={() => execCmd('bold')} icon="bold" label="粗體" />
                                <EditorTool onClick={() => execCmd('italic')} icon="italic" label="斜體" />
                                <EditorTool onClick={() => execCmd('underline')} icon="underline" label="底線" />
                                <div className="w-px h-6 bg-slate-200 mx-1 self-center"></div>
                                <EditorTool onClick={() => execCmd('justifyLeft')} icon="align-left" />
                                <EditorTool onClick={() => execCmd('justifyCenter')} icon="align-center" />
                                <EditorTool onClick={() => execCmd('justifyRight')} icon="align-right" />
                                <div className="w-px h-6 bg-slate-200 mx-1 self-center"></div>
                                <EditorTool onClick={() => execCmd('insertUnorderedList')} icon="list" />
                                <EditorTool onClick={() => {
                                    const url = prompt('請輸入連結網址:', 'https://');
                                    if(url) execCmd('createLink', url);
                                }} icon="link" />
                                <EditorTool onClick={() => {
                                    const url = prompt('請輸入圖片網址:');
                                    if(url) execCmd('insertImage', url);
                                }} icon="image" />
                                <div className="w-px h-6 bg-slate-200 mx-1 self-center"></div>
                                <EditorTool onClick={() => execCmd('removeFormat')} icon="trash-2" label="清除格式" />
                            </div>

                            <div className="flex-1 overflow-auto p-6 md:p-12 bg-slate-50">
                                <div className="max-w-3xl mx-auto bg-white shadow-xl rounded-2xl p-8 md:p-12">
                                    <div 
                                        ref={editorRef}
                                        contentEditable
                                        className="editor-content"
                                        dangerouslySetInnerHTML={{ __html: result.webHtml }}
                                    />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast 提示 */}
                    {message.text && (
                        <div className={`fixed bottom-6 right-6 z-[110] flex items-center gap-3 px-6 py-3 rounded-lg shadow-xl text-sm text-white animate-in slide-in-from-right ${message.type === 'error' ? 'bg-red-500' : 'bg-[#06C755]'}`}>
                            <Icon name={message.type === 'success' ? "check-circle" : "info"} size={18} />
                            {message.text}
                        </div>
                    )}
                </div>
            );
        };

        const SidebarItem = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm transition-all ${active ? 'sidebar-item-active shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                <Icon name={icon} size={18} />
                <span className="font-normal">{label}</span>
            </button>
        );

        const EditorTool = ({ onClick, icon, label }) => (
            <button 
                onClick={onClick}
                className="flex items-center gap-1.5 px-3 py-2 rounded hover:bg-white hover:shadow-sm text-slate-500 transition-all active:bg-slate-200"
                title={label}
            >
                <Icon name={icon} size={16} />
                {label && <span className="text-xs">{label}</span>}
            </button>
        );

        const CopyBox = ({ title, content, onCopy }) => (
            <div className="bg-white rounded-xl border border-slate-200 p-5 flex flex-col h-full shadow-sm hover:border-line-green transition-all">
                <div className="flex justify-between items-center mb-3">
                    <span className="text-[10px] font-medium bg-slate-50 text-slate-400 px-2 py-0.5 rounded uppercase">{title}</span>
                    <button onClick={() => onCopy(content)} className="text-[10px] line-green font-medium">複製</button>
                </div>
                <div className="text-xs text-slate-600 leading-relaxed flex-1 whitespace-pre-wrap">{content || "生成中..."}</div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
