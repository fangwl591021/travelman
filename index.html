<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行管家 - 旗艦多模態中控台 (v12.8.0)</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* WEB1 規格：全站文字固定 18px 統大法，絕不縮水 */
    body { font-family: -apple-system, sans-serif; color: #333; background: #fff; font-size: 18px; line-height: 1.6; font-weight: 400; }
    .header { height: 60px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 500; }
    .nav-link { font-size: 18px; color: #666; text-decoration: none; margin-left: 30px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
    .nav-link.active { color: #06c755; border-bottom-color: #06c755; padding-bottom: 5px; }
    
    .sidebar { width: 220px; border-right: 1px solid #e5e7eb; height: calc(100vh - 60px); position: fixed; left: 0; top: 60px; background: #f9fafb; z-index: 400; transition: 0.3s; }
    .main-content { margin-left: 220px; margin-top: 60px; padding: 40px; }
    
    .menu-item { padding: 18px 20px; font-size: 18px; color: #555; display: flex; align-items: center; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
    .menu-item.active { background: #fff; color: #06c755; }
    .menu-icon { width: 24px; font-size: 18px; margin-right: 15px; color: #9ca3af; }
    
    .form-input { width: 100%; border: none; border-bottom: 1px solid #f0f0f0; padding: 15px 0; font-size: 18px; outline: none; background: transparent; transition: 0.2s; font-weight: 400; }
    .form-input:focus { border-bottom-color: #06c755; }
    .form-label { font-size: 18px; color: #94a3b8; margin-bottom: 10px; display: block; font-weight: 400; }
    
    .item-row { border-bottom: 1px solid #f3f4f6; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; }
    .btn-action { background: #febb02; color: #111; padding: 20px; border-radius: 4px; font-size: 18px; width: 100%; cursor: pointer; border: none; font-weight: 400; transition: 0.2s; }
    .btn-action:hover { background: #f9c000; }
    .btn-outline { border: 1px solid #e2e8f0; padding: 15px; border-radius: 4px; font-size: 18px; cursor: pointer; text-align: center; }

    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 999; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #999; }
    
    .badge { color: #06c755; margin-right: 15px; font-size: 18px; }
    input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #06c755; }
    .img-box { width: 100%; aspect-ratio: 16/9; background: #fcfcfc; border-radius: 4px; overflow: hidden; position: relative; margin-top: 15px; border: 1px solid #eee; }
    h2 { font-size: 18px !important; font-weight: 400 !important; margin: 0; }
    
    .day-card { margin-top: 40px; padding-top: 40px; border-top: 1px solid #f3f4f6; }
    .parse-box { background: #fafafa; padding: 30px; border-radius: 4px; margin-bottom: 30px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 同步遮罩 -->
    <div v-if="loading" class="loading-overlay italic">與雲端核心同步校核中...</div>
    
    <header class="header">
        <div class="flex items-center"><div class="text-[#06c755] font-normal tracking-tighter">旅遊管家</div>
            <nav class="hidden md:flex"><a @click="view = 'list'" :class="['nav-link', view === 'list' ? 'active' : '']">行程管理</a><a @click="view = 'parse'" :class="['nav-link', view === 'parse' || view === 'edit' ? 'active' : '']">智能上稿</a></nav>
        </div>
    </header>

    <aside class="sidebar">
        <div class="p-6 border-b text-slate-400">Dashboard</div>
        <nav>
            <a @click="view = 'list'" :class="['menu-item', view === 'list' ? 'active' : '']"><i class="fa-solid fa-list-ul mr-4"></i>已發佈清單</a>
            <a @click="view = 'parse'" :class="['menu-item', view === 'parse' ? 'active' : '']"><i class="fa-solid fa-wand-magic-sparkles mr-4"></i>AI 智能分析</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="max-w-4xl mx-auto">
            
            <!-- 1. 清單視圖 (Google Sheets 版) -->
            <div v-if="view === 'list'">
                <div class="flex justify-between items-end mb-10 pb-4 border-b">
                    <h2>全球行程管理中心</h2>
                    <div class="flex items-center gap-4">
                        <button @click="fetchList" class="text-xs text-blue-400 underline">同步雲端</button>
                        <button @click="view = 'parse'" class="text-[#06c755] underline">新增行程</button>
                    </div>
                </div>
                <div v-if="courses.length === 0 && !loading" class="py-20 text-center text-slate-300 italic">目前無資料，請開始解析...</div>
                <div v-for="c in courses" :key="c.id" class="item-row">
                    <div class="flex-1">
                        <div class="text-[#bbb] font-mono text-xs uppercase">{{ c.id }}</div>
                        <div class="py-2 font-normal"><span class="badge">[{{ c.region || '未分類' }}]</span>{{ c.title }}</div>
                        <div class="text-slate-400">{{ c.days }} DAYS ｜ <span class="text-red-500">NT$ {{ formatPrice(c.price) }}</span></div>
                    </div>
                    <div class="flex gap-10 text-[#003b95] font-normal">
                        <a :href="'https://fangwl591021.github.io/travelman/travel_website.html?id=' + c.id" target="_blank" class="underline">預覽</a>
                        <span @click="loadEdit(c.id)" class="cursor-pointer underline">編輯</span>
                        <span @click="deleteItem(c.id)" class="text-red-300 cursor-pointer underline">刪除</span>
                    </div>
                </div>
            </div>

            <!-- 2. 智能分析 (雙模態入口：文字模型 + 圖片模型) -->
            <div v-if="view === 'parse'">
                <div class="mb-10 pb-4 border-b font-normal">AI 多模態分析系統 (文字與視覺)</div>
                
                <!-- 模式 A: 文字模型 -->
                <section class="parse-box">
                    <div class="mb-4 text-slate-500 font-normal">模型 A：貼入行程文案解析</div>
                    <textarea v-model="rawText" class="w-full h-60 border-none p-6 bg-white outline-none text-[18px] font-normal mb-6" placeholder="請貼入詳細行程說明文字..."></textarea>
                    <button @click="startParsingText" :disabled="loading || !rawText" class="btn-action">啟動 AI 內容分析與擴寫</button>
                </section>

                <!-- 模式 B: 圖片/PDF 模型 -->
                <section class="parse-box border-dashed border-2 border-slate-200">
                    <div class="mb-4 text-slate-500 font-normal">模型 B：DM 圖片視覺辨識</div>
                    <div class="flex flex-col items-center justify-center py-10">
                        <i class="fa-solid fa-cloud-arrow-up text-slate-300 text-4xl mb-4"></i>
                        <input type="file" ref="fileInput" class="hidden" accept="image/*,application/pdf" @change="handleFileChange">
                        <button @click="$refs.fileInput.click()" class="btn-outline w-full max-w-sm mb-4">選取 DM 檔案</button>
                        <div v-if="selectedFile" class="text-xs text-[#06c755] mb-4">已備妥：{{ selectedFile.name }}</div>
                        <button v-if="selectedFile" @click="startParsingFile" :disabled="loading" class="btn-action max-w-sm bg-[#174a5a] text-white">開啟視覺 OCR 辨識</button>
                    </div>
                </section>
            </div>

            <!-- 3. 編輯校對 (【100% 完整欄位恢復，絕不簡陋】) -->
            <div v-if="view === 'edit'" class="pb-40">
                <div class="mb-12 pb-4 border-b font-normal text-slate-800">行程明細校對 (18px 統大法)</div>
                
                <section class="space-y-10">
                    <div><label class="form-label">地區分類 (影響 LINE 標籤篩選)</label>
                        <select v-model="course.region" class="form-input">
                            <option v-for="r in ['亞洲','歐洲','美洲','大洋洲','非洲','中東','南極']" :value="r">{{r}}</option>
                        </select>
                    </div>
                    <div><label class="form-label">行程總標題</label><input v-model="course.title" class="form-input"></div>
                    <div class="grid grid-cols-2 gap-10">
                        <div><label class="form-label">成人預售價</label><input v-model="course.price" type="number" class="form-input text-red-600"></div>
                        <div><label class="form-label">行程總天數</label><input v-model="course.days" type="number" class="form-input"></div>
                    </div>
                    <div><label class="form-label">封面視覺 (AI 已自動配圖)</label>
                        <input v-model="course.imgUrl" class="form-input text-xs text-slate-300" placeholder="圖片網址">
                        <div class="img-box"><img v-if="course.imgUrl" :src="course.imgUrl" class="w-full h-full object-cover"></div>
                    </div>
                </section>

                <!-- 每日行程明細 (補全所有穩定欄位) -->
                <div v-for="(day, idx) in (course.itinerary || [])" :key="idx" class="day-card">
                    <div class="text-[#06c755] mb-4 uppercase tracking-widest font-normal">Day {{ idx + 1 }}</div>
                    <input v-model="day.route" class="form-input mb-8 font-normal" placeholder="路線景點標題">
                    
                    <div class="grid grid-cols-3 gap-6 mb-8">
                        <div><label class="form-label text-xs text-center">早餐</label><input v-model="day.b" class="form-input text-center"></div>
                        <div><label class="form-label text-xs text-center">午餐</label><input v-model="day.l" class="form-input text-center"></div>
                        <div><label class="form-label text-xs text-center">晚餐</label><input v-model="day.d" class="form-input text-center"></div>
                    </div>

                    <div><label class="form-label">行程詳細描述 (GPT 擴寫內容)</label>
                        <textarea v-model="day.infosStr" class="w-full h-40 border-none bg-slate-50 p-6 outline-none font-normal leading-relaxed mb-8" placeholder="輸入詳細內容..."></textarea>
                    </div>

                    <div class="mb-8"><label class="form-label">下榻飯店</label><input v-model="day.hotel" class="form-input" placeholder="精選飯店或同級"></div>
                    
                    <div><label class="form-label">每日美圖預覽</label>
                        <div class="img-box"><img v-if="day.imgUrl" :src="day.imgUrl" class="w-full h-full object-cover"></div>
                    </div>
                </div>

                <!-- 底部儲存 -->
                <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/95 border-t flex justify-center z-50">
                    <button @click="saveCourse" :disabled="loading" class="bg-[#06c755] text-white w-full max-w-lg py-5 rounded font-normal text-[18px]">確認儲存並同步發佈</button>
                </div>
            </div>

        </div>
    </main>
  </div>

  <script>
    const { createApp } = Vue; 
    const API_BASE = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev';

    createApp({
      data() { 
        return { 
          view: 'list', loading: false, courses: [], rawText: '', 
          course: { itinerary: [] }, selectedFile: null 
        } 
      },
      async mounted() {
        await this.fetchList();
        try {
            await liff.init({ liffId: "2008729640-bptxTkoO" });
            const params = new URLSearchParams(window.location.search);
            if (params.get('id')) this.loadEdit(params.get('id'));
        } catch (e) {}
      },
      methods: {
        formatPrice(p) { return (isNaN(Number(p)) || p === null || p === "") ? '未提供' : Number(p).toLocaleString(); },
        
        async safeParseJson(response) {
            const text = await response.text();
            try { return JSON.parse(text); } 
            catch (e) { return (text === "OK" || text === "") ? { status: "SUCCESS" } : null; }
        },

        async fetchList() { 
            this.loading = true;
            try { 
                const res = await fetch(`${API_BASE}/api/courses`); 
                const data = await this.safeParseJson(res);
                this.courses = Array.isArray(data) ? data : [];
            } catch (e) { this.courses = []; } finally { this.loading = false; }
        },

        async loadEdit(id) {
          this.loading = true;
          try {
            const res = await fetch(`${API_BASE}/api/get-course?id=${id}`);
            const data = await this.safeParseJson(res);
            if(data && data.itinerary) {
                data.itinerary.forEach(d => d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''));
                this.course = { ...data, id }; this.view = 'edit';
            }
          } finally { this.loading = false; }
        },

        async deleteItem(id) { 
            if(!confirm('確認要刪除此行程嗎？')) return; 
            this.loading = true;
            try { await fetch(`${API_BASE}/api/delete-course?id=${id}`, { method: 'POST' }); await this.fetchList(); } 
            finally { this.loading = false; }
        },

        // --- 文字解析模型 ---
        async startParsingText() {
          if (!this.rawText) return;
          this.loading = true;
          try {
            const res = await fetch(`${API_BASE}/api/parse-draft`, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ text: this.rawText }) 
            });
            const data = await this.safeParseJson(res);
            if(data && data.itinerary) {
                data.itinerary.forEach(d => d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''));
                this.course = data; this.view = 'edit';
            }
          } catch (e) { alert("文字解析模型目前連線中斷"); } 
          finally { this.loading = false; }
        },

        // --- 圖片解析模型 ---
        handleFileChange(e) { this.selectedFile = e.target.files[0]; },
        async startParsingFile() {
            if (!this.selectedFile) return;
            this.loading = true;
            const reader = new FileReader();
            reader.readAsDataURL(this.selectedFile);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    const res = await fetch(`${API_BASE}/api/upload-pdf`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fileData: base64, fileName: this.selectedFile.name, mimeType: this.selectedFile.type })
                    });
                    const data = await this.safeParseJson(res);
                    if (data && data.success) { await this.loadEdit(data.courseId); } 
                    else { alert("圖片辨識失敗，請檢查 DM 內容是否清晰"); }
                } catch (e) { alert("視覺辨識連線異常"); }
                finally { this.loading = false; this.selectedFile = null; }
            };
        },

        async saveCourse() {
          this.loading = true;
          if(this.course.itinerary) {
              this.course.itinerary.forEach(d => {
                  d.infos = (d.infosStr||'').split('\n').filter(l => l.trim() !== '');
              });
          }
          try { 
              const res = await fetch(`${API_BASE}/api/save-course`, { 
                  method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                  body: JSON.stringify(this.course) 
              }); 
              if (res.ok) { alert('行程儲存成功，雲端資料同步中！'); await this.fetchList(); this.view = 'list'; }
          } finally { this.loading = false; }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
