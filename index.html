<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程編輯系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background-color: #fff; color: #111; margin: 0; padding: 0; }
    .page-container { max-width: 1200px; margin: 0 auto; display: flex; gap: 40px; min-height: 100vh; }
    .sidebar { width: 260px; padding: 40px 24px; border-right: 8px solid #f4f4f4; background: #fff; position: sticky; top: 0; height: 100vh; }
    .main-content { flex-grow: 1; padding: 40px 40px 120px 0; }
    .section-block { padding-bottom: 40px; margin-bottom: 40px; border-bottom: 1px solid #eee; }
    .form-label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; }
    .form-input { width: 100%; border: none; border-bottom: 1px solid #e0e0e0; padding: 12px 0; font-size: 16px; outline: none; background: transparent; }
    .form-input:focus { border-bottom-color: #003b95; }
    .tab-btn { padding: 10px 0; font-size: 14px; color: #888; margin-right: 24px; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #003b95; border-bottom-color: #003b95; }
    .img-box { width: 100%; aspect-ratio: 16/9; background: #f9f9f9; border-radius: 4px; overflow: hidden; position: relative; margin-top: 16px; border: 1px solid #eee; }
    .btn-yellow { background: #febb02; color: #111; width: 100%; padding: 16px; border-radius: 4px; font-weight: 500; font-size: 16px; }
    .btn-upload { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 6px 12px; font-size: 12px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="app" class="page-container">
    
    <!-- 左邊儀表板導覽 (參考截圖 9e39f2, 9e372f) -->
    <aside class="sidebar">
        <div class="text-sm font-bold text-slate-300 mb-10 tracking-[0.2em]">TRAVEL KEEPER</div>
        <div class="space-y-6">
            <div class="flex items-center gap-3 text-[#003b95]"><span class="w-2 h-2 rounded-full bg-[#003b95]"></span> 智能上稿解析</div>
            <a href="https://travelkeeper-saas-worker.fangwl591021.workers.dev/admin" class="flex items-center gap-3 text-slate-400 hover:text-[#003b95]">行程管理中心</a>
            <div class="flex items-center gap-3 text-slate-400">數據報表</div>
            <div class="flex items-center gap-3 text-slate-400">系統設定</div>
        </div>
    </aside>

    <!-- 右邊編輯內容 -->
    <main class="main-content">
        <div v-if="step === 'input'">
            <h1 class="text-2xl text-[#003b95] mb-8">新增旅遊行程</h1>
            <div class="flex border-b mb-8">
                <button @click="inputType='text'" :class="['tab-btn', inputType==='text' ? 'active' : '']">文字解析</button>
                <button @click="inputType='image'" :class="['tab-btn', inputType==='image' ? 'active' : '']">DM 圖片解析</button>
            </div>

            <div v-if="inputType === 'text'">
                <textarea v-model="rawText" class="w-full h-80 border p-6 rounded-lg outline-none focus:border-slate-300 bg-slate-50" placeholder="貼入行程文字..."></textarea>
            </div>
            <div v-else>
                <div @click="$refs.dmUploader.click()" class="border-2 border-dashed border-slate-200 rounded-lg h-80 flex flex-col items-center justify-center bg-slate-50 cursor-pointer">
                    <div v-if="!dmPreview" class="text-center">
                        <div class="text-4xl text-slate-300 mb-2">📸</div>
                        <div class="text-sm text-slate-400">點擊上傳 DM 圖片</div>
                    </div>
                    <img v-else :src="dmPreview" class="h-full object-contain p-4">
                </div>
                <input type="file" ref="dmUploader" class="hidden" @change="processDmUpload">
            </div>

            <button @click="startParsing" :disabled="loading" class="btn-yellow mt-10">
                {{ loading ? 'GPT-4o 正在努力解析與擴寫...' : '開始智能解析' }}
            </button>
        </div>

        <div v-if="step === 'edit'">
            <h1 class="text-xl text-[#003b95] mb-10 pb-4 border-b">行程詳細校對</h1>
            
            <!-- 基本資訊 -->
            <div class="section-block">
                <label class="form-label">行程標題</label>
                <input v-model="course.title" class="form-input text-xl font-medium">
                <div class="grid grid-cols-2 gap-10 mt-6">
                    <div><label class="form-label">報價 (數字)</label><input v-model="course.price" type="number" class="form-input text-red-600"></div>
                    <div><label class="form-label">天數</label><input v-model="course.days" type="number" class="form-input"></div>
                </div>
                <div class="mt-6">
                    <label class="form-label">主視覺圖片</label>
                    <div class="img-box">
                        <img :src="course.imgUrl" class="w-full h-full object-cover">
                        <button @click="triggerUpload(course)" class="btn-upload">上傳新照片</button>
                    </div>
                </div>
            </div>

            <!-- 每日行程 -->
            <div v-for="(day, idx) in course.itinerary" :key="idx" class="section-block">
                <div class="text-sm text-[#003b95] font-bold mb-4">DAY {{ idx + 1 }}</div>
                <label class="form-label">路線</label>
                <input v-model="day.route" class="form-input">
                <div class="grid grid-cols-3 gap-6 mt-6">
                    <div><label class="form-label">早</label><input v-model="day.b" class="form-input text-sm"></div>
                    <div><label class="form-label">午</label><input v-model="day.l" class="form-input text-sm"></div>
                    <div><label class="form-label">晚</label><input v-model="day.d" class="form-input text-sm"></div>
                </div>
                <div class="mt-6">
                    <label class="form-label">行程擴寫細節</label>
                    <textarea v-model="day.infosStr" class="w-full h-40 border-none bg-slate-50 p-4 rounded text-sm leading-relaxed outline-none"></textarea>
                </div>
                <div class="mt-6">
                    <label class="form-label">本日配圖</label>
                    <div class="img-box">
                        <img :src="day.imgUrl" class="w-full h-full object-cover">
                        <button @click="triggerUpload(day)" class="btn-upload">上傳新照片</button>
                    </div>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 w-full p-4 bg-white/95 border-t border-slate-100 flex justify-center z-50">
                <div class="w-full max-w-3xl flex gap-4">
                    <button @click="step='input'" class="px-10 py-3 text-slate-400">重新解析</button>
                    <button @click="saveCourse" :disabled="loading" class="btn-yellow flex-1">
                        {{ loading ? '發佈中...' : '確認並儲存發佈' }}
                    </button>
                </div>
            </div>
        </div>

        <div v-if="step === 'success'" class="text-center py-40">
            <div class="text-6xl text-[#003b95] mb-6">✓</div>
            <h1 class="text-2xl mb-10">行程已成功發佈</h1>
            <button @click="openSite" class="btn-yellow max-w-sm">查看前台行程頁</button>
        </div>
    </main>

    <!-- 隱藏的上傳元件 -->
    <input type="file" ref="fileUploader" class="hidden" @change="processImageUpload">
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() { return { 
          step: 'input', inputType: 'text', loading: false, rawText: '', 
          dmBase64: '', dmPreview: '', course: {}, finalId: '', currentTarget: null 
      } },
      methods: {
        processDmUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if(w > 1000) { h = (h*1000)/w; w = 1000; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    this.dmPreview = canvas.toDataURL('image/jpeg', 0.8);
                    this.dmBase64 = this.dmPreview.split(',')[1];
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        },
        async startParsing() {
          this.loading = true;
          try {
            const endpoint = this.inputType === 'text' ? 'parse-draft' : 'parse-image';
            const payload = this.inputType === 'text' ? { text: this.rawText } : { imageBase64: this.dmBase64 };
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/' + endpoint, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.error) throw new Error(data.msg);
            
            if(data.itinerary) {
                data.itinerary.forEach(d => {
                    d.infosStr = Array.isArray(d.infos) ? d.infos.join('\\n') : d.infos;
                });
            }
            this.course = data;
            
            // 自動搜圖
            await this.searchImg(this.course, this.course.title);
            for(let d of this.course.itinerary) {
                await this.searchImg(d, d.searchKw || d.route);
            }
            this.step = 'edit';
          } catch (e) { alert("解析失敗: " + e.message); }
          finally { this.loading = false; }
        },
        async searchImg(obj, kw) {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/search-image?q=' + encodeURIComponent(kw));
            const data = await res.json();
            obj.imgUrl = data.url;
        },
        triggerUpload(obj) { this.currentTarget = obj; this.$refs.fileUploader.click(); },
        processImageUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if(w > 800) { h = (h*800)/w; w = 800; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    this.currentTarget.imgUrl = canvas.toDataURL('image/jpeg', 0.7);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        },
        async saveCourse() {
            this.loading = true;
            this.course.itinerary.forEach(d => d.infos = d.infosStr.split('\\n').filter(Boolean));
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/save-course', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.course)
            });
            const result = await res.json();
            if(result.success) { this.finalId = result.id; this.step = 'success'; }
            this.loading = false;
        },
        openSite() { window.open('https://fangwl591021.github.io/travelman/travel_website.html?id=' + this.finalId); },
        reset() { location.reload(); }
      }
    }).mount('#app');
  </script>
</body>
</html>
