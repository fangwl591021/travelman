<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行管家 - 智能上稿系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .upload-area { background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='40' ry='40' stroke='%23E2E8F0FF' stroke-width='4' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e"); border-radius: 40px; }
    .upload-area:hover { background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='40' ry='40' stroke='%23174A5AFF' stroke-width='4' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e"); }
  </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen flex items-center justify-center p-4">
  <div id="app" class="w-full max-w-2xl">
    <div v-if="loading" class="text-center text-slate-400 font-bold">系統初始化中...</div>

    <div v-else class="bg-white rounded-[3rem] shadow-2xl overflow-hidden p-8 md:p-12">
      
      <!-- 智能上稿系統介面 -->
      <div v-if="modeUpload">
        <div class="flex items-center gap-3 mb-8">
          <span class="text-3xl">🚀</span>
          <h1 class="text-3xl font-black text-slate-800 tracking-tight">智能上稿系統</h1>
        </div>

        <div v-if="!processing && !resultUrl">
          <div @click="$refs.fileInput.click()" class="upload-area h-80 flex flex-col items-center justify-center cursor-pointer transition-all group">
            <h2 class="text-2xl font-bold text-slate-600 mb-2 group-hover:text-[#174a5a]">點擊上傳旅遊 DM 圖片</h2>
            <p class="text-slate-400 text-sm">AI 將自動產生感性導寫文案與高清圖片標籤</p>
            <input type="file" ref="fileInput" class="hidden" accept="application/pdf,image/*" @change="handleFile">
          </div>

          <div v-if="selectedFile" class="mt-8 flex items-center justify-between bg-slate-50 p-6 rounded-3xl border border-slate-100">
            <div class="flex items-center gap-3">
              <span class="text-2xl">📄</span>
              <span class="font-bold text-slate-700 truncate max-w-[200px]">{{ selectedFile.name }}</span>
            </div>
            <button @click="uploadFile" class="bg-[#174a5a] text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-teal-900/20 transition-all">開始轉換</button>
          </div>
        </div>

        <div v-if="processing" class="py-20 text-center">
          <div class="inline-block animate-spin w-12 h-12 border-4 border-[#174a5a] border-t-transparent rounded-full mb-6"></div>
          <h3 class="text-xl font-black text-slate-800">AI 正在努力拆解中...</h3>
          <p class="text-slate-400 mt-2">正在分析行程並生成網頁，請勿關閉視窗</p>
        </div>

        <div v-if="resultUrl" class="py-10 text-center">
          <div class="text-6xl mb-6">🎉</div>
          <h3 class="text-2xl font-black text-slate-800 mb-2">網站生成成功！</h3>
          <div class="flex flex-col gap-3 mt-8">
            <button @click="openSite" class="w-full bg-[#174a5a] text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-teal-900/20">立即預覽網站</button>
            <button @click="closeLiff" class="text-slate-400 font-bold py-2">返回聊天室</button>
          </div>
        </div>
      </div>

      <!-- 業務名片模式 -->
      <div v-else>
        <h1 class="text-3xl font-black text-slate-800 mb-8">專屬分享名片</h1>
        <div class="bg-[#174a5a] rounded-[2rem] p-8 text-white mb-8">
            <div class="text-2xl font-black mb-1">{{ profile.displayName }}</div>
            <div class="text-teal-400 text-sm font-bold">專業旅遊管家</div>
        </div>
        <button @click="share" class="w-full bg-[#174a5a] text-white py-5 rounded-2xl font-bold shadow-xl">選擇好友分享行程</button>
      </div>

    </div>
  </div>

  <script>
    const { createApp } = Vue;
    const liffId = "2008729640-bptxTkoO";

    createApp({
      data() {
        return {
          loading: true,
          modeUpload: false,
          profile: {},
          selectedFile: null,
          processing: false,
          resultUrl: null
        }
      },
      async mounted() {
        try {
          await liff.init({ liffId });
          if (!liff.isLoggedIn()) { liff.login(); return; }
          this.profile = await liff.getProfile();
          
          const params = new URLSearchParams(window.location.search);
          let mode = params.get('mode');
          
          // 修正：處理 LINE LIFF 特有的參數編碼問題
          if (!mode && params.get('liff.state')) {
            const stateParams = new URLSearchParams(params.get('liff.state'));
            mode = stateParams.get('mode');
          }
          
          this.modeUpload = mode === 'upload';
          this.loading = false;
        } catch (e) { console.error(e); }
      },
      methods: {
        handleFile(e) {
          const file = e.target.files[0];
          if (file) {
            if (file.size > 5 * 1024 * 1024) { alert("檔案不能超過 5MB"); return; }
            this.selectedFile = file;
          }
        },
        async uploadFile() {
          this.processing = true;
          const reader = new FileReader();
          reader.readAsDataURL(this.selectedFile);
          reader.onload = async () => {
            const base64Data = reader.result.split(',')[1];
            try {
              const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/upload-pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  fileData: base64Data,
                  fileName: this.selectedFile.name,
                  mimeType: this.selectedFile.type
                })
              });
              const data = await res.json();
              if (data.success) {
                this.resultUrl = `https://fangwl591021.github.io/travelman/travel_website.html?id=${data.courseId}`;
              } else {
                alert("轉換失敗：" + (data.msg || "伺服器錯誤"));
              }
            } catch (e) {
              alert("網路連線失敗");
            } finally {
              this.processing = false;
            }
          };
        },
        openSite() { liff.openWindow({ url: this.resultUrl, external: true }); },
        closeLiff() { liff.closeWindow(); },
        async share() {
          await liff.shareTargetPicker([{
            "type": "flex",
            "altText": "精選行程推薦",
            "contents": {
              "type": "bubble",
              "body": {
                "type": "box", "layout": "vertical",
                "contents": [
                  { "type": "text", "text": "精選行程推薦", "weight": "bold", "size": "xl", "color": "#174a5a" },
                  { "type": "text", "text": "您的好友分享了專業旅遊管家的精選行程，點擊查看更多細節。", "size": "xs", "color": "#888888", "margin": "md", "wrap": true }
                ]
              },
              "footer": {
                "type": "box", "layout": "vertical",
                "contents": [
                  { "type": "button", "action": { "type": "uri", "label": "立即查看行程", "uri": "https://fangwl591021.github.io/travelman/travel_website.html" }, "style": "primary", "color": "#174a5a" }
                ]
              }
            }
          }]);
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
