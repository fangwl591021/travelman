<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行管家 - 管理中心 (WEB1)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, sans-serif; color: #333; background: #fff; overflow-x: hidden; }
    .header { height: 50px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 500; }
    .nav-link { font-size: 14px; color: #666; text-decoration: none; margin-left: 25px; padding-bottom: 4px; transition: 0.2s; cursor: pointer; }
    .nav-link:hover, .nav-link.active { color: #06c755; border-bottom: 2px solid #06c755; }
    .sidebar { width: 220px; border-right: 1px solid #e5e7eb; height: calc(100vh - 50px); position: fixed; left: 0; top: 50px; background: #f9fafb; transition: 0.3s ease; z-index: 400; }
    .sidebar.collapsed { left: -220px; }
    .main-content { margin-left: 220px; margin-top: 50px; padding: 40px; transition: 0.3s ease; min-height: calc(100vh - 50px); }
    .main-content.full { margin-left: 0; }
    .menu-item { padding: 12px 20px; font-size: 14px; color: #555; display: flex; align-items: center; text-decoration: none; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
    .menu-item:hover, .menu-item.active { background: #fff; color: #06c755; }
    .menu-icon { width: 24px; font-size: 16px; margin-right: 12px; color: #9ca3af; }
    .collapse-btn { position: fixed; bottom: 20px; left: 20px; z-index: 600; width: 40px; height: 40px; background: #fff; border: 1px solid #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #9ca3af; }
    .form-input { width: 100%; border: none; border-bottom: 1px solid #f0f0f0; padding: 10px 0; font-size: 18px; outline: none; background: transparent; transition: 0.2s; font-weight: 400; }
    .form-input:focus { border-bottom-color: #06c755; }
    .img-box { width: 100%; aspect-ratio: 16/9; background: #fcfcfc; border-radius: 4px; overflow: hidden; position: relative; margin-top: 10px; border: 1px solid #f0f0f0; }
    .btn-upload { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.4); color: white; padding: 4px 10px; font-size: 10px; border-radius: 4px; cursor: pointer; }
    .item-row { border-bottom: 1px solid #f3f4f6; padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }
    .tag-id { font-size: 10px; color: #ccc; font-family: monospace; text-transform: uppercase; }
    .btn-action { background: #febb02; color: #111; padding: 14px; border-radius: 4px; font-size: 15px; width: 100%; cursor: pointer; border: none; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 999; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #999; }
    .region-badge { font-size: 11px; color: #06c755; margin-right: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div v-if="loading" class="loading-overlay italic">與雲端系統連線中...</div>
    <header class="header">
        <div class="flex items-center">
            <div class="text-[#06c755] text-lg font-normal mr-8 tracking-tighter">旅遊管家</div>
            <nav class="hidden md:flex">
                <a @click="view = 'list'" :class="['nav-link', view === 'list' ? 'active' : '']">找行程</a>
                <a class="nav-link">會員中心</a>
                <a class="nav-link">CRM 管理</a>
                <a @click="view = 'parse'" :class="['nav-link', view === 'parse' || view === 'edit' ? 'active' : '']">智能上稿</a>
            </nav>
        </div>
    </header>
    <aside :class="['sidebar', collapsed ? 'collapsed' : '']">
        <div class="p-6 text-[11px] text-slate-400 uppercase tracking-widest border-b">Dashboard</div>
        <nav>
            <a @click="view = 'list'" :class="['menu-item', view === 'list' ? 'active' : '']"><i class="fa-solid fa-list-ul menu-icon"></i>行程管理清單</a>
            <a @click="view = 'parse'" :class="['menu-item', view === 'parse' || view === 'edit' ? 'active' : '']"><i class="fa-solid fa-wand-magic-sparkles menu-icon"></i>AI 智能解析</a>
            <a class="menu-item"><i class="fa-solid fa-chart-line menu-icon"></i>ACTMASTER 追蹤</a>
        </nav>
    </aside>
    <div class="collapse-btn" @click="collapsed = !collapsed"><i :class="['fa-solid', collapsed ? 'fa-chevron-right' : 'fa-chevron-left']"></i></div>
    <main :class="['main-content', collapsed ? 'full' : '']">
        <div class="max-w-4xl mx-auto">
            
            <div v-if="view === 'list'">
                <div class="flex justify-between items-end mb-8 pb-4 border-b">
                    <h2 class="text-lg font-normal text-slate-800">已發布項目清單</h2>
                    <button @click="view = 'parse'" class="text-xs text-[#06c755] underline">新增行程</button>
                </div>
                <div v-for="c in courses" :key="c.id" class="item-row">
                    <div class="flex-1">
                        <div class="tag-id">{{ c.id }}</div>
                        <div class="text-lg text-slate-700 py-1 font-normal"><span class="region-badge">[{{ c.region || '未分類' }}]</span>{{ c.title }}</div>
                        <div class="text-[11px] text-slate-400">{{ c.days }} DAYS ｜ <span class="text-red-500">NT$ {{ formatPrice(c.price) }}</span></div>
                    </div>
                    <div class="flex items-center gap-6 text-xs text-[#003b95]"><a :href="'https://fangwl591021.github.io/travelman/travel_website.html?id=' + c.id" target="_blank" class="underline">預覽</a><span @click="loadEdit(c.id)" class="cursor-pointer underline">編輯</span><span @click="deleteItem(c.id)" class="text-red-300 cursor-pointer underline">刪除</span></div>
                </div>
            </div>

            <div v-if="view === 'parse'">
                <div class="text-lg text-slate-800 mb-8 font-normal pb-4 border-b">智能解析行程文案</div>
                <div class="flex border-b mb-8"><div @click="inputType='text'" :class="['p-3 text-sm cursor-pointer mr-6', inputType==='text' ? 'text-[#06c755] border-b-2 border-[#06c755]' : 'text-slate-400']">文字解析</div><div @click="inputType='image'" :class="['p-3 text-sm cursor-pointer', inputType==='image' ? 'text-[#06c755] border-b-2 border-[#06c755]' : 'text-slate-400']">DM 圖片解析</div></div>
                <div v-if="inputType === 'text'"><textarea v-model="rawText" class="w-full h-80 border-none p-4 bg-slate-50 text-sm outline-none font-normal" placeholder="貼入文案..."></textarea></div>
                <div v-else><div @click="$refs.dmUploader.click()" class="border border-dashed border-slate-200 h-80 flex flex-col items-center justify-center bg-slate-50 cursor-pointer"><div v-if="!dmPreview" class="text-center"><div class="text-2xl mb-2">📸</div><div class="text-[11px] text-slate-400">上傳 DM 圖片</div></div><img v-else :src="dmPreview" class="h-full object-contain p-4"></div><input type="file" ref="dmUploader" class="hidden" @change="processDmUpload"></div>
                <button @click="startParsing" :disabled="loading" class="btn-action mt-10">開始 AI 智能分析</button>
            </div>

            <div v-if="view === 'edit'" class="pb-32">
                <div class="text-lg text-slate-800 mb-10 pb-3 border-b font-normal">行程校對 (100% 資料補全)</div>
                <section class="mb-12">
                    <div class="grid grid-cols-2 gap-8 mb-6">
                        <div><label class="text-[11px] text-slate-400 uppercase">地區分類</label>
                            <select v-model="course.region" class="form-input text-lg font-normal">
                                <option value="亞洲">亞洲</option><option value="歐洲">歐洲</option><option value="美洲">美洲</option><option value="大洋洲">大洋洲</option><option value="非洲">非洲</option><option value="中東">中東</option>
                            </select>
                        </div>
                        <div><label class="text-[11px] text-slate-400 uppercase">總天數</label><input v-model="course.days" type="number" class="form-input font-normal"></div>
                    </div>
                    <div><label class="text-[11px] text-slate-400 uppercase">行程總標題</label><input v-model="course.title" class="form-input text-lg font-normal"></div>
                    <div class="mt-6"><label class="text-[11px] text-slate-400 uppercase">報價 (純數字)</label><input v-model="course.price" type="number" class="form-input text-red-600 font-normal"></div>
                    <div class="mt-8"><div class="img-box"><img v-if="course.imgUrl" :src="course.imgUrl" class="w-full h-full object-cover"><div v-else class="h-full flex items-center justify-center text-xs text-slate-300 italic">正在獲取封面風景照...</div><button @click="triggerUpload(course)" class="btn-upload">更換</button></div></div>
                </section>
                <div v-for="(day, idx) in (course.itinerary || [])" :key="idx" class="mb-12 pt-8 border-t border-slate-100"><div class="text-[10px] text-[#06c755] mb-4 uppercase tracking-widest font-normal">Day {{ idx + 1 }}</div><input v-model="day.route" class="form-input text-lg font-normal"><div class="grid grid-cols-3 gap-4 mt-6"><input v-model="day.b" class="form-input text-xs" placeholder="早"><input v-model="day.l" class="form-input text-xs" placeholder="午"><input v-model="day.d" class="form-input text-xs" placeholder="晚"></div><textarea v-model="day.infosStr" class="w-full h-32 border-none bg-slate-50 p-4 text-sm outline-none mt-4 leading-relaxed font-normal"></textarea><div class="img-box"><img v-if="day.imgUrl" :src="day.imgUrl" class="w-full h-full object-cover"><div v-else class="h-full flex items-center justify-center text-xs text-slate-300 italic">正在匹配景點美圖...</div><button @click="triggerUpload(day)" class="btn-upload">更換</button></div></div>
                <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t flex justify-center z-50"><button @click="saveCourse" :disabled="loading" class="bg-[#06c755] text-white w-full max-w-lg py-3 rounded text-sm font-normal">確認儲存並同步發佈</button></div>
            </div>
        </div>
    </main>
    <input type="file" ref="fileUploader" class="hidden" @change="processImageUpload">
  </div>
  <script>
    const { createApp } = Vue; const API_BASE = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev';
    createApp({
      data() { return { view: 'list', inputType: 'text', loading: false, collapsed: false, courses: [], rawText: '', dmBase64: '', dmPreview: '', course: { itinerary: [] }, currentTarget: null } },
      async mounted() { this.fetchList(); const id = new URLSearchParams(window.location.search).get('id'); if (id) { this.loadEdit(id); } },
      methods: {
        formatPrice(p) { return isNaN(Number(p)) ? (p||'0') : Number(p).toLocaleString(); },
        async fetchList() { try { const res = await fetch(`${API_BASE}/api/courses`); this.courses = await res.json(); } catch (e) {} },
        async loadEdit(id) { this.loading = true; try { const res = await fetch(`${API_BASE}/api/get-course?id=${id}`); const data = await res.json(); this.injectData(data, id); this.view = 'edit'; } catch (e) {} finally { this.loading = false; } },
        async deleteItem(id) { if(!confirm('確認刪除此行程？')) return; await fetch(`${API_BASE}/api/delete-course?id=${id}`, { method: 'POST' }); this.fetchList(); },
        injectData(data, id = null) {
          const base = { id: id || data.id || null, region: data.region || "亞洲", title: data.title || "精選行程", price: data.price || 0, days: data.days || 1, desc: data.desc || "", imgUrl: data.imgUrl || "", itinerary: Array.isArray(data.itinerary) ? data.itinerary : [] };
          base.itinerary.forEach(d => { d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''); d.b = d.b || '精選美食'; d.l = d.l || '特色風味'; d.d = d.d || '飯店內用'; });
          this.course = base;
        },
        processDmUpload(e) {
          const file = e.target.files[0]; const reader = new FileReader();
          reader.onload = (ev) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); let w = img.width, h = img.height; if(w > 1200) { h = (h*1200)/w; w = 1200; } canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h); this.dmPreview = canvas.toDataURL('image/jpeg', 0.8); this.dmBase64 = this.dmPreview.split(',')[1]; }; img.src = ev.target.result; }; reader.readAsDataURL(file);
        },
        async startParsing() {
          this.loading = true;
          try {
            const endpoint = this.inputType === 'text' ? 'api/parse-draft' : 'api/parse-image';
            const res = await fetch(`${API_BASE}/${endpoint}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.inputType === 'text' ? { text: this.rawText } : { imageBase64: this.dmBase64 }) });
            const data = await res.json(); this.injectData(data); this.view = 'edit';
            await this.searchImg(this.course, this.course.title); for(const d of this.course.itinerary) { await this.searchImg(d, (d.searchKw || d.route)); }
          } catch (e) { alert("解析超時"); } finally { this.loading = false; }
        },
        async searchImg(obj, kw) { if (!kw) return; try { const res = await fetch(`${API_BASE}/api/search-image?q=${encodeURIComponent(kw)}`); const data = await res.json(); obj.imgUrl = data.url; } catch (e) {} },
        triggerUpload(obj) { this.currentTarget = obj; this.$refs.fileUploader.click(); },
        processImageUpload(e) {
          const file = e.target.files[0]; const reader = new FileReader();
          reader.onload = (ev) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = 800; canvas.height = (img.height*800)/img.width; canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height); this.currentTarget.imgUrl = canvas.toDataURL('image/jpeg', 0.7); }; img.src = ev.target.result; }; reader.readAsDataURL(file);
        },
        async saveCourse() {
          this.loading = true; this.course.itinerary.forEach(d => d.infos = (d.infosStr||'').split('\n').filter(Boolean));
          try { const res = await fetch(`${API_BASE}/api/save-course`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.course) }); const result = await res.json(); if(result.success) { alert('儲存成功！'); this.fetchList(); this.view = 'list'; } } catch (e) { alert("儲存失敗"); } finally { this.loading = false; }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
