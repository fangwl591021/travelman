<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程編輯系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background-color: #fff; color: #111; margin: 0; font-weight: 400; }
    .sidebar { width: 240px; border-right: 1px solid #eee; height: 100vh; position: fixed; left: 0; top: 0; padding: 30px 20px; background: #fff; z-index: 50; }
    .main-content { margin-left: 240px; padding: 40px; max-width: 900px; }
    .menu-item { padding: 12px 16px; font-size: 14px; color: #888; border-radius: 4px; display: block; text-decoration: none; margin-bottom: 4px; }
    .menu-item.active { background: #f0f7ff; color: #003b95; }
    .section-block { padding-bottom: 40px; margin-bottom: 40px; border-bottom: 1px solid #f8f8f8; }
    .form-label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .form-input { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 16px; outline: none; background: transparent; transition: 0.2s; }
    .form-input:focus { border-bottom-color: #003b95; }
    .img-box { width: 100%; aspect-ratio: 16/9; background: #fafafa; border-radius: 4px; overflow: hidden; position: relative; margin-top: 12px; border: 1px solid #f8f8f8; }
    .btn-upload { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.5); color: white; padding: 6px 12px; font-size: 11px; border-radius: 4px; cursor: pointer; }
    .tab-btn { padding: 10px 0; font-size: 14px; color: #aaa; margin-right: 24px; border-bottom: 2px solid transparent; cursor: pointer; }
    .tab-btn.active { color: #003b95; border-bottom-color: #003b95; }
    .btn-action { background: #febb02; color: #111; padding: 14px; border-radius: 4px; font-size: 15px; width: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <aside class="sidebar">
        <div class="text-[10px] text-slate-300 tracking-[0.2em] mb-10 uppercase">Travel Keeper</div>
        <nav>
            <a href="#" class="menu-item active">● 智能上稿解析</a>
            <a href="https://travelkeeper-saas-worker.fangwl591021.workers.dev/admin" class="menu-item">行程管理中心</a>
        </nav>
    </aside>

    <main class="main-content">
        <div v-if="step === 'input'">
            <div class="text-xl text-slate-800 mb-8">新增旅遊行程</div>
            <div class="flex border-b mb-8">
                <div @click="inputType='text'" :class="['tab-btn', inputType==='text' ? 'active' : '']">文字解析</div>
                <div @click="inputType='image'" :class="['tab-btn', inputType==='image' ? 'active' : '']">DM 圖片解析</div>
            </div>

            <div v-if="inputType === 'text'">
                <textarea v-model="rawText" class="w-full h-80 border-none p-6 bg-slate-50 text-sm leading-relaxed outline-none" placeholder="貼入行程文字..."></textarea>
            </div>
            <div v-else>
                <div @click="$refs.dmUploader.click()" class="border-2 border-dashed border-slate-100 h-80 flex flex-col items-center justify-center bg-slate-50 cursor-pointer">
                    <div v-if="!dmPreview" class="text-center">
                        <div class="text-3xl text-slate-200 mb-2">📸</div>
                        <div class="text-xs text-slate-400">點擊上傳 DM 圖片</div>
                    </div>
                    <img v-else :src="dmPreview" class="h-full object-contain p-4">
                </div>
                <input type="file" ref="dmUploader" class="hidden" @change="processDmUpload">
            </div>

            <button @click="startParsing" :disabled="loading" class="btn-action mt-10">
                {{ loading ? '正在解析中，請稍候...' : '開始智能解析' }}
            </button>
        </div>

        <div v-if="step === 'edit'" class="pb-32">
            <div class="text-lg text-slate-800 mb-10 pb-4 border-b">行程校對</div>
            <section class="section-block">
                <label class="form-label">行程標題</label>
                <input v-model="course.title" class="form-input text-lg">
                <div class="grid grid-cols-2 gap-10 mt-6">
                    <div><label class="form-label">報價 (數字)</label><input v-model="course.price" type="number" class="form-input text-red-600"></div>
                    <div><label class="form-label">天數</label><input v-model="course.days" type="number" class="form-input"></div>
                </div>
                <div class="mt-8">
                    <label class="form-label">主視覺圖片</label>
                    <div class="img-box"><img :src="course.imgUrl" class="w-full h-full object-cover"><button @click="triggerUpload(course)" class="btn-upload">自訂圖片</button></div>
                </div>
            </section>
            
            <!-- 防錯核心：嚴格檢查 itinerary 是否為陣列 -->
            <div v-if="course.itinerary && Array.isArray(course.itinerary)">
                <div v-for="(day, idx) in course.itinerary" :key="idx" class="section-block">
                    <div class="text-[10px] text-[#003b95] mb-4 uppercase tracking-[0.2em]">Day {{ idx + 1 }}</div>
                    <input v-model="day.route" class="form-input text-base">
                    <div class="grid grid-cols-3 gap-6 mt-6">
                        <input v-model="day.b" class="form-input text-xs" placeholder="早">
                        <input v-model="day.l" class="form-input text-xs" placeholder="午">
                        <input v-model="day.d" class="form-input text-xs" placeholder="晚">
                    </div>
                    <textarea v-model="day.infosStr" class="w-full h-40 border-none bg-slate-50 p-4 text-sm leading-loose outline-none mt-6"></textarea>
                    <div class="img-box"><img :src="day.imgUrl" class="w-full h-full object-cover"><button @click="triggerUpload(day)" class="btn-upload">更換照片</button></div>
                </div>
            </div>

            <div class="fixed bottom-0 left-[240px] right-0 p-4 bg-white/90 border-t flex justify-center z-50">
                <button @click="saveCourse" :disabled="loading" class="bg-[#003b95] text-white w-full max-w-xl py-3 rounded text-sm">{{ loading ? '儲存中...' : '確認發佈行程' }}</button>
            </div>
        </div>
    </main>
    <input type="file" ref="fileUploader" class="hidden" @change="processImageUpload">
  </div>

  <script>
    const { createApp } = Vue;
    const API_BASE = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev';

    createApp({
      data() { return { step: 'input', inputType: 'text', loading: false, rawText: '', dmBase64: '', dmPreview: '', course: { itinerary: [] }, currentTarget: null } },
      async mounted() {
        const id = new URLSearchParams(window.location.search).get('id');
        if (id) {
            this.loading = true;
            try {
                const res = await fetch(`${API_BASE}/api/get-course?id=${id}`);
                const data = await res.json();
                if (!data.itinerary || !Array.isArray(data.itinerary)) data.itinerary = [];
                data.itinerary.forEach(d => d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''));
                this.course = data;
                this.step = 'edit';
            } catch (e) {} finally { this.loading = false; }
        }
      },
      methods: {
        processDmUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if(w > 1200) { h = (h*1200)/w; w = 1200; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    this.dmPreview = canvas.toDataURL('image/jpeg', 0.8);
                    this.dmBase64 = this.dmPreview.split(',')[1];
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        },
        async startParsing() {
          this.loading = true;
          try {
            const endpoint = this.inputType === 'text' ? 'api/parse-draft' : 'api/parse-image';
            const res = await fetch(`${API_BASE}/${endpoint}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.inputType === 'text' ? { text: this.rawText } : { imageBase64: this.dmBase64 })
            });
            const data = await res.json();
            // 防錯：強制補齊陣列
            if(!data.itinerary || !Array.isArray(data.itinerary)) data.itinerary = [];
            data.itinerary.forEach(d => d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''));
            this.course = data;
            await this.searchImg(this.course, this.course.title);
            for(let d of this.course.itinerary) await this.searchImg(d, d.searchKw || d.route);
            this.step = 'edit';
          } catch (e) { alert("解析失敗，請重新嘗試一次。"); }
          finally { this.loading = false; }
        },
        async searchImg(obj, kw) {
            try {
                const res = await fetch(`${API_BASE}/api/search-image?q=${encodeURIComponent(kw)}`);
                const data = await res.json();
                obj.imgUrl = data.url;
            } catch (e) {}
        },
        triggerUpload(obj) { this.currentTarget = obj; this.$refs.fileUploader.click(); },
        processImageUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width;
                    if(w > 800) { canvas.width = 800; canvas.height = (img.height*800)/img.width; }
                    else { canvas.width = img.width; canvas.height = img.height; }
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    this.currentTarget.imgUrl = canvas.toDataURL('image/jpeg', 0.7);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        },
        async saveCourse() {
            this.loading = true;
            if (this.course.itinerary && Array.isArray(this.course.itinerary)) {
                this.course.itinerary.forEach(d => d.infos = (d.infosStr||'').split('\n').filter(Boolean));
            }
            try {
                const res = await fetch(`${API_BASE}/api/save-course`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.course) });
                const result = await res.json();
                if(result.success) window.open(`https://fangwl591021.github.io/travelman/travel_website.html?id=${result.id}`, '_self');
            } catch (e) { alert("儲存失敗"); }
            finally { this.loading = false; }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
