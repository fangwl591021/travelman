<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travlkeeper - 分享行程</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Travlkeeper</h1>
        <p class="text-slate-500 mb-8">選擇您想分享給好友的旅遊行程</p>

        <!-- 狀態顯示 -->
        <div id="status" class="mb-6 p-3 rounded-lg bg-blue-50 text-blue-600 text-sm hidden">
            正在初始化 LIFF...
        </div>

        <!-- 主要操作區 -->
        <div class="space-y-4">
            <button id="btnShare" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl transition-all shadow-lg active:scale-95 disabled:opacity-50" disabled>
                🚀 分享行程給好友
            </button>
            
            <button id="btnSaveTest" class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium rounded-xl transition-all">
                📥 儲存測試資料到 D1
            </button>
        </div>

        <div id="result" class="mt-6 text-xs text-slate-400 break-all"></div>
    </div>

    <script>
        // --- 設定區 ---
        const LIFF_ID = '您的_LIFF_ID'; // 請在 LINE Developers 建立 LIFF 並填入 ID
        const WORKER_URL = 'https://line-bot-v2.fangwl591021.workers.dev';

        const btnShare = document.getElementById('btnShare');
        const btnSaveTest = document.getElementById('btnSaveTest');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');

        // 初始化 LIFF
        async function main() {
            showStatus('正在啟動 LINE LIFF...');
            try {
                await liff.init({ liffId: LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                showStatus('LIFF 已就緒');
                btnShare.disabled = false;
            } catch (err) {
                showStatus('初始化失敗: ' + err.message, true);
            }
        }

        // 執行分享
        btnShare.onclick = async () => {
            showStatus('正在從 D1 抓取資料...');
            try {
                // 1. 呼叫您的 Worker API 取得 Flex Message
                const response = await fetch(`${WORKER_URL}/api/share`);
                const result = await response.json();

                if (!result.success) throw new Error(result.error);

                // 2. 檢查是否可以使用 shareTargetPicker
                if (!liff.isApiAvailable('shareTargetPicker')) {
                    alert('請在 LINE App 內開啟此網頁以使用分享功能');
                    return;
                }

                // 3. 開啟 LINE 好友選擇器並發送
                const shareRes = await liff.shareTargetPicker([result.flexMessage]);
                
                if (shareRes) {
                    showStatus('分享成功！');
                } else {
                    showStatus('使用者取消分享');
                }
            } catch (err) {
                showStatus('分享失敗: ' + err.message, true);
            }
        };

        // 測試儲存資料到 D1
        btnSaveTest.onclick = async () => {
            showStatus('正在寫入資料...');
            try {
                const profile = await liff.getProfile();
                const response = await fetch(`${WORKER_URL}/api/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: profile.userId,
                        name: profile.displayName,
                        status: "來自 LIFF 的測試行程"
                    })
                });
                const res = await response.json();
                showStatus('資料庫寫入成功！');
                resultDiv.innerText = JSON.stringify(res);
            } catch (err) {
                showStatus('寫入失敗: ' + err.message, true);
            }
        };

        function showStatus(msg, isError = false) {
            statusDiv.innerText = msg;
            statusDiv.classList.remove('hidden');
            statusDiv.className = isError ? 'mb-6 p-3 rounded-lg bg-red-50 text-red-600 text-sm' : 'mb-6 p-3 rounded-lg bg-blue-50 text-blue-600 text-sm';
        }

        main();
    </script>
</body>
</html>
