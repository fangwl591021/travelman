<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程編輯器</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; color: #333; background: #fff; }
    .input-line { width: 100%; border-bottom: 1px solid #f0f0f0; padding: 12px 0; outline: none; transition: 0.2s; font-size: 15px; }
    .input-line:focus { border-bottom-color: #174a5a; }
    .label-hint { font-size: 10px; color: #ccc; margin-top: 15px; display: block; font-weight: bold; text-transform: uppercase; }
    section { margin-bottom: 50px; }
  </style>
</head>
<body class="p-6 md:p-12">
  <div id="app" class="max-w-2xl mx-auto">
    
    <!-- Step 1: 解析 -->
    <div v-if="step === 'input'">
      <h1 class="text-xl font-medium mb-10 text-slate-800">行程文案解析上稿</h1>
      <textarea v-model="rawText" class="w-full h-80 bg-slate-50 rounded-lg p-6 text-sm border-0 outline-none focus:bg-white focus:ring-1 focus:ring-slate-100" placeholder="貼入內容..."></textarea>
      <button @click="parseDraft" :disabled="!rawText || loading" class="w-full bg-slate-900 text-white py-4 rounded-lg font-medium mt-10 transition-all active:scale-95 disabled:opacity-20">
        {{ loading ? 'GPT-4o 正在解析...' : '確認解析行程' }}
      </button>
    </div>

    <!-- Step 2: 編輯 -->
    <div v-if="step === 'edit'" class="pb-40">
        <h2 class="text-xs font-bold text-slate-300 border-b pb-2 mb-10 tracking-widest uppercase">Overview</h2>
        <section>
          <div><label class="label-hint">行程標題</label><input v-model="course.title" class="input-line !text-lg"></div>
          <div class="grid grid-cols-2 gap-10">
            <div><label class="label-hint">報價 (數字)</label><input v-model="course.price" type="number" class="input-line text-red-500 font-medium"></div>
            <div><label class="label-hint">天數</label><input v-model="course.days" type="number" class="input-line"></div>
          </div>
          <div><label class="label-hint">摘要</label><textarea v-model="course.desc" class="input-line h-16 resize-none"></textarea></div>
        </section>

        <section v-for="(day, idx) in course.itinerary" :key="idx" class="relative pt-12 border-t mt-12">
            <div class="absolute top-0 left-0 text-slate-100 font-bold text-7xl leading-none opacity-50">0{{ idx + 1 }}</div>
            <div class="space-y-6 relative">
              <div><label class="label-hint">路線</label><input v-model="day.route" class="input-line font-medium"></div>
              <div class="grid grid-cols-3 gap-6">
                <div><label class="label-hint">早</label><input v-model="day.b" class="input-line text-xs"></div>
                <div><label class="label-hint">午</label><input v-model="day.l" class="input-line text-xs"></div>
                <div><label class="label-hint">晚</label><input v-model="day.d" class="input-line text-xs"></div>
              </div>
              <div><label class="label-hint">內容描述</label><textarea v-model="day.infosStr" class="input-line text-sm h-32 leading-relaxed resize-none"></textarea></div>
              <div><label class="label-hint">飯店</label><input v-model="day.hotel" class="input-line text-sm"></div>
              <div>
                  <label class="label-hint text-[#174a5a]">📸 配圖搜尋關鍵字 (建議英文，如 Zhangjiajie Mountain)</label>
                  <input v-model="day.kw" class="input-line text-sm font-medium text-[#174a5a]">
              </div>
            </div>
        </section>

        <div class="fixed bottom-0 left-0 w-full p-6 bg-white/95 backdrop-blur-md border-t flex gap-4 z-50">
            <button @click="step = 'input'" class="flex-1 text-slate-300 text-sm">重來</button>
            <button @click="saveCourse" :disabled="loading" class="flex-[3] bg-slate-900 text-white py-4 rounded-lg font-medium shadow-xl active:scale-95 transition-all">
                {{ loading ? '更新中...' : '確認發布' }}
            </button>
        </div>
    </div>

    <!-- Step 3: Success -->
    <div v-if="step === 'success'" class="text-center py-40">
      <div class="text-6xl mb-10">✓</div>
      <h2 class="text-xl font-medium mb-10 text-slate-700">發布成功</h2>
      <button @click="openSite" class="w-full bg-slate-900 text-white py-4 rounded-lg font-medium mb-6">查看行程網頁</button>
      <button @click="reset" class="text-slate-300 text-xs underline">處理下一份行程</button>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() { return { step: 'input', loading: false, rawText: '', course: {}, finalId: '' } },
      async mounted() {
        try {
          await liff.init({ liffId: "2008729640-bptxTkoO" });
          const id = new URLSearchParams(window.location.search).get('id');
          if (id) {
            const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/get-course?id=${id}`);
            const data = await res.json();
            this.course = { ...data, id };
            if (this.course.itinerary) {
                this.course.itinerary.forEach(d => d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''));
            }
            this.step = 'edit';
          }
        } catch (e) {}
      },
      methods: {
        async parseDraft() {
          this.loading = true;
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/parse-draft', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: this.rawText })
            });
            const data = await res.json();
            if (data.itinerary) {
              data.itinerary = data.itinerary.map(d => ({ ...d, infosStr: Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || '') }));
            }
            this.course = { ...this.course, ...data };
            this.step = 'edit';
          } catch (e) { alert("解析失敗"); }
          finally { this.loading = false; }
        },
        async saveCourse() {
          this.loading = true;
          if (this.course.itinerary) {
            this.course.itinerary.forEach(d => d.infos = d.infosStr.split('\n').filter(Boolean));
          }
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/save-course', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.course)
            });
            const result = await res.json();
            if (result.success) { this.finalId = result.id; this.step = 'success'; }
          } catch (e) { alert("儲存失敗"); }
          finally { this.loading = false; }
        },
        openSite() { if (this.finalId) window.open(`https://fangwl591021.github.io/travelman/travel_website.html?id=${this.finalId}`, '_blank'); },
        reset() { location.href = "index.html"; }
      }
    }).mount('#app');
  </script>
</body>
</html>
