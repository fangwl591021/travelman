<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>行程編輯系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fff; color: #111; margin: 0; padding: 0; }
    .page-container { padding-bottom: 100px; max-w: 800px; margin: 0 auto; }
    
    .nav-bar { background-color: #003b95; padding: 16px 20px; color: white; font-size: 18px; font-weight: bold; position: sticky; top: 0; z-index: 40; }
    .section-block { border-bottom: 8px solid #f2f2f2; padding: 24px 20px; }
    
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 14px; color: #333; margin-bottom: 8px; }
    .form-input { width: 100%; border: none; border-bottom: 1px solid #e0e0e0; padding: 12px 0; font-size: 16px; color: #111; border-radius: 0; outline: none; transition: 0.2s; background: transparent; }
    .form-input:focus { border-bottom-color: #003b95; }
    textarea.form-input { resize: none; line-height: 1.6; }
    
    .img-container { position: relative; width: 100%; aspect-ratio: 16/9; background-color: #f9f9f9; border-radius: 4px; overflow: hidden; border: 1px solid #e7e7e7; }
    .img-preview { width: 100%; height: 100%; object-fit: cover; }
    
    .btn-upload { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.7); color: white; padding: 6px 12px; font-size: 13px; border-radius: 4px; cursor: pointer; border: none; backdrop-filter: blur(4px); transition: 0.2s; }
    .btn-upload:hover { background: rgba(0,0,0,0.9); }
    
    .btn-primary { background-color: #003b95; color: #fff; border: none; width: 100%; padding: 16px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-action-yellow { background-color: #febb02; color: #111; border: none; padding: 14px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; width: 100%; }
    .btn-action-yellow:active { transform: scale(0.98); }
    
    .tab-btn { background: transparent; border: none; padding: 12px 0; font-size: 16px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-right: 24px; }
    .tab-btn.active { color: #003b95; border-bottom-color: #003b95; }

    .upload-area { border: 1px dashed #cbd5e1; text-align: center; padding: 40px 20px; cursor: pointer; transition: 0.2s; background: #fafafa; }
    .upload-area:hover { border-color: #003b95; background: #f0f4f8; }

    .flex-row { display: flex; gap: 16px; }
    .flex-1 { flex: 1; }
  </style>
</head>
<body>
  <div id="app" class="page-container">
    
    <div class="nav-bar">行程編輯系統</div>

    <!-- 共用的隱藏檔案上傳元件 -->
    <input type="file" ref="fileUploader" class="hidden" accept="image/jpeg, image/png, image/webp" @change="processImageUpload">
    <input type="file" ref="dmUploader" class="hidden" accept="image/jpeg, image/png, image/webp" @change="processDmUpload">

    <!-- 解析畫面：加入雙頁籤 -->
    <div v-if="step === 'input'" class="p-6">
      <div class="flex mb-6 border-b border-slate-200">
        <button @click="inputType = 'text'" :class="['tab-btn', inputType === 'text' ? 'active' : '']">文字貼上</button>
        <button @click="inputType = 'image'" :class="['tab-btn', inputType === 'image' ? 'active' : '']">DM 圖檔解析</button>
      </div>

      <!-- 模式 1：文字輸入 -->
      <div v-if="inputType === 'text'">
        <div class="text-sm text-slate-500 mb-6">貼入您的行程文案，系統將自動為您整理欄位並搜尋搭配圖片。</div>
        <textarea v-model="rawText" class="form-input h-80 mb-6 border !border-slate-200 p-4" placeholder="請將行程文案貼在此處..."></textarea>
      </div>

      <!-- 模式 2：DM 圖片上傳 -->
      <div v-if="inputType === 'image'">
        <div class="text-sm text-slate-500 mb-6">上傳您的旅遊 DM 圖片 (PPT截圖)，AI 將自動為您擴寫豐富的行程細節。</div>
        <div v-if="!dmPreview" @click="$refs.dmUploader.click()" class="upload-area mb-6">
            <div class="text-4xl text-slate-300 mb-3"><i class="fa-solid fa-cloud-arrow-up"></i></div>
            <div class="text-base text-[#003b95]">點擊選擇或拍攝 DM 圖片</div>
            <div class="text-sm text-slate-400 mt-1">支援 JPG, PNG 格式</div>
        </div>
        <div v-else class="mb-6 position-relative">
            <img :src="dmPreview" class="w-full object-contain bg-slate-100 border border-slate-200 max-h-80">
            <button @click="$refs.dmUploader.click()" class="mt-3 text-sm text-[#003b95] underline bg-transparent border-none cursor-pointer">重新選擇圖片</button>
        </div>
      </div>

      <button @click="startParsing" :disabled="(inputType==='text' && !rawText) || (inputType==='image' && !dmBase64) || loading" class="btn-primary">
        開始智能解析與配圖
      </button>
    </div>

    <!-- 進度條 -->
    <div v-if="step === 'loading'" class="p-10 text-center py-32">
        <div class="inline-block animate-spin w-8 h-8 border-2 border-[#003b95] border-t-transparent rounded-full mb-6"></div>
        <div class="text-base text-[#003b95] mb-4">{{ loadStatus }}</div>
        <div class="w-full bg-slate-200 h-1 overflow-hidden max-w-xs mx-auto">
            <div class="bg-[#febb02] h-1 transition-all duration-300" :style="{ width: loadProgress + '%' }"></div>
        </div>
    </div>

    <!-- 編輯畫面 -->
    <div v-if="step === 'edit'">
        <div class="section-block">
            <div class="text-lg text-[#003b95] mb-6">基本資訊</div>
            
            <div class="form-group">
                <label class="form-label">行程標題</label>
                <input v-model="course.title" class="form-input text-lg">
            </div>
            
            <div class="flex-row">
                <div class="form-group flex-1">
                    <label class="form-label">報價 (數字)</label>
                    <input v-model="course.price" type="number" class="form-input text-red-600">
                </div>
                <div class="form-group flex-1">
                    <label class="form-label">天數</label>
                    <input v-model="course.days" type="number" class="form-input">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">行程摘要</label>
                <textarea v-model="course.desc" class="form-input h-24"></textarea>
            </div>
            
            <div class="form-group mt-8">
                <label class="form-label">主視覺圖片 (Banner)</label>
                <div class="flex gap-2 mb-3">
                    <input v-model="course.searchKw" class="form-input !py-2 !text-sm" placeholder="輸入地名重新搜圖">
                    <button @click="searchImg(course, course.searchKw)" class="bg-[#e7e7e7] px-4 py-2 text-sm">搜圖</button>
                </div>
                <div class="img-container">
                    <img v-if="course.imgUrl" :src="course.imgUrl" class="img-preview" onerror="this.src='https://images.pexels.com/photos/2559941/pexels-photo-2559941.jpeg?auto=compress&cs=tinysrgb&w=1200'">
                    <button @click="triggerUpload(course)" class="btn-upload">📷 上傳自訂</button>
                </div>
            </div>
        </div>

        <div v-for="(day, idx) in course.itinerary" :key="idx" class="section-block">
            <div class="text-xl text-[#003b95] mb-6">第 {{ idx + 1 }} 天</div>
            
            <div class="form-group">
                <label class="form-label">路線</label>
                <input v-model="day.route" class="form-input">
            </div>
            
            <div class="flex-row">
                <div class="form-group flex-1">
                    <label class="form-label">早餐</label>
                    <input v-model="day.b" class="form-input text-sm">
                </div>
                <div class="form-group flex-1">
                    <label class="form-label">午餐</label>
                    <input v-model="day.l" class="form-input text-sm">
                </div>
                <div class="form-group flex-1">
                    <label class="form-label">晚餐</label>
                    <input v-model="day.d" class="form-input text-sm">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">行程說明 (已自動擴寫)</label>
                <textarea v-model="day.infosStr" class="form-input h-32 text-sm"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">入住飯店</label>
                <input v-model="day.hotel" class="form-input text-sm">
            </div>
            
            <div class="form-group mt-8">
                <label class="form-label">本日配圖</label>
                <div class="flex gap-2 mb-3">
                    <input v-model="day.searchKw" class="form-input !py-2 !text-sm" placeholder="輸入地名重新搜圖">
                    <button @click="searchImg(day, day.searchKw)" class="bg-[#e7e7e7] px-4 py-2 text-sm">搜圖</button>
                </div>
                <div class="img-container">
                    <img v-if="day.imgUrl" :src="day.imgUrl" class="img-preview" onerror="this.src='https://images.pexels.com/photos/2559941/pexels-photo-2559941.jpeg?auto=compress&cs=tinysrgb&w=1200'">
                    <button @click="triggerUpload(day)" class="btn-upload">📷 上傳自訂</button>
                </div>
            </div>
        </div>

        <!-- 底部報價發布列 -->
        <div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t border-slate-200 flex gap-4 z-50 items-center justify-between">
            <button @click="step = 'input'" class="px-2 text-slate-500 text-sm bg-transparent border-none">重新解析</button>
            <div class="flex-1 max-w-[200px]">
                <button @click="saveCourse" :disabled="loading" class="btn-action-yellow">
                    {{ loading ? '發布中...' : '確認發布' }}
                </button>
            </div>
        </div>
    </div>

    <!-- 成功畫面 -->
    <div v-if="step === 'success'" class="p-10 text-center py-32">
      <div class="text-6xl text-[#003b95] mb-6">✓</div>
      <h2 class="text-2xl text-slate-800 mb-10">行程發布完成</h2>
      <button @click="openSite" class="btn-action-yellow mb-6">檢視行程網頁</button>
      <button @click="reset" class="text-[#003b95] text-sm bg-transparent border-none underline">繼續處理下一份</button>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    const delay = ms => new Promise(res => setTimeout(res, ms));

    createApp({
      data() { return { 
          step: 'input', 
          inputType: 'text', 
          loading: false, 
          loadStatus: '', 
          loadProgress: 0, 
          rawText: '', 
          dmBase64: '',
          dmPreview: '',
          course: {}, 
          finalId: '', 
          currentUploadTarget: null 
      } },
      async mounted() {
        try {
          await liff.init({ liffId: "2008729640-bptxTkoO" });
          const id = new URLSearchParams(window.location.search).get('id');
          if (id) {
            const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/get-course?id=${id}`);
            const data = await res.json();
            this.course = { ...data, id };
            if (Array.isArray(this.course.itinerary)) {
                this.course.itinerary.forEach(d => {
                    d.infosStr = Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || '');
                    d.searchKw = d.searchKw || d.route; 
                });
            }
            this.step = 'edit';
          }
        } catch (e) {}
      },
      methods: {
        // 處理 DM 圖片上傳 (強制轉換為 image/jpeg 給 Google 審查)
        processDmUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width;
                    let h = img.height;
                    const maxW = 1000; // 壓縮 DM 圖片，確保不超過 API 負載限制
                    
                    if (w > maxW) { h = Math.round((h * maxW) / w); w = maxW; }
                    
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    // 【修正核心】: 統一強制轉成 image/jpeg，確保送給 Google 的 Base64 與 MimeType 100% 吻合
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    this.dmPreview = compressedBase64;
                    this.dmBase64 = compressedBase64.split(',')[1]; 
                    event.target.value = '';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        },

        // 統合解析入口
        async startParsing() {
          this.step = 'loading';
          this.loadProgress = 10;
          this.loadStatus = this.inputType === 'image' ? '正在讀取圖片內容，並交由 AI 擴寫...' : '連接 AI 解析引擎中...';
          await delay(100); 
          
          try {
            let endpoint = '';
            let payload = {};

            if (this.inputType === 'text') {
                endpoint = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/parse-draft';
                payload = { text: this.rawText };
            } else {
                endpoint = 'https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/parse-image';
                // 這裡的 mimeType 必須固定為 image/jpeg，因為我們上面 Canvas 強制轉成了 jpeg
                payload = { imageBase64: this.dmBase64, mimeType: 'image/jpeg' };
            }

            const res = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.error) throw new Error(data.msg); // 如果有錯，會把 Google 拒絕的詳細原因印出來
            
            this.loadProgress = 40;
            this.loadStatus = '解析完成，準備搜尋圖片...';
            await delay(100);
            
            data.title = data.title || "未命名行程";
            data.searchKw = data.title.substring(0, 4);
            data.imgUrl = '';
            
            if (Array.isArray(data.itinerary)) {
              data.itinerary = data.itinerary.map(d => ({ 
                  ...d, 
                  infosStr: Array.isArray(d.infos) ? d.infos.join('\n') : (d.infos || ''),
                  searchKw: d.searchKw || (d.route ? d.route.replace(/[^\u4e00-\u9fa5]/g, '').substring(0, 4) : '風景'), 
                  imgUrl: ''
              }));
            } else { data.itinerary = []; }
            this.course = { ...this.course, ...data };

            this.loadStatus = `搜尋：${this.course.searchKw}`;
            await this.searchImg(this.course, this.course.searchKw);
            this.loadProgress = 50;
            await delay(50);

            if(this.course.itinerary.length > 0) {
                const stepVal = 50 / this.course.itinerary.length;
                for(let i=0; i<this.course.itinerary.length; i++) {
                    const d = this.course.itinerary[i];
                    this.loadStatus = `搜尋：${d.searchKw}`;
                    await this.searchImg(d, d.searchKw);
                    this.loadProgress += stepVal;
                    await delay(50);
                }
            }

            this.loadStatus = '處理完成！';
            this.loadProgress = 100;
            await delay(300);
            this.step = 'edit';
            
          } catch (e) { 
              alert("解析中斷：" + e.message); 
              this.step = 'input'; 
          }
        },

        async searchImg(targetObj, keyword) {
            if (!keyword) return;
            try {
                const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/search-image?q=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                targetObj.imgUrl = data.url; 
            } catch (e) { console.error("搜圖錯誤"); }
        },
        
        // === 圖片上傳壓縮引擎 (手動修改配圖用) ===
        triggerUpload(targetObj) {
            this.currentUploadTarget = targetObj;
            this.$refs.fileUploader.click();
        },
        processImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width;
                    let h = img.height;
                    const maxW = 800; // 壓縮至 800px 寬以節省 KV 空間
                    
                    if (w > maxW) { h = Math.round((h * maxW) / w); w = maxW; }
                    
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    if(this.currentUploadTarget) {
                        this.currentUploadTarget.imgUrl = compressedBase64;
                    }
                    event.target.value = ''; 
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        },

        async saveCourse() {
          this.loading = true;
          if (Array.isArray(this.course.itinerary)) {
            this.course.itinerary.forEach(d => d.infos = d.infosStr.split('\n').filter(Boolean));
          }
          try {
            const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/save-course', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.course)
            });
            const result = await res.json();
            if (result.success) { this.finalId = result.id; this.step = 'success'; }
          } catch (e) { alert("儲存失敗"); }
          finally { this.loading = false; }
        },
        openSite() { if (this.finalId) window.open(`https://fangwl591021.github.io/travelman/travel_website.html?id=${this.finalId}`, '_blank'); },
        reset() { location.href = "index.html"; }
      }
    }).mount('#app');
  </script>
</body>
</html>
