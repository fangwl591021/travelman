<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelKeeper Trip - LINE OA Style</title>
  <style>
    :root {
      --primary: #06c755;
      --primary-dark: #05a847;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --border: #dfe3e8;
      --text: #1f2937;
      --muted: #6b7280;
      --head: #ffffff;
      --table-head: #f7f9fb;
      --dark: #111827;
      --status-bg: #0b1220;
      --status-text: #d1fae5;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--head);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-left {
      min-width: 0;
    }

    .brand-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }

    .topbar-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }

    .topbar-right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-dark {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }

    .wrap {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      font-weight: 700;
    }

    .panel-body {
      padding: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: 10px;
    }

    .summary-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
    }

    .hero-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
      border: 1px solid var(--border);
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px;
      line-height: 1.35;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 12px;
      font-size: 14px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-item {
      background: #eef2ff;
      color: #374151;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .price {
      font-size: 30px;
      font-weight: 700;
      color: var(--primary);
      margin-top: 6px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .status-box {
      background: var(--status-bg);
      color: var(--status-text);
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.7;
    }

    .ref-box {
      background: #ecfeff;
      color: #155e75;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
      word-break: break-word;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #f3f4f6;
      color: #111827;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      word-break: break-word;
    }

    th {
      background: var(--table-head);
      font-weight: 700;
    }

    .day-table th:nth-child(1) { width: 90px; }
    .day-table th:nth-child(2) { width: auto; }

    .sticky-cta {
      position: sticky;
      bottom: 0;
      z-index: 15;
      background: rgba(255,255,255,.96);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(8px);
    }

    .sticky-left {
      min-width: 0;
    }

    .sticky-title {
      font-size: 14px;
      color: var(--muted);
    }

    .sticky-price {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .sticky-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    @media (max-width: 900px) {
      .summary-grid,
      .hero-grid,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .sticky-cta {
        flex-direction: column;
        align-items: stretch;
      }

      .sticky-actions {
        width: 100%;
      }

      .sticky-actions .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-left">
        <div id="brandName" class="brand-badge">TravelKeeper</div>
        <div id="tripTitleTop" class="topbar-title">行程載入中...</div>
        <div class="topbar-sub">LINE 登入後可直接綁定會員與分銷來源</div>
      </div>
      <div class="topbar-right">
        <button id="btnLineLogin" class="btn btn-primary">LINE 登入 / 綁定</button>
        <button id="btnOrderTop" class="btn btn-dark">立即報名</button>
      </div>
    </div>

    <div class="wrap">
      <div class="summary-grid">
        <div class="summary-box">
          <div class="summary-label">品牌</div>
          <div id="summaryBrand" class="summary-value">TravelKeeper</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">目的地</div>
          <div id="summaryPlace" class="summary-value">--</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">天數</div>
          <div id="summaryDays" class="summary-value">--</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">價格</div>
          <div id="summaryPrice" class="summary-value">--</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">行程主資訊</div>
        <div class="panel-body">
          <div class="hero-grid">
            <div>
              <img id="coverImage" class="hero-image" src="https://picsum.photos/900/500" alt="trip cover" />
            </div>
            <div>
              <h1 id="tripTitle" class="title">行程載入中...</h1>
              <div id="tripSubtitle" class="subtitle">請稍候</div>
              <div id="tripMeta" class="meta-row"></div>
              <div id="tripPrice" class="price">--</div>
            </div>
          </div>
        </div>
      </div>

      <div class="info-grid">
        <div class="panel">
          <div class="panel-head">分銷 / 來源資訊</div>
          <div class="panel-body">
            <div id="refInfo" class="ref-box"></div>
            <div class="muted" style="margin-top:10px;">
              客戶從分銷連結進站後，系統會先記錄 ref 與 itinerary，再於 LINE 綁定與下單時自動帶入。
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">LINE 綁定狀態</div>
          <div class="panel-body">
            <div id="statusBox" class="status-box">尚未初始化</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">行程介紹</div>
        <div class="panel-body">
          <div id="tripDescription">載入中...</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">行程亮點</div>
        <div class="panel-body">
          <div id="tripHighlights" class="tag-list"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">每日行程</div>
        <div class="table-wrap">
          <table class="day-table">
            <thead>
              <tr>
                <th>天數</th>
                <th>內容</th>
              </tr>
            </thead>
            <tbody id="tripDays">
              <tr><td colspan="2">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="sticky-cta">
      <div class="sticky-left">
        <div class="sticky-title">目前行程</div>
        <div id="stickyPrice" class="sticky-price">--</div>
      </div>
      <div class="sticky-actions">
        <button id="btnLineLoginBottom" class="btn btn-primary">LINE 登入 / 綁定</button>
        <button id="btnOrderBottom" class="btn btn-dark">立即報名</button>
      </div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const WORKER_URL = "https://travelkeeper-saas-worker.fangwl591021.workers.dev";
    const TENANT_ID = "t001";
    const LIFF_ID = "2009367829-Ewwp8jfA";
    const DEFAULT_ORDER_AMOUNT = 29900;

    let tenantData = null;
    let tripData = null;
    let currentProfile = null;

    function qs(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function setStatus(message, append = false) {
      const el = document.getElementById("statusBox");
      if (append) {
        el.textContent += "\n" + message;
      } else {
        el.textContent = message;
      }
    }

    function saveTrackingParams() {
      const ref = qs("ref");
      const itineraryId = qs("it") || qs("itineraryId");
      const tenantId = qs("tenantId") || TENANT_ID;

      if (ref) localStorage.setItem("tk_ref_uid", ref);
      if (itineraryId) localStorage.setItem("tk_itinerary_id", itineraryId);
      if (tenantId) localStorage.setItem("tk_tenant_id", tenantId);
    }

    function getTrackingState() {
      return {
        tenantId: localStorage.getItem("tk_tenant_id") || TENANT_ID,
        refUid: localStorage.getItem("tk_ref_uid") || "",
        itineraryId: localStorage.getItem("tk_itinerary_id") || ""
      };
    }

    async function apiGet(path) {
      const res = await fetch(WORKER_URL + path);
      return await res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(WORKER_URL + path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });
      return await res.json();
    }

    function parseMaybeJson(value, fallback) {
      try {
        if (!value) return fallback;
        if (Array.isArray(value)) return value;
        if (typeof value === "object") return value;
        return JSON.parse(value);
      } catch (e) {
        return fallback;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadTenant() {
      const tenantId = getTrackingState().tenantId;
      const res = await apiGet("/api/public/tenant?tenantId=" + encodeURIComponent(tenantId));
      tenantData = res && res.data ? res.data.data : null;

      if (tenantData) {
        const brand = tenantData.brandName || "TravelKeeper";
        document.getElementById("brandName").textContent = brand;
        document.getElementById("summaryBrand").textContent = brand;
        if (tenantData.primaryColor) {
          document.documentElement.style.setProperty("--primary", tenantData.primaryColor);
          document.documentElement.style.setProperty("--primary-dark", tenantData.primaryColor);
        }
      }
    }

    function renderTrip(data) {
      const title = data.title || "未命名行程";
      const subtitle = data.subtitle || ((data.country || "") + " " + (data.city || "")).trim() || "旅遊行程";
      const amount = Number(data.price || DEFAULT_ORDER_AMOUNT).toLocaleString();

      document.getElementById("tripTitle").textContent = title;
      document.getElementById("tripTitleTop").textContent = title;
      document.getElementById("tripSubtitle").textContent = subtitle;
      document.getElementById("tripPrice").textContent = "NT$ " + amount;
      document.getElementById("stickyPrice").textContent = "NT$ " + amount;
      document.getElementById("summaryPrice").textContent = "NT$ " + amount;
      document.getElementById("summaryPlace").textContent = ((data.country || "") + " " + (data.city || "")).trim() || "--";
      document.getElementById("summaryDays").textContent = data.days ? (data.days + " 天") : "--";
      document.getElementById("tripDescription").textContent = data.description || "暫無說明";
      document.getElementById("coverImage").src = data.coverImageUrl || "https://picsum.photos/900/500";

      const meta = [];
      if (data.country) meta.push('<span class="meta-item">' + escapeHtml(data.country) + '</span>');
      if (data.city) meta.push('<span class="meta-item">' + escapeHtml(data.city) + '</span>');
      if (data.days) meta.push('<span class="meta-item">' + escapeHtml(String(data.days)) + ' 天</span>');
      if (data.nights) meta.push('<span class="meta-item">' + escapeHtml(String(data.nights)) + ' 夜</span>');
      if (data.status) meta.push('<span class="meta-item">' + escapeHtml(data.status) + '</span>');
      document.getElementById("tripMeta").innerHTML = meta.join("");

      const highlights = parseMaybeJson(data.highlightsJson, []);
      if (highlights.length) {
        document.getElementById("tripHighlights").innerHTML = highlights.map(function(item) {
          return '<span class="tag">' + escapeHtml(String(item)) + '</span>';
        }).join("");
      } else {
        document.getElementById("tripHighlights").innerHTML = '<span class="muted">目前尚未設定亮點</span>';
      }

      const dayByDay = parseMaybeJson(data.dayByDayJson, []);
      if (dayByDay.length) {
        document.getElementById("tripDays").innerHTML = dayByDay.map(function(item, idx) {
          return '<tr><td>Day ' + (idx + 1) + '</td><td>' + escapeHtml(String(item)) + '</td></tr>';
        }).join("");
      } else {
        document.getElementById("tripDays").innerHTML = '<tr><td colspan="2">目前尚未設定每日行程</td></tr>';
      }
    }

    async function loadTrip() {
      const state = getTrackingState();

      if (!state.itineraryId) {
        document.getElementById("tripTitle").textContent = "缺少 itineraryId";
        document.getElementById("tripTitleTop").textContent = "缺少 itineraryId";
        document.getElementById("tripDescription").textContent = "請從帶有 ?it=it_001 的連結進入";
        return;
      }

      const res = await apiGet(
        "/api/public/itinerary?tenantId=" +
        encodeURIComponent(state.tenantId) +
        "&itineraryId=" +
        encodeURIComponent(state.itineraryId)
      );

      tripData = res && res.data ? res.data.data : null;

      if (!tripData) {
        document.getElementById("tripTitle").textContent = "找不到行程";
        document.getElementById("tripTitleTop").textContent = "找不到行程";
        document.getElementById("tripDescription").textContent = "請確認 itineraryId 是否存在";
        return;
      }

      renderTrip(tripData);
    }

    function renderReferralInfo() {
      const state = getTrackingState();
      document.getElementById("refInfo").innerHTML =
        "tenantId：<b>" + escapeHtml(state.tenantId || "-") + "</b><br>" +
        "itineraryId：<b>" + escapeHtml(state.itineraryId || "-") + "</b><br>" +
        "refUid：<b>" + escapeHtml(state.refUid || "direct") + "</b>";
    }

    async function initLiffOnly() {
      setStatus("初始化 LIFF 中...");
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        setStatus("尚未登入 LINE，請點擊上方或下方的 LINE 登入按鈕");
        return { loggedIn: false };
      }

      const profile = await liff.getProfile();
      currentProfile = profile;
      window.currentLineUserId = profile.userId;

      setStatus(
        "LINE 已登入\n" +
        "userId：" + profile.userId + "\n" +
        "displayName：" + (profile.displayName || "")
      );

      return { loggedIn: true, profile: profile };
    }

    async function registerLineMember() {
      const initResult = await initLiffOnly();

      if (!initResult.loggedIn) {
        liff.login({ redirectUri: window.location.href });
        return;
      }

      const profile = initResult.profile;
      const state = getTrackingState();

      setStatus("LINE 已登入，開始寫入會員資料...", true);

      const res = await apiPost("/api/member/register", {
        tenantId: state.tenantId,
        uid: profile.userId,
        name: profile.displayName || "",
        avatarUrl: profile.pictureUrl || "",
        lineDisplayName: profile.displayName || "",
        linePictureUrl: profile.pictureUrl || "",
        role: "member",
        status: "active",
        sourceChannel: "line_liff",
        refDistributorUid: state.refUid,
        notes: state.itineraryId ? ("from_itinerary:" + state.itineraryId) : ""
      });

      setStatus("會員綁定結果：\n" + JSON.stringify(res, null, 2), true);
      return res;
    }

    async function submitOrder() {
      const state = getTrackingState();

      if (!state.itineraryId) {
        alert("缺少 itineraryId");
        return;
      }

      if (!currentProfile) {
        const li = await initLiffOnly();
        if (!li.loggedIn) {
          alert("請先完成 LINE 登入");
          return;
        }
        currentProfile = li.profile;
      }

      const amount = Number((tripData && tripData.price) || DEFAULT_ORDER_AMOUNT);

      const res = await apiPost("/api/admin/create-order", {
        tenantId: state.tenantId,
        itineraryId: state.itineraryId,
        uid: currentProfile.userId,
        customerName: currentProfile.displayName || "LINE會員",
        customerPhone: "",
        customerEmail: "",
        travelDate: (tripData && tripData.departureDate) || "",
        qty: 1,
        totalAmount: amount,
        currency: (tripData && tripData.currency) || "TWD",
        paymentMethod: "line_liff_demo",
        paymentStatus: "unpaid",
        attributionSource: state.refUid ? "line_referral" : "direct",
        distributorUid: state.refUid,
        refUid: state.refUid,
        sourcePage: window.location.href,
        notes: "trip.html LINE OA 風格版測試下單"
      });

      setStatus("訂單建立結果：\n" + JSON.stringify(res, null, 2), true);

      if (res && res.success) {
        const orderId = (res.data && res.data.orderId) || res.orderId || "";
        const successUrl =
          "./success.html?tenantId=" + encodeURIComponent(state.tenantId) +
          "&it=" + encodeURIComponent(state.itineraryId) +
          "&amount=" + encodeURIComponent(amount) +
          "&orderId=" + encodeURIComponent(orderId) +
          (state.refUid ? "&ref=" + encodeURIComponent(state.refUid) : "");
        window.location.href = successUrl;
      } else {
        alert("訂單送出失敗，請看狀態區");
      }
    }

    document.getElementById("btnLineLogin").addEventListener("click", async function() {
      try {
        await registerLineMember();
      } catch (err) {
        setStatus("LINE 綁定失敗：\n" + (err.message || String(err)), true);
      }
    });

    document.getElementById("btnLineLoginBottom").addEventListener("click", async function() {
      try {
        await registerLineMember();
      } catch (err) {
        setStatus("LINE 綁定失敗：\n" + (err.message || String(err)), true);
      }
    });

    document.getElementById("btnOrderTop").addEventListener("click", async function() {
      try {
        await submitOrder();
      } catch (err) {
        setStatus("建立訂單失敗：\n" + (err.message || String(err)), true);
      }
    });

    document.getElementById("btnOrderBottom").addEventListener("click", async function() {
      try {
        await submitOrder();
      } catch (err) {
        setStatus("建立訂單失敗：\n" + (err.message || String(err)), true);
      }
    });

    (async function boot() {
      try {
        saveTrackingParams();
        renderReferralInfo();
        await loadTenant();
        await loadTrip();
        await initLiffOnly();
      } catch (err) {
        setStatus("初始化失敗：\n" + (err.message || String(err)));
      }
    })();
  </script>
</body>
</html>
