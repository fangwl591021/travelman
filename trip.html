<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travelman 行程頁</title>
  <style>
    :root {
      --primary: #06c755;
      --primary-dark: #05a847;
      --primary-soft: #e9fff2;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --border: #d9dee5;
      --text: #222;
      --muted: #6b7280;
      --dark: #1f2937;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input {
      font: inherit;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px 14px 120px;
    }

    .topbar {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }

    .brand-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .top-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.25;
      margin: 0;
      word-break: break-word;
    }

    .top-sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .btn:hover {
      filter: brightness(0.98);
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-dark {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .card-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      font-weight: 800;
    }

    .card-body {
      padding: 14px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .hero-image {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #e5e7eb;
      display: block;
    }

    .hero-info {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .trip-title {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.35;
      margin: 0;
      word-break: break-word;
    }

    .trip-subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .trip-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef2ff;
      color: #334155;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .trip-price {
      font-size: 34px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
    }

    .trip-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .simple-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .simple-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .simple-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .simple-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      word-break: break-word;
    }

    .rich-text {
      font-size: 15px;
      line-height: 1.95;
      color: #334155;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-chip {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #e5e7eb;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      align-items: start;
    }

    .timeline-day {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border-radius: 10px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      border: 1px solid #c7f0d9;
      font-size: 13px;
      font-weight: 800;
      padding: 8px 10px;
    }

    .timeline-content {
      font-size: 14px;
      line-height: 1.85;
      color: #334155;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ref-box {
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.8;
      word-break: break-word;
    }

    .status-box {
      background: #111827;
      color: #d1fae5;
      border-radius: 10px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.7;
      font-family: Consolas, Monaco, monospace;
      min-height: 90px;
      max-height: 180px;
      overflow: auto;
    }

    .sticky-cta {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: rgba(255,255,255,.96);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: 12px 14px;
    }

    .sticky-inner {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sticky-left {
      min-width: 0;
    }

    .sticky-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .sticky-price {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
      word-break: break-word;
    }

    .sticky-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #fafbfc;
    }

    @media (max-width: 980px) {
      .hero,
      .simple-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .top-actions,
      .hero-actions,
      .sticky-actions {
        width: 100%;
      }

      .top-actions .btn,
      .hero-actions .btn,
      .sticky-actions .btn {
        flex: 1 1 100%;
      }

      .trip-title {
        font-size: 28px;
      }

      .trip-price,
      .sticky-price {
        font-size: 30px;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div id="brandBadge" class="brand-badge">TravelKeeper</div>
        <h1 id="topTitle" class="top-title">行程載入中...</h1>
        <div class="top-sub">簡單看行程、直接報名、綁定 LINE 會員</div>
      </div>
      <div class="top-actions">
        <a id="btnHome" class="btn" href="./index.html">回首頁</a>
        <button id="btnCopyPage" class="btn" type="button">複製此頁連結</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">行程主資訊</div>
      <div class="card-body">
        <div class="hero">
          <img id="coverImage" class="hero-image" src="https://picsum.photos/1200/800" alt="trip cover" />

          <div class="hero-info">
            <h2 id="tripTitle" class="trip-title">行程載入中...</h2>
            <div id="tripSubtitle" class="trip-subtitle">請稍候，系統正在讀取真實行程資料。</div>
            <div id="tripMeta" class="trip-meta"></div>
            <div id="tripPrice" class="trip-price">--</div>
            <div class="trip-note">價格與資料以系統設定為準，送單後會寫入正式訂單。</div>

            <div class="hero-actions">
              <button id="btnLineLogin" class="btn btn-primary" type="button">LINE 登入 / 綁定</button>
              <button id="btnOrderHero" class="btn btn-dark" type="button">立即報名</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">簡要資訊</div>
      <div class="card-body">
        <div class="simple-grid">
          <div class="simple-box">
            <div class="simple-label">品牌</div>
            <div id="summaryBrand" class="simple-value">--</div>
          </div>
          <div class="simple-box">
            <div class="simple-label">目的地</div>
            <div id="summaryPlace" class="simple-value">--</div>
          </div>
          <div class="simple-box">
            <div class="simple-label">天數</div>
            <div id="summaryDays" class="simple-value">--</div>
          </div>
          <div class="simple-box">
            <div class="simple-label">出發</div>
            <div id="summaryStartDate" class="simple-value">--</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">行程介紹</div>
      <div class="card-body">
        <div id="tripDescription" class="rich-text">載入中...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">行程亮點</div>
      <div class="card-body">
        <div id="tripHighlights" class="tag-list">
          <div class="empty">載入中...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">每日行程</div>
      <div class="card-body">
        <div id="tripDays" class="timeline">
          <div class="empty">載入中...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">來源與綁定狀態</div>
      <div class="card-body">
        <div id="refInfo" class="ref-box" style="margin-bottom:12px;"></div>
        <div id="statusBox" class="status-box">尚未初始化</div>
      </div>
    </div>
  </div>

  <div class="sticky-cta">
    <div class="sticky-inner">
      <div class="sticky-left">
        <div class="sticky-title">目前行程</div>
        <div id="stickyPrice" class="sticky-price">--</div>
      </div>
      <div class="sticky-actions">
        <button id="btnLineLoginBottom" class="btn btn-primary" type="button">LINE 登入 / 綁定</button>
        <button id="btnOrderBottom" class="btn btn-dark" type="button">立即報名</button>
      </div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const WORKER_URL = "https://travelkeeper-saas-worker.fangwl591021.workers.dev";
    const DEFAULT_TENANT = "t001";
    const LIFF_ID = "2009367829-Ewwp8jfA";
    const DEFAULT_ORDER_AMOUNT = 29900;

    let tenantData = null;
    let tripData = null;
    let currentProfile = null;
    let currentLineUserId = "";

    function qs(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function logStatus(message, append = false) {
      const el = document.getElementById("statusBox");
      const stamp = "[" + new Date().toLocaleString("zh-Hant-TW") + "]";
      const line = stamp + " " + message;
      el.textContent = append ? (el.textContent + "\\n" + line) : line;
      el.scrollTop = el.scrollHeight;
    }

    function saveTrackingParams() {
      const ref = qs("ref");
      const itineraryId = qs("it") || qs("itineraryId");
      const tenantId = qs("tenantId") || localStorage.getItem("travelman_tenant_id") || DEFAULT_TENANT;

      if (ref) localStorage.setItem("tk_ref_uid", ref);
      if (itineraryId) localStorage.setItem("tk_itinerary_id", itineraryId);
      if (tenantId) {
        localStorage.setItem("tk_tenant_id", tenantId);
        localStorage.setItem("travelman_tenant_id", tenantId);
      }

      const url = new URL(window.location.href);
      if (!url.searchParams.get("tenantId")) {
        url.searchParams.set("tenantId", tenantId);
        history.replaceState({}, "", url.toString());
      }
    }

    function getTrackingState() {
      return {
        tenantId: qs("tenantId") || localStorage.getItem("tk_tenant_id") || localStorage.getItem("travelman_tenant_id") || DEFAULT_TENANT,
        refUid: qs("ref") || localStorage.getItem("tk_ref_uid") || "",
        itineraryId: qs("it") || qs("itineraryId") || localStorage.getItem("tk_itinerary_id") || ""
      };
    }

    function apiGet(path) {
      return fetch(WORKER_URL + path).then(res => res.json());
    }

    function apiPost(path, body) {
      return fetch(WORKER_URL + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      }).then(res => res.json());
    }

    function parseMaybeJson(value, fallback) {
      try {
        if (!value) return fallback;
        if (Array.isArray(value)) return value;
        if (typeof value === "object") return value;
        return JSON.parse(value);
      } catch (e) {
        return fallback;
      }
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatCurrency(value, currency = "TWD") {
      return currency + " " + Number(value || 0).toLocaleString();
    }

    function formatDateText(value) {
      if (!value) return "--";
      return String(value).replace(/-/g, "/");
    }

    function copyText(text) {
      if (!navigator.clipboard) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.top = "0";
        ta.style.left = "0";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          logStatus("已複製頁面連結", true);
        } catch (e) {
          logStatus("複製失敗：" + (e.message || String(e)), true);
        }
        document.body.removeChild(ta);
        return;
      }

      navigator.clipboard.writeText(text)
        .then(() => logStatus("已複製頁面連結", true))
        .catch(err => logStatus("複製失敗：" + (err.message || String(err)), true));
    }

    function normalizeHighlights(data) {
      if (!data) return [];
      const arr = parseMaybeJson(data, []);
      if (!Array.isArray(arr)) return [];
      return arr
        .map(item => {
          if (typeof item === "string") return item.trim();
          if (item && typeof item === "object") return String(item.title || item.name || item.label || "").trim();
          return "";
        })
        .filter(Boolean);
    }

    function normalizeDayByDay(data) {
      const arr = parseMaybeJson(data, []);
      if (!Array.isArray(arr) || !arr.length) return [];

      return arr.map((item, idx) => {
        if (typeof item === "string") {
          return {
            day: "Day " + (idx + 1),
            content: item
          };
        }

        if (item && typeof item === "object") {
          return {
            day: item.day || item.title || ("Day " + (idx + 1)),
            content: item.content || item.description || item.text || JSON.stringify(item)
          };
        }

        return {
          day: "Day " + (idx + 1),
          content: String(item || "")
        };
      });
    }

    function mapToOldStyle(data) {
      const highlights = normalizeHighlights(data.highlightsJson || data.highlights || []);
      const days = normalizeDayByDay(data.dayByDayJson || data.dayByDay || []);

      return {
        title: data.title || "",
        subtitle: data.subtitle || "",
        region: data.region || data.country || "",
        country: data.country || "",
        city: data.city || "",
        price: Number(data.price || 0),
        currency: data.currency || "TWD",
        days: Number(data.days || 0),
        nights: Number(data.nights || 0),
        startDate: data.departureDate || data.startDate || "",
        endDate: data.returnDate || data.endDate || "",
        image: data.coverImageUrl || data.image || "",
        description: data.description || "",
        notes: highlights.join(" / "),
        highlights: highlights,
        schedule: days,
        itineraryId: data.itineraryId || "",
        status: data.status || "draft"
      };
    }

    async function loadTenant() {
      const state = getTrackingState();
      const res = await apiGet("/api/public/tenant?tenantId=" + encodeURIComponent(state.tenantId));
      tenantData = res && res.data ? res.data.data : null;

      if (tenantData) {
        const brand = tenantData.brandName || "TravelKeeper";
        const color = tenantData.primaryColor || "#06c755";

        document.getElementById("brandBadge").textContent = brand;
        document.getElementById("summaryBrand").textContent = brand;
        document.documentElement.style.setProperty("--primary", color);
        document.documentElement.style.setProperty("--primary-dark", color);
        document.documentElement.style.setProperty("--primary-soft", color + "1A");
      }

      document.getElementById("btnHome").href = "./index.html?tenantId=" + encodeURIComponent(state.tenantId);
    }

    function renderTrip(oldData, rawData) {
      document.getElementById("tripTitle").textContent = oldData.title || "未命名行程";
      document.getElementById("topTitle").textContent = oldData.title || "未命名行程";
      document.getElementById("tripSubtitle").textContent =
        oldData.subtitle ||
        oldData.description ||
        ((oldData.country || "") + " " + (oldData.city || "")).trim() ||
        "歡迎查看本行程";

      document.getElementById("tripPrice").textContent = formatCurrency(oldData.price || DEFAULT_ORDER_AMOUNT, oldData.currency || "TWD");
      document.getElementById("stickyPrice").textContent = formatCurrency(oldData.price || DEFAULT_ORDER_AMOUNT, oldData.currency || "TWD");
      document.getElementById("summaryPlace").textContent = ((oldData.country || "") + " " + (oldData.city || "")).trim() || "--";
      document.getElementById("summaryDays").textContent = oldData.days ? (oldData.days + " 天") : "--";
      document.getElementById("summaryStartDate").textContent = formatDateText(oldData.startDate);

      document.getElementById("tripDescription").textContent = oldData.description || "暫無說明";
      document.getElementById("coverImage").src = oldData.image || "https://picsum.photos/1200/800";

      const meta = [];
      if (oldData.region) meta.push(`<span class="pill">🧭 ${escapeHtml(oldData.region)}</span>`);
      if (oldData.country) meta.push(`<span class="pill">🌍 ${escapeHtml(oldData.country)}</span>`);
      if (oldData.city) meta.push(`<span class="pill">📍 ${escapeHtml(oldData.city)}</span>`);
      if (oldData.days) meta.push(`<span class="pill">🗓️ ${escapeHtml(String(oldData.days))} 天</span>`);
      if (oldData.nights) meta.push(`<span class="pill">🌙 ${escapeHtml(String(oldData.nights))} 夜</span>`);
      if (oldData.startDate) meta.push(`<span class="pill">✈️ ${escapeHtml(formatDateText(oldData.startDate))}</span>`);
      if (rawData.status) meta.push(`<span class="pill">📌 ${escapeHtml(String(rawData.status))}</span>`);
      document.getElementById("tripMeta").innerHTML = meta.join("");

      document.getElementById("tripHighlights").innerHTML = oldData.highlights.length
        ? oldData.highlights.map(item => `<span class="tag-chip">${escapeHtml(item)}</span>`).join("")
        : `<div class="empty">目前尚未設定亮點</div>`;

      document.getElementById("tripDays").innerHTML = oldData.schedule.length
        ? oldData.schedule.map((item, idx) => `
            <div class="timeline-item">
              <div class="timeline-day">${escapeHtml(item.day || ("Day " + (idx + 1)))}</div>
              <div class="timeline-content">${escapeHtml(item.content || "")}</div>
            </div>
          `).join("")
        : `<div class="empty">目前尚未設定每日行程</div>`;
    }

    async function loadTrip() {
      const state = getTrackingState();

      if (!state.itineraryId) {
        document.getElementById("tripTitle").textContent = "缺少 itineraryId";
        document.getElementById("topTitle").textContent = "缺少 itineraryId";
        document.getElementById("tripDescription").textContent = "請從帶有 ?it=it_001 或 ?itineraryId=... 的連結進入";
        return;
      }

      const res = await apiGet(
        "/api/public/itinerary?tenantId=" +
        encodeURIComponent(state.tenantId) +
        "&itineraryId=" +
        encodeURIComponent(state.itineraryId)
      );

      tripData = res && res.data ? res.data.data : null;

      if (!tripData) {
        document.getElementById("tripTitle").textContent = "找不到行程";
        document.getElementById("topTitle").textContent = "找不到行程";
        document.getElementById("tripDescription").textContent = "請確認 itineraryId 是否存在";
        return;
      }

      const oldData = mapToOldStyle(tripData);
      renderTrip(oldData, tripData);
      logStatus("行程載入完成：" + (oldData.title || state.itineraryId), true);
    }

    function renderReferralInfo() {
      const state = getTrackingState();

      document.getElementById("refInfo").innerHTML =
        "tenantId：<b>" + escapeHtml(state.tenantId || "-") + "</b><br>" +
        "itineraryId：<b>" + escapeHtml(state.itineraryId || "-") + "</b><br>" +
        "refUid：<b>" + escapeHtml(state.refUid || "direct") + "</b><br><br>" +
        "用戶從這個行程頁進站後，系統會記錄來源，後續綁定 LINE 與下單時自動帶入。";
    }

    async function initLiffOnly() {
      logStatus("初始化 LIFF 中...");
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        logStatus("尚未登入 LINE，請點擊下方或頁面中的 LINE 登入按鈕");
        return { loggedIn: false };
      }

      const profile = await liff.getProfile();
      currentProfile = profile;
      currentLineUserId = profile.userId || "";

      logStatus(
        "LINE 已登入\\n" +
        "userId：" + (profile.userId || "") + "\\n" +
        "displayName：" + (profile.displayName || "")
      );

      return { loggedIn: true, profile: profile };
    }

    async function registerLineMember() {
      const initResult = await initLiffOnly();

      if (!initResult.loggedIn) {
        liff.login({ redirectUri: window.location.href });
        return;
      }

      const profile = initResult.profile;
      const state = getTrackingState();

      logStatus("LINE 已登入，開始寫入會員資料...", true);

      const res = await apiPost("/api/member/register", {
        tenantId: state.tenantId,
        uid: profile.userId,
        name: profile.displayName || "",
        avatarUrl: profile.pictureUrl || "",
        lineDisplayName: profile.displayName || "",
        linePictureUrl: profile.pictureUrl || "",
        role: "member",
        status: "active",
        sourceChannel: "line_liff",
        refDistributorUid: state.refUid,
        notes: state.itineraryId ? ("from_itinerary:" + state.itineraryId) : ""
      });

      logStatus("會員綁定結果：\\n" + JSON.stringify(res, null, 2), true);
      return res;
    }

    async function submitOrder() {
      const state = getTrackingState();

      if (!state.itineraryId) {
        alert("缺少 itineraryId");
        return;
      }

      if (!currentProfile) {
        const li = await initLiffOnly();
        if (!li.loggedIn) {
          alert("請先完成 LINE 登入");
          return;
        }
        currentProfile = li.profile;
      }

      const amount = Number((tripData && tripData.price) || DEFAULT_ORDER_AMOUNT);

      const res = await apiPost("/api/admin/create-order", {
        tenantId: state.tenantId,
        itineraryId: state.itineraryId,
        uid: currentProfile.userId,
        customerName: currentProfile.displayName || "LINE會員",
        customerPhone: "",
        customerEmail: "",
        travelDate: (tripData && (tripData.departureDate || tripData.travelDate)) || "",
        qty: 1,
        totalAmount: amount,
        currency: (tripData && tripData.currency) || "TWD",
        paymentMethod: "line_liff_demo",
        paymentStatus: "unpaid",
        attributionSource: state.refUid ? "line_referral" : "direct",
        distributorUid: state.refUid,
        refUid: state.refUid,
        sourcePage: window.location.href,
        notes: "trip.html 舊模型融合版下單"
      });

      logStatus("訂單建立結果：\\n" + JSON.stringify(res, null, 2), true);

      if (res && res.success) {
        const orderId = (res.data && res.data.orderId) || res.orderId || "";
        const successUrl =
          "./success.html?tenantId=" + encodeURIComponent(state.tenantId) +
          "&it=" + encodeURIComponent(state.itineraryId) +
          "&amount=" + encodeURIComponent(amount) +
          "&orderId=" + encodeURIComponent(orderId) +
          (state.refUid ? "&ref=" + encodeURIComponent(state.refUid) : "");
        window.location.href = successUrl;
      } else {
        alert("訂單送出失敗，請查看狀態區");
      }
    }

    function bindEvents() {
      document.getElementById("btnCopyPage").addEventListener("click", function() {
        copyText(window.location.href);
      });

      document.getElementById("btnLineLogin").addEventListener("click", async function() {
        try {
          await registerLineMember();
        } catch (err) {
          logStatus("LINE 綁定失敗：\\n" + (err.message || String(err)), true);
        }
      });

      document.getElementById("btnLineLoginBottom").addEventListener("click", async function() {
        try {
          await registerLineMember();
        } catch (err) {
          logStatus("LINE 綁定失敗：\\n" + (err.message || String(err)), true);
        }
      });

      document.getElementById("btnOrderHero").addEventListener("click", async function() {
        try {
          await submitOrder();
        } catch (err) {
          logStatus("建立訂單失敗：\\n" + (err.message || String(err)), true);
        }
      });

      document.getElementById("btnOrderBottom").addEventListener("click", async function() {
        try {
          await submitOrder();
        } catch (err) {
          logStatus("建立訂單失敗：\\n" + (err.message || String(err)), true);
        }
      });
    }

    async function boot() {
      try {
        saveTrackingParams();
        bindEvents();
        renderReferralInfo();
        await loadTenant();
        await loadTrip();
        await initLiffOnly();
      } catch (err) {
        logStatus("初始化失敗：\\n" + (err.message || String(err)));
      }
    }

    boot();
  </script>
</body>
</html>
