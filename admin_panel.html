<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>旅行管家 - 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app" class="flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-[#174a5a] text-white h-screen sticky top-0 p-6">
            <h1 class="text-xl font-black mb-10 tracking-tighter italic">TRAVEL KEEPER</h1>
            <nav class="space-y-2 text-sm font-bold">
                <a href="#" class="block p-4 bg-white/10 rounded-2xl"><i class="fa-solid fa-list mr-3"></i>行程清單</a>
                <a href="https://fangwl591021.github.io/travelman/" target="_blank" class="block p-4 hover:bg-white/5 rounded-2xl"><i class="fa-solid fa-plus mr-3"></i>新增行程</a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-12">
            <h2 class="text-3xl font-black text-slate-800 mb-10">已發布行程管理</h2>
            
            <div v-if="loading" class="text-slate-400">正在讀取 KV 資料庫...</div>
            <div v-else class="grid gap-6">
                <div v-for="c in courses" :key="c.id" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-between">
                    <div>
                        <div class="text-[10px] font-bold text-slate-300 uppercase mb-1">{{ c.id }}</div>
                        <h3 class="text-xl font-black text-slate-800">{{ c.title }}</h3>
                        <div class="mt-2 text-sm text-slate-400 font-bold">
                            <span class="mr-4">{{ c.days }} 天行程</span>
                            <span class="text-red-500">$ {{ c.price.toLocaleString() }}</span>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <a :href="'https://fangwl591021.github.io/travelman/travel_website.html?id=' + c.id" target="_blank" class="p-4 bg-slate-50 rounded-2xl text-slate-400 hover:text-slate-900"><i class="fa-solid fa-eye"></i></a>
                        <a :href="'https://fangwl591021.github.io/travelman/index.html?id=' + c.id" class="p-4 bg-slate-50 rounded-2xl text-blue-500 hover:bg-blue-50"><i class="fa-solid fa-pen-to-square"></i> 編修</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() { return { courses: [], loading: true } },
            async mounted() {
                try {
                    const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/courses');
                    this.courses = await res.json();
                } catch (e) { console.error(e); } finally { this.loading = false; }
            }
        }).mount('#app');
    </script>
</body>
</html>
