<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行管家 - 精選行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background-color: #f8fafc; }
        .course-card img { height: 280px; width: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 列表頁 -->
        <div v-if="!currentCourse" class="max-w-7xl mx-auto px-6 py-16">
            <h1 class="text-4xl font-black text-slate-800 mb-10 text-center">精選旅遊行程</h1>
            <div v-if="loading" class="text-center py-20 text-slate-400">正在載入行程...</div>
            <div v-else class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div v-for="c in courses" :key="c.id" @click="viewDetail(c.id)" class="course-card bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all cursor-pointer group">
                    <img :src="c.cover_image">
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-slate-800 mb-4 line-clamp-2">{{ c.title }}</h3>
                        <div class="flex justify-between items-center mt-6">
                            <span class="text-slate-400 text-sm font-bold">{{ c.days || '行程圖集' }}</span>
                            <span class="text-red-500 font-black text-2xl">${{ formatPrice(c.price) }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 詳情頁 (圖集渲染模式) -->
        <div v-else class="bg-black min-h-screen">
            <div class="fixed top-0 left-0 w-full p-4 z-50 flex justify-between items-center bg-black/50 backdrop-blur-md">
                <button @click="currentCourse = null" class="text-white font-bold px-4 py-2 rounded-full border border-white/20">← 返回</button>
                <div class="text-white font-bold truncate max-w-[200px]">{{ currentCourse.title }}</div>
                <button class="bg-red-500 text-white font-bold px-6 py-2 rounded-full shadow-lg">立即預約</button>
            </div>

            <!-- 核心改動：直接按順序渲染所有圖片 -->
            <div class="max-w-3xl mx-auto pt-24 pb-20 px-0">
                <div v-if="currentCourse.images && currentCourse.images.length > 0">
                    <img v-for="(img, idx) in currentCourse.images" :key="idx" :src="img" class="w-full h-auto block mb-0 shadow-2xl">
                </div>
                <!-- 舊版文字相容 -->
                <div v-else class="px-6 py-10 bg-white rounded-3xl mt-4 mx-4">
                    <p class="text-slate-600">{{ currentCourse.description }}</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() { return { courses: [], currentCourse: null, loading: true } },
            async mounted() {
                try {
                    const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/courses');
                    this.courses = await res.json();
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const courseId = urlParams.get('id');
                    if (courseId) this.viewDetail(courseId);
                } catch (e) { console.error(e); } finally { this.loading = false; }
            },
            methods: {
                formatPrice(p) { return Number(p).toLocaleString(); },
                viewDetail(id) {
                    const c = this.courses.find(item => item.id === id);
                    if (c) { this.currentCourse = c; window.scrollTo(0, 0); }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
