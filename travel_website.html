<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程詳情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: -apple-system, "PingFang TC", sans-serif; color: #111; line-height: 1.6; margin: 0; padding: 0; background: #fff; }
        /* 移除多餘包框，純淨留白 */
        .hero { width: 100%; height: 45vh; position: relative; background: #f4f4f4; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .hero-mask { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 80%); }
        .hero-content { position: absolute; bottom: 20px; left: 20px; right: 20px; color: white; max-w: 700px; margin: 0 auto; }
        
        .content-wrap { max-w: 700px; margin: 0 auto; padding: 30px 20px; }
        .day-block { margin-bottom: 50px; border-bottom: 1px solid #eee; padding-bottom: 40px; }
        .day-block:last-child { border-bottom: none; }
        
        .day-title { font-size: 20px; font-weight: 500; color: #111; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .day-num { font-size: 14px; color: #06C755; font-weight: bold; }
        
        .day-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; margin-bottom: 16px; }
        .day-desc { font-size: 15px; color: #444; margin-bottom: 24px; text-align: justify; }
        
        /* 資訊區塊：無線條包覆，單純底線 */
        .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .info-label { width: 60px; color: #888; }
        .info-val { flex: 1; color: #111; }
        
        .price-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="loading" class="flex items-center justify-center h-screen text-slate-400 text-sm">讀取中...</div>

        <div v-else-if="course">
            <div class="hero">
                <img :src="course.imgUrl || 'https://images.pexels.com/photos/2559941/pexels-photo-2559941.jpeg?auto=compress&cs=tinysrgb&w=1200'">
                <div class="hero-mask"></div>
                <div class="hero-content">
                    <h1 class="text-2xl font-medium leading-snug">{{ course.title }}</h1>
                    <div class="text-xs opacity-80 mt-1">{{ course.days }} 天行程</div>
                </div>
            </div>

            <div class="content-wrap">
                <p class="text-base text-slate-500 mb-12 leading-relaxed">{{ course.desc }}</p>

                <div v-for="(day, idx) in course.itinerary" :key="idx" class="day-block">
                    <div class="day-title">
                        <span class="day-num">D{{ idx + 1 }}</span>
                        <span>{{ day.route }}</span>
                    </div>
                    
                    <img v-if="day.imgUrl" :src="day.imgUrl" class="day-img">
                    
                    <div class="day-desc space-y-3">
                        <p v-for="p in (Array.isArray(day.infos) ? day.infos : [day.infos])" :key="p">{{ p }}</p>
                    </div>

                    <div>
                        <div class="info-row"><div class="info-label">早餐</div><div class="info-val">{{ day.b || '自理' }}</div></div>
                        <div class="info-row"><div class="info-label">午餐</div><div class="info-val">{{ day.l || '自理' }}</div></div>
                        <div class="info-row"><div class="info-label">晚餐</div><div class="info-val">{{ day.d || '自理' }}</div></div>
                        <div class="info-row mt-2 pt-2 border-t border-slate-100"><div class="info-label">住宿</div><div class="info-val">{{ day.hotel || '溫馨旅宿' }}</div></div>
                    </div>
                </div>
            </div>

            <!-- 固定報價與聯絡列 -->
            <div class="price-bar">
                <div>
                    <div class="text-xl text-red-500 font-medium">NT$ {{ Number(course.price).toLocaleString() }}</div>
                    <div class="text-[10px] text-slate-400">每位成人</div>
                </div>
                <a href="https://line.me/R/ti/p/@yourid" target="_blank" class="bg-[#06C755] text-white px-5 py-2 rounded text-sm font-medium">
                    LINE 諮詢
                </a>
            </div>
            <div class="h-20"></div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() { return { loading: true, course: null } },
            async mounted() {
                const id = new URLSearchParams(window.location.search).get('id');
                if (!id) return;
                try {
                    const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/get-course?id=` + id);
                    this.course = await res.json();
                    document.title = this.course.title;
                    window.scrollTo(0, 0);
                } catch (e) {} finally { this.loading = false; }
            }
        }).mount('#app');
    </script>
</body>
</html>
