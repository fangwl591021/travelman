<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程詳情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: -apple-system, "PingFang TC", sans-serif; color: #333; line-height: 1.8; margin: 0; padding: 0; background: #fff; }
        .hero { width: 100%; height: 50vh; position: relative; background: #f8fafc; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .hero-mask { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%); }
        .hero-content { position: absolute; bottom: 30px; left: 24px; right: 24px; color: white; max-w: 800px; margin: 0 auto; }
        
        .content-wrap { max-w: 800px; margin: 0 auto; padding: 40px 24px; }
        .day-block { margin-bottom: 48px; border-bottom: 1px solid #f1f5f9; padding-bottom: 48px; }
        .day-block:last-child { border-bottom: none; }
        .day-title { font-size: 20px; color: #111; margin-bottom: 16px; display: flex; align-items: baseline; gap: 12px; }
        .day-num { font-size: 12px; color: #06C755; }
        
        .day-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; margin-bottom: 20px; border-radius: 2px; }
        .day-desc { font-size: 15px; color: #555; text-align: justify; margin-bottom: 24px; }
        
        .info-panel { font-size: 14px; color: #666; background: #fafafa; padding: 20px; border-radius: 2px; }
        .info-row { display: flex; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border-bottom: none; }
        .info-label { width: 60px; color: #999; }
        
        .price-bar { position: sticky; bottom: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid #eee; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 50; }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="loading" class="flex items-center justify-center h-screen text-slate-400">讀取中...</div>

        <div v-else-if="course">
            <div class="hero">
                <img :src="course.imgUrl || 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1600&auto=format&fit=crop'">
                <div class="hero-mask"></div>
                <div class="hero-content">
                    <h1 class="text-2xl md:text-4xl font-medium leading-snug">{{ course.title }}</h1>
                    <div class="text-sm opacity-80 mt-2">{{ course.days }} 天行程</div>
                </div>
            </div>

            <div class="content-wrap">
                <p class="text-base text-slate-500 mb-16 leading-relaxed">{{ course.desc }}</p>

                <div v-for="(day, idx) in course.itinerary" :key="idx" class="day-block">
                    <div class="day-title">
                        <span class="day-num">D{{ idx + 1 }}</span>
                        <span>{{ day.route }}</span>
                    </div>
                    
                    <img v-if="day.imgUrl" :src="day.imgUrl" class="day-img">
                    
                    <div class="day-desc space-y-4">
                        <p v-for="p in (Array.isArray(day.infos) ? day.infos : [day.infos])" :key="p">{{ p }}</p>
                    </div>

                    <div class="info-panel">
                        <div class="info-row"><div class="info-label">早餐</div><div class="flex-1 text-slate-800">{{ day.b || '自理' }}</div></div>
                        <div class="info-row"><div class="info-label">午餐</div><div class="flex-1 text-slate-800">{{ day.l || '自理' }}</div></div>
                        <div class="info-row"><div class="info-label">晚餐</div><div class="flex-1 text-slate-800">{{ day.d || '自理' }}</div></div>
                        <div class="info-row mt-2 pt-2 border-t border-slate-200"><div class="info-label">住宿</div><div class="flex-1 text-slate-800">{{ day.hotel || '溫馨旅宿' }}</div></div>
                    </div>
                </div>
            </div>

            <!-- 全裝置通用的簡潔底部報價與聯絡列 -->
            <div class="price-bar">
                <div>
                    <div class="text-2xl text-red-600 font-medium">NT$ {{ Number(course.price).toLocaleString() }}</div>
                    <div class="text-xs text-slate-400">每位成人</div>
                </div>
                <a href="https://line.me/R/ti/p/@yourid" target="_blank" class="bg-[#06C755] text-white px-6 py-2 rounded text-sm font-medium">
                    LINE 諮詢
                </a>
            </div>
            <!-- 避免底部列遮擋內容 -->
            <div class="h-24"></div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() { return { loading: true, course: null } },
            async mounted() {
                const id = new URLSearchParams(window.location.search).get('id');
                if (!id) return;
                try {
                    const res = await fetch(`https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/get-course?id=` + id);
                    this.course = await res.json();
                    document.title = this.course.title;
                    window.scrollTo(0, 0);
                } catch (e) {} finally { this.loading = false; }
            }
        }).mount('#app');
    </script>
</body>
</html>
