<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程詳情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; color: #333; line-height: 1.6; margin: 0; background: #fff; font-weight: 400; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; min-height: 100vh; }
        .main-content { flex: 1; padding: 40px; border-right: 1px solid #f0f0f0; }
        .sidebar { width: 340px; padding: 40px; position: sticky; top: 0; height: fit-content; }
        .hero-img { width: 100%; aspect-ratio: 21/9; object-fit: cover; border-radius: 4px; margin-bottom: 30px; }
        .day-item { margin-bottom: 50px; border-bottom: 1px solid #f8f8f8; padding-bottom: 30px; }
        .day-tag { font-size: 11px; color: #003b95; letter-spacing: 0.1em; margin-bottom: 10px; display: block; }
        .day-photo { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; margin-bottom: 20px; }
        .day-desc { font-size: 14px; color: #555; text-align: justify; }
        .info-row { display: flex; font-size: 13px; padding: 8px 0; border-top: 1px solid #fafafa; }
        .price-box { padding: 30px; border: 1px solid #eee; border-radius: 4px; }
        .price-val { font-size: 32px; color: #d4111e; margin: 10px 0; }
        .btn-line { background: #003b95; color: #fff; width: 100%; padding: 15px; border-radius: 4px; text-align: center; display: block; text-decoration: none; font-size: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="loading" class="flex items-center justify-center h-screen text-slate-300 italic">載入行程細節中...</div>
        <div v-else-if="course" class="container">
            <main class="main-content">
                <img :src="course.imgUrl" class="hero-img">
                <div class="mb-12">
                    <div class="inline-block bg-[#febb02] px-2 py-0.5 text-[10px] rounded mb-3">{{ course.days }} 天行程</div>
                    <h1 class="text-2xl text-slate-800">{{ course.title }}</h1>
                    <p class="mt-4 text-slate-500 text-sm leading-relaxed">{{ course.desc }}</p>
                </div>
                <div v-if="Array.isArray(course.itinerary)">
                    <div v-for="(day, idx) in course.itinerary" :key="idx" class="day-item">
                        <span class="day-tag">DAY 0{{ idx + 1 }}</span>
                        <h2 class="text-xl mb-4 text-slate-700 font-normal">{{ day.route }}</h2>
                        <img v-if="day.imgUrl" :src="day.imgUrl" class="day-photo">
                        <div class="day-desc space-y-4">
                            <p v-for="p in (Array.isArray(day.infos) ? day.infos : [day.infos])" :key="p">{{ p }}</p>
                        </div>
                        <div class="bg-slate-50 p-5 rounded mt-6 text-sm">
                            <div class="info-row"><span class="w-16 text-slate-400">早餐</span><span>{{ day.b || '自理' }}</span></div>
                            <div class="info-row"><span class="w-16 text-slate-400">午餐</span><span>{{ day.l || '特色風味餐' }}</span></div>
                            <div class="info-row"><span class="w-16 text-slate-400">晚餐</span><span>{{ day.d || '飯店內用' }}</span></div>
                            <div class="info-row mt-3 pt-3 border-t border-slate-200"><span class="w-16 text-slate-400">住宿</span><span class="text-[#003b95] font-medium">{{ day.hotel || '精選飯店或同級' }}</span></div>
                        </div>
                    </div>
                </div>
            </main>
            <aside class="sidebar">
                <div class="price-box">
                    <div class="text-xs text-slate-400">每位成人</div>
                    <div class="price-val">NT$ {{ formatPrice(course.price) }}</div>
                    <a href="https://line.me/R/ti/p/@yourid" target="_blank" class="btn-line">立即預約諮詢</a>
                </div>
            </aside>
        </div>
        <div v-else class="text-center py-20 text-slate-400">未找到行程。</div>
    </div>
    <script>
        const { createApp } = Vue;
        createApp({
            data() { return { loading: true, course: null } },
            methods: { formatPrice(p) { return isNaN(Number(p)) ? (p||'0') : Number(p).toLocaleString(); } },
            async mounted() {
                const id = new URLSearchParams(window.location.search).get('id');
                if (!id) return;
                try {
                    const res = await fetch(`${API_BASE}/api/get-course?id=${id}`);
                    this.course = await res.json();
                    if (!this.course.itinerary || !Array.isArray(this.course.itinerary)) this.course.itinerary = [];
                    if (this.course.title) document.title = this.course.title;
                } catch (e) {} finally { this.loading = false; }
            }
        }).mount('#app');
    </script>
</body>
</html>
