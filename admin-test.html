<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>TravelKeeper Admin v2</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}
h1 { margin-bottom: 10px; }

.section {
  margin-top: 30px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  background: #0A84FF;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin: 10px 0;
  display: flex;
  gap: 10px;
  align-items: center;
}

.card img {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
}

.table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

.table th, .table td {
  border: 1px solid #ddd;
  padding: 8px;
}

.link-box {
  background: #000;
  color: #0f0;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🚀 TravelKeeper Admin v2</h1>

<div class="section">
<h2>📦 行程</h2>
<button onclick="saveItinerary()">建立測試行程</button>
<button onclick="loadItineraries()">刷新列表</button>
<div id="itineraryList"></div>
</div>

<div class="section">
<h2>🤝 分銷</h2>
<button onclick="generateLink()">產生分銷連結</button>
<div id="linkBox" class="link-box"></div>
</div>

<div class="section">
<h2>💰 訂單</h2>
<button onclick="createOrder()">建立測試訂單</button>
<button onclick="loadOrders()">查訂單</button>
<table class="table">
<thead>
<tr>
<th>訂單</th>
<th>會員</th>
<th>金額</th>
<th>分銷</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>
</div>

<script>
const BASE = "https://travelkeeper-saas-worker.fangwl591021.workers.dev";
const TENANT = "t001";

// ===== API =====
async function get(url) {
  const res = await fetch(BASE + url);
  return await res.json();
}
async function post(url, data) {
  const res = await fetch(BASE + url, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
  return await res.json();
}

// ===== 行程 =====
async function saveItinerary() {
  await post("/api/admin/save-itinerary", {
    tenantId: TENANT,
    itineraryId: "it_" + Date.now(),
    title: "東京賞櫻五日遊",
    price: 29900,
    status: "published",
    country: "日本",
    city: "東京",
    coverImageUrl: "https://picsum.photos/200/120"
  });
  loadItineraries();
}

async function loadItineraries() {
  const res = await get(`/api/public/itineraries?tenantId=${TENANT}`);
  const list = res?.data?.items || [];

  const html = list.map(it => `
    <div class="card">
      <img src="${it.coverImageUrl || 'https://picsum.photos/200'}">
      <div>
        <div><b>${it.title}</b></div>
        <div>💰 ${it.price || 0}</div>
        <button onclick="createOrder('${it.itineraryId}')">下單</button>
      </div>
    </div>
  `).join("");

  document.getElementById("itineraryList").innerHTML = html;
}

// ===== 分銷 =====
function generateLink() {
  const ref = "U_DIST_001";
  const link = `${location.origin}?ref=${ref}`;
  document.getElementById("linkBox").innerText = link;
}

// ===== 訂單 =====
async function createOrder(itineraryId="it_001") {
  await post("/api/admin/create-order", {
    tenantId: TENANT,
    itineraryId,
    uid: "U_MEMBER_001",
    customerName: "王小明",
    totalAmount: 29900,
    distributorUid: "U_DIST_001"
  });
  loadOrders();
}

async function loadOrders() {
  const res = await get(`/api/member/orders?tenantId=${TENANT}&uid=U_MEMBER_001`);
  const list = res?.data?.items || [];

  const html = list.map(o => `
    <tr>
      <td>${o.orderId}</td>
      <td>${o.customerName}</td>
      <td>${o.totalAmount}</td>
      <td>${o.distributorUid || "-"}</td>
    </tr>
  `).join("");

  document.getElementById("orderTable").innerHTML = html;
}

// init
loadItineraries();
</script>

</body>
</html>
