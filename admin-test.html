<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>TravelKeeper Admin v3</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 { margin-bottom: 10px; }

.kpi {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.kpi-box {
  flex: 1;
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.section {
  margin-top: 30px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin: 10px 0;
  display: flex;
  gap: 10px;
  align-items: center;
}

.card img {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
}

.table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

.table th, .table td {
  border: 1px solid #ddd;
  padding: 8px;
}

.copy {
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<h1 id="brandTitle">🚀 TravelKeeper Admin</h1>

<!-- KPI -->
<div class="kpi">
  <div class="kpi-box">
    <div>📦 行程</div>
    <b id="kpiItinerary">0</b>
  </div>
  <div class="kpi-box">
    <div>💰 訂單</div>
    <b id="kpiOrders">0</b>
  </div>
  <div class="kpi-box">
    <div>💵 營收</div>
    <b id="kpiRevenue">0</b>
  </div>
  <div class="kpi-box">
    <div>🤝 分銷</div>
    <b id="kpiDistributor">1</b>
  </div>
</div>

<!-- 行程 -->
<div class="section">
<h2>📦 行程管理</h2>
<button id="btnMain" onclick="saveItinerary()">建立行程</button>
<div id="itineraryList"></div>
</div>

<!-- 訂單 -->
<div class="section">
<h2>💰 訂單管理</h2>
<button id="btnMain2" onclick="loadOrders()">刷新訂單</button>
<table class="table">
<thead>
<tr>
<th>訂單</th>
<th>客戶</th>
<th>金額</th>
<th>分銷</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>
</div>

<script>
const BASE = "https://travelkeeper-saas-worker.fangwl591021.workers.dev";
const TENANT = "t001";

let PRIMARY = "#0A84FF";

// ===== API =====
async function get(url) {
  const res = await fetch(BASE + url);
  return await res.json();
}
async function post(url, data) {
  const res = await fetch(BASE + url, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
  return await res.json();
}

// ===== 初始化 =====
async function init() {
  await loadTenant();
  await loadItineraries();
  await loadOrders();
}

async function loadTenant() {
  const res = await get(`/api/public/tenant?tenantId=${TENANT}`);
  const t = res?.data?.data || {};

  document.getElementById("brandTitle").innerText =
    "🚀 " + (t.brandName || "TravelKeeper");

  PRIMARY = t.primaryColor || "#0A84FF";

  document.querySelectorAll("button").forEach(btn=>{
    btn.style.background = PRIMARY;
  });
}

// ===== 行程 =====
async function saveItinerary() {
  await post("/api/admin/save-itinerary", {
    tenantId: TENANT,
    itineraryId: "it_" + Date.now(),
    title: "東京賞櫻五日遊",
    price: 29900,
    status: "published",
    country: "日本",
    city: "東京",
    coverImageUrl: "https://picsum.photos/200/120"
  });
  loadItineraries();
}

async function loadItineraries() {
  const res = await get(`/api/public/itineraries?tenantId=${TENANT}`);
  const list = res?.data?.items || [];

  document.getElementById("kpiItinerary").innerText = list.length;

  const html = list.map(it => {
    const link = `${location.origin}?ref=U_DIST_001&it=${it.itineraryId}`;

    return `
    <div class="card">
      <img src="${it.coverImageUrl || 'https://picsum.photos/200'}">
      <div>
        <div><b>${it.title}</b></div>
        <div>💰 ${it.price || 0}</div>

        <button onclick="createOrder('${it.itineraryId}')">下單</button>

        <div class="copy">分銷連結：</div>
        <div class="copy">${link}</div>
      </div>
    </div>
    `;
  }).join("");

  document.getElementById("itineraryList").innerHTML = html;
}

// ===== 訂單 =====
async function createOrder(itineraryId) {
  await post("/api/admin/create-order", {
    tenantId: TENANT,
    itineraryId,
    uid: "U_MEMBER_001",
    customerName: "王小明",
    totalAmount: 29900,
    distributorUid: "U_DIST_001"
  });
  loadOrders();
}

async function loadOrders() {
  const res = await get(`/api/member/orders?tenantId=${TENANT}&uid=U_MEMBER_001`);
  const list = res?.data?.items || [];

  document.getElementById("kpiOrders").innerText = list.length;

  let total = 0;

  const html = list.map(o => {
    total += Number(o.totalAmount || 0);

    return `
    <tr>
      <td>${o.orderId}</td>
      <td>${o.customerName}</td>
      <td>${o.totalAmount}</td>
      <td>${o.distributorUid || "-"}</td>
    </tr>
    `;
  }).join("");

  document.getElementById("kpiRevenue").innerText = total;

  document.getElementById("orderTable").innerHTML = html;
}

// init
init();
</script>

</body>
</html>
