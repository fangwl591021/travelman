<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distributor Dashboard</title>
  <style>
    :root {
      --primary: #0A84FF;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px;
    }

    .header, .section, .login-box {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,.06);
      margin-bottom: 18px;
    }

    .header {
      padding: 20px;
    }

    .login-box, .section {
      padding: 16px;
    }

    .brand {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .row {
      display: grid;
      gap: 16px;
    }

    .row-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    .row-2 {
      grid-template-columns: 1.2fr 1fr;
    }

    .kpi {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,.06);
      text-align: center;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .kpi .value {
      font-size: 28px;
      font-weight: 700;
    }

    .profile {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
    }

    .uid-box, .status-box, .link-box {
      background: #0b1220;
      color: #d1fae5;
      border-radius: 12px;
      padding: 12px;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.7;
      word-break: break-all;
    }

    .link-box {
      background: #111827;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      color: white;
      background: var(--primary);
      cursor: pointer;
      font-weight: 700;
      margin-right: 8px;
      margin-top: 8px;
    }

    button.secondary {
      background: #111827;
    }

    button.light {
      background: #e5e7eb;
      color: #111827;
    }

    .trip-card {
      display: flex;
      gap: 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .trip-card img {
      width: 140px;
      height: 94px;
      object-fit: cover;
      border-radius: 10px;
      background: #ddd;
    }

    .trip-card .body {
      flex: 1;
    }

    .trip-card .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .trip-card .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .trip-card .price {
      color: var(--primary);
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f9fafb;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .row-4, .row-2 {
        grid-template-columns: 1fr;
      }

      .trip-card {
        flex-direction: column;
      }

      .trip-card img {
        width: 100%;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div id="brandName" class="brand">TravelKeeper</div>
      <h1>分銷商儀表板</h1>
      <p class="muted">登入後可查看自己的推廣連結、訂單成效與可分享行程。</p>
    </div>

    <div class="login-box">
      <h2>LINE 分銷商登入</h2>
      <div class="profile">
        <img id="avatar" class="avatar" src="https://picsum.photos/120" alt="avatar" />
        <div>
          <div><b id="distName">尚未登入</b></div>
          <div id="distUid" class="muted">UID 未取得</div>
        </div>
      </div>
      <div style="margin-top:10px;">
        <button id="btnLogin">LINE 登入</button>
        <button id="btnRefresh" class="secondary">刷新資料</button>
      </div>
    </div>

    <div class="row row-4">
      <div class="kpi">
        <div class="label">訂單數</div>
        <div id="kpiOrders" class="value">0</div>
      </div>
      <div class="kpi">
        <div class="label">總營收</div>
        <div id="kpiRevenue" class="value">0</div>
      </div>
      <div class="kpi">
        <div class="label">預估佣金</div>
        <div id="kpiCommission" class="value">0</div>
      </div>
      <div class="kpi">
        <div class="label">推薦會員數</div>
        <div id="kpiUsers" class="value">0</div>
      </div>
    </div>

    <div class="row row-2">
      <div class="section">
        <h2>我的推廣資訊</h2>
        <div id="promoInfo" class="uid-box">尚未登入，暫無推廣資訊。</div>
      </div>

      <div class="section">
        <h2>系統狀態</h2>
        <div id="statusBox" class="status-box">尚未初始化</div>
      </div>
    </div>

    <div class="section">
      <h2>可推廣行程</h2>
      <div id="tripList"></div>
    </div>

    <div class="section">
      <h2>我的訂單</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>訂單號</th>
              <th>客戶</th>
              <th>金額</th>
              <th>歸因來源</th>
              <th>行程 ID</th>
              <th>時間</th>
            </tr>
          </thead>
          <tbody id="orderTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const BASE = "https://travelkeeper-saas-worker.fangwl591021.workers.dev";
    const TENANT = "t001";
    const LIFF_ID = "2009367829-Ewwp8jfA";
    const FRONTEND_URL = "https://fangwl591021.github.io/travelman";

    let primaryColor = "#0A84FF";
    let currentProfile = null;
    let currentUid = localStorage.getItem("tk_distributor_uid") || "";

    function setStatus(msg, append = false) {
      const el = document.getElementById("statusBox");
      if (append) {
        el.textContent += "\n" + msg;
      } else {
        el.textContent = msg;
      }
    }

    async function apiGet(path) {
      const res = await fetch(BASE + path);
      return await res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      return await res.json();
    }

    function formatNumber(n) {
      return Number(n || 0).toLocaleString();
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function buildPromoLink(itineraryId) {
      return `${FRONTEND_URL}/trip.html?tenantId=${encodeURIComponent(TENANT)}&it=${encodeURIComponent(itineraryId)}&ref=${encodeURIComponent(currentUid)}`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        setStatus("已複製：\n" + text);
      } catch (err) {
        setStatus("複製失敗，請手動複製：\n" + text, true);
      }
    }

    async function loadTenant() {
      const res = await apiGet(`/api/public/tenant?tenantId=${TENANT}`);
      const t = res && res.data ? res.data.data : null;

      if (t) {
        document.getElementById("brandName").textContent = t.brandName || "TravelKeeper";
        primaryColor = t.primaryColor || "#0A84FF";
        document.documentElement.style.setProperty("--primary", primaryColor);
        document.querySelectorAll("button").forEach(btn => {
          if (!btn.classList.contains("light") && !btn.classList.contains("secondary")) {
            btn.style.background = primaryColor;
          }
        });
      }
    }

    function updateProfileUi() {
      document.getElementById("distName").textContent =
        currentProfile ? (currentProfile.displayName || "已登入") : (currentUid ? "已記錄登入者" : "尚未登入");

      document.getElementById("distUid").textContent =
        currentUid ? currentUid : "UID 未取得";

      if (currentProfile && currentProfile.pictureUrl) {
        document.getElementById("avatar").src = currentProfile.pictureUrl;
      }
    }

    async function initLiffOnly() {
      setStatus("初始化 LIFF 中...");
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        setStatus("尚未登入 LINE，請點擊登入按鈕。");
        return { loggedIn: false };
      }

      const profile = await liff.getProfile();
      currentProfile = profile;
      currentUid = profile.userId;
      localStorage.setItem("tk_distributor_uid", currentUid);

      updateProfileUi();

      setStatus(
        "LIFF 已登入\n" +
        "displayName：" + (profile.displayName || "") + "\n" +
        "uid：" + profile.userId
      );

      return { loggedIn: true, profile };
    }

    async function loginDistributor() {
      try {
        const result = await initLiffOnly();

        if (!result.loggedIn) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        const syncRes = await apiPost("/api/distributor/register", {
          tenantId: TENANT,
          uid: result.profile.userId,
          name: result.profile.displayName || "LINE分銷商",
          email: "",
          phone: "",
          status: "approved",
          roleLevel: "basic",
          commissionRate: 10,
          settingsJson: { from: "distributor_dashboard" },
          notes: "由 Distributor Dashboard 自動同步"
        });

        setStatus("分銷商同步完成：\n" + JSON.stringify(syncRes, null, 2), true);

        await refreshDashboard();
      } catch (err) {
        setStatus("分銷商登入失敗：\n" + (err.message || String(err)), true);
      }
    }

    async function loadDashboard() {
      if (!currentUid) {
        document.getElementById("promoInfo").textContent = "尚未登入，暫無推廣資訊。";
        document.getElementById("kpiOrders").textContent = "0";
        document.getElementById("kpiRevenue").textContent = "0";
        document.getElementById("kpiCommission").textContent = "0";
        document.getElementById("kpiUsers").textContent = "0";
        document.getElementById("orderTable").innerHTML = "<tr><td colspan='6'>尚未登入</td></tr>";
        return;
      }

      const res = await apiGet(`/api/distributor/dashboard?tenantId=${TENANT}&uid=${encodeURIComponent(currentUid)}`);
      const summary = res && res.data ? res.data.summary || {} : {};
      const orders = res && res.data ? res.data.orders || [] : [];
      const users = res && res.data ? res.data.users || [] : [];

      document.getElementById("kpiOrders").textContent = formatNumber(summary.orderCount || 0);
      document.getElementById("kpiRevenue").textContent = formatNumber(summary.totalRevenue || 0);
      document.getElementById("kpiCommission").textContent = formatNumber(summary.totalCommission || 0);
      document.getElementById("kpiUsers").textContent = formatNumber(summary.referredUsers || users.length || 0);

      document.getElementById("promoInfo").textContent =
        "分銷商 UID： " + currentUid + "\n" +
        "預設推廣方式： 將每個行程的推廣連結分享給客戶\n" +
        "下單後會自動歸因到目前登入者 UID";

      const orderHtml = orders.length
        ? orders.map(o => `
          <tr>
            <td>${escapeHtml(o.orderId)}</td>
            <td>${escapeHtml(o.customerName || "")}</td>
            <td>${formatNumber(o.totalAmount || 0)}</td>
            <td>${escapeHtml(o.attributionSource || "-")}</td>
            <td>${escapeHtml(o.itineraryId || "")}</td>
            <td>${escapeHtml(o.createdAt || o.orderDate || "")}</td>
          </tr>
        `).join("")
        : "<tr><td colspan='6'>目前尚無訂單</td></tr>";

      document.getElementById("orderTable").innerHTML = orderHtml;
    }

    async function loadTrips() {
      const res = await apiGet(`/api/public/itineraries?tenantId=${TENANT}`);
      const list = res && res.data ? res.data.items || [] : [];

      if (!list.length) {
        document.getElementById("tripList").innerHTML = `<div class="empty">目前尚無可推廣行程</div>`;
        return;
      }

      const html = list.map(it => {
        const link = currentUid ? buildPromoLink(it.itineraryId) : "";
        return `
          <div class="trip-card">
            <img src="${it.coverImageUrl || "https://picsum.photos/300/200"}" alt="trip">
            <div class="body">
              <div class="title">${escapeHtml(it.title || "未命名行程")}</div>
              <div class="meta">${escapeHtml(it.country || "")} ${escapeHtml(it.city || "")}</div>
              <div class="price">NT$ ${formatNumber(it.price || 0)}</div>
              ${
                currentUid
                  ? `
                    <button onclick="copyText('${link.replace(/'/g, "\\'")}')">複製推廣連結</button>
                    <button class="secondary" onclick="window.open('${link.replace(/'/g, "\\'")}', '_blank')">開啟推廣頁</button>
                    <div class="link-box" style="margin-top:10px;">${escapeHtml(link)}</div>
                  `
                  : `
                    <div class="muted">請先完成 LINE 分銷商登入，才能產生個人推廣連結。</div>
                  `
              }
            </div>
          </div>
        `;
      }).join("");

      document.getElementById("tripList").innerHTML = html;
    }

    async function refreshDashboard() {
      updateProfileUi();
      await loadDashboard();
      await loadTrips();
    }

    document.getElementById("btnLogin").addEventListener("click", loginDistributor);
    document.getElementById("btnRefresh").addEventListener("click", refreshDashboard);

    async function boot() {
      updateProfileUi();
      await loadTenant();

      try {
        await initLiffOnly();
      } catch (err) {
        setStatus("初始化 LIFF 狀態時略過：\n" + (err.message || String(err)), true);
      }

      await refreshDashboard();
    }

    boot();
  </script>
</body>
</html>
