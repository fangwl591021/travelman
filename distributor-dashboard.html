<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distributor Dashboard - LINE OA Style</title>
  <style>
    :root {
      --primary: #06c755;
      --primary-dark: #05a847;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --border: #dfe3e8;
      --text: #1f2937;
      --muted: #6b7280;
      --sidebar: #1f2a37;
      --sidebar-text: #e5e7eb;
      --header: #ffffff;
      --table-head: #f7f9fb;
      --success: #16a34a;
      --warn: #d97706;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
    }

    .app {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--sidebar);
      color: var(--sidebar-text);
      padding: 18px 14px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .brand-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-top: 8px;
    }

    .nav-group {
      margin-top: 18px;
    }

    .nav-title {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .nav-item {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      color: var(--sidebar-text);
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .nav-item.active,
    .nav-item:hover {
      background: rgba(255,255,255,0.08);
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      background: var(--header);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
    }

    .topbar-sub {
      color: var(--muted);
      font-size: 13px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 9px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-dark {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
    }

    .content {
      padding: 16px 18px 24px;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      background: #fff;
    }

    .panel-body {
      padding: 14px;
    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .kpi-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
    }

    .profile-box {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
      flex: 0 0 auto;
    }

    .uid-box,
    .status-box {
      background: #0b1220;
      color: #d1fae5;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      background: var(--table-head);
      color: #374151;
      font-weight: 700;
    }

    .trip-table th:nth-child(1) { width: 70px; }
    .trip-table th:nth-child(2) { width: auto; }
    .trip-table th:nth-child(3) { width: 120px; }
    .trip-table th:nth-child(4) { width: 140px; }
    .trip-table th:nth-child(5) { width: 320px; }

    .thumb {
      width: 56px;
      height: 42px;
      object-fit: cover;
      border-radius: 6px;
      background: #ddd;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .link-cell {
      font-size: 12px;
      color: #065f46;
      line-height: 1.5;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .mini-btn {
      border: 1px solid var(--border);
      background: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .mini-btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #f3f4f6;
      color: #374151;
    }

    .status-paid {
      background: #dcfce7;
      color: #166534;
    }

    .status-unpaid {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-processing {
      background: #fef3c7;
      color: #92400e;
    }

    .order-select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
    }

    .order-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    @media (max-width: 1024px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .kpi-row,
      .profile-grid {
        grid-template-columns: 1fr;
      }

      .trip-table th:nth-child(5) {
        width: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        Distributor Dashboard
        <div id="sideBrand" class="brand-badge">TravelKeeper</div>
      </div>

      <div class="nav-group">
        <div class="nav-title">功能</div>
        <button class="nav-item active">分銷儀表板</button>
        <button class="nav-item">推廣連結</button>
        <button class="nav-item">訂單明細</button>
        <button class="nav-item">行程清單</button>
      </div>

      <div class="nav-group">
        <div class="nav-title">說明</div>
        <div class="small">
          這版已補訂單狀態更新、付款狀態、撥款狀態、佣金狀態與佣金明細。
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <div>
            <div id="brandTitle" class="topbar-title">TravelKeeper 分銷商中心</div>
            <div class="topbar-sub">LINE 登入後，可直接取得個人專屬推廣連結</div>
          </div>
        </div>
        <div class="topbar-right">
          <button id="btnLogin" class="btn btn-primary">LINE 登入</button>
          <button id="btnRefresh" class="btn btn-dark">刷新資料</button>
        </div>
      </div>

      <div class="content">
        <div class="kpi-row">
          <div class="kpi-box">
            <div class="kpi-label">訂單數</div>
            <div id="kpiOrders" class="kpi-value">0</div>
          </div>
          <div class="kpi-box">
            <div class="kpi-label">總營收</div>
            <div id="kpiRevenue" class="kpi-value">0</div>
          </div>
          <div class="kpi-box">
            <div class="kpi-label">預估佣金</div>
            <div id="kpiCommission" class="kpi-value">0</div>
          </div>
          <div class="kpi-box">
            <div class="kpi-label">推薦會員數</div>
            <div id="kpiUsers" class="kpi-value">0</div>
          </div>
        </div>

        <div class="profile-grid">
          <div class="panel">
            <div class="panel-head">登入分銷商資訊</div>
            <div class="panel-body">
              <div class="profile-box">
                <img id="avatar" class="avatar" src="https://picsum.photos/120" alt="avatar">
                <div>
                  <div><b id="distName">尚未登入</b></div>
                  <div id="distUid" class="small">UID 未取得</div>
                </div>
              </div>
              <div style="margin-top:12px;" id="promoInfo" class="uid-box">尚未登入，暫無推廣資訊。</div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">系統狀態</div>
            <div class="panel-body">
              <div id="statusBox" class="status-box">尚未初始化</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">可推廣行程</div>
          <div class="table-wrap">
            <table class="trip-table">
              <thead>
                <tr>
                  <th>圖片</th>
                  <th>行程</th>
                  <th>價格</th>
                  <th>操作</th>
                  <th>推廣連結</th>
                </tr>
              </thead>
              <tbody id="tripTableBody">
                <tr><td colspan="5" class="empty">載入中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">我的訂單（含狀態與撥款管理）</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>訂單號</th>
                  <th>客戶</th>
                  <th>金額</th>
                  <th>佣金比例</th>
                  <th>佣金金額</th>
                  <th>訂單狀態</th>
                  <th>付款狀態</th>
                  <th>佣金狀態</th>
                  <th>撥款狀態</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="orderTable">
                <tr><td colspan="10" class="empty">載入中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const BASE = "https://travelkeeper-saas-worker.fangwl591021.workers.dev";
    const TENANT = "t001";
    const LIFF_ID = "2009367829-Ewwp8jfA";
    const FRONTEND_URL = "https://fangwl591021.github.io/travelman";

    let primaryColor = "#06c755";
    let currentProfile = null;
    let currentUid = localStorage.getItem("tk_distributor_uid") || "";

    function setStatus(msg, append = false) {
      const el = document.getElementById("statusBox");
      if (append) {
        el.textContent += "\n" + msg;
      } else {
        el.textContent = msg;
      }
    }

    async function apiGet(path) {
      const res = await fetch(BASE + path);
      return await res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      return await res.json();
    }

    function formatNumber(n) {
      return Number(n || 0).toLocaleString();
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function buildPromoLink(itineraryId) {
      return `${FRONTEND_URL}/trip.html?tenantId=${encodeURIComponent(TENANT)}&it=${encodeURIComponent(itineraryId)}&ref=${encodeURIComponent(currentUid)}`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        setStatus("已複製推廣連結：\n" + text);
      } catch (err) {
        setStatus("複製失敗，請手動複製：\n" + text, true);
      }
    }

    function statusPill(text, type) {
      const cls = type ? ("status-pill " + type) : "status-pill";
      return `<span class="${cls}">${escapeHtml(text)}</span>`;
    }

    function payoutPill(val) {
      if (val === "paid") return statusPill("已撥款", "status-paid");
      if (val === "processing") return statusPill("撥款中", "status-processing");
      return statusPill("未撥款", "status-unpaid");
    }

    function paymentPill(val) {
      if (val === "paid") return statusPill("已付款", "status-paid");
      if (val === "refunded") return statusPill("已退款", "status-processing");
      return statusPill("未付款", "status-unpaid");
    }

    async function loadTenant() {
      const res = await apiGet(`/api/public/tenant?tenantId=${TENANT}`);
      const t = res && res.data ? res.data.data : null;

      if (t) {
        document.getElementById("brandTitle").textContent = (t.brandName || "TravelKeeper") + " 分銷商中心";
        document.getElementById("sideBrand").textContent = t.brandName || "TravelKeeper";
        primaryColor = t.primaryColor || "#06c755";
        document.documentElement.style.setProperty("--primary", primaryColor);
        document.documentElement.style.setProperty("--primary-dark", primaryColor);
      }
    }

    function updateProfileUi() {
      document.getElementById("distName").textContent =
        currentProfile ? (currentProfile.displayName || "已登入") : (currentUid ? "已記錄登入者" : "尚未登入");

      document.getElementById("distUid").textContent =
        currentUid ? currentUid : "UID 未取得";

      if (currentProfile && currentProfile.pictureUrl) {
        document.getElementById("avatar").src = currentProfile.pictureUrl;
      }
    }

    async function initLiffOnly() {
      setStatus("初始化 LIFF 中...");
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        setStatus("尚未登入 LINE，請點擊登入按鈕。");
        return { loggedIn: false };
      }

      const profile = await liff.getProfile();
      currentProfile = profile;
      currentUid = profile.userId;
      localStorage.setItem("tk_distributor_uid", currentUid);

      updateProfileUi();

      setStatus(
        "LIFF 已登入\n" +
        "displayName：" + (profile.displayName || "") + "\n" +
        "uid：" + profile.userId
      );

      return { loggedIn: true, profile };
    }

    async function loginDistributor() {
      try {
        const result = await initLiffOnly();

        if (!result.loggedIn) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        const syncRes = await apiPost("/api/distributor/register", {
          tenantId: TENANT,
          uid: result.profile.userId,
          name: result.profile.displayName || "LINE分銷商",
          email: "",
          phone: "",
          status: "approved",
          roleLevel: "basic",
          commissionRate: 10,
          settingsJson: { from: "distributor_dashboard_lineoa_style" },
          notes: "由 Distributor Dashboard 正式版自動同步"
        });

        setStatus("分銷商同步完成：\n" + JSON.stringify(syncRes, null, 2), true);
        await refreshDashboard();
      } catch (err) {
        setStatus("分銷商登入失敗：\n" + (err.message || String(err)), true);
      }
    }

    async function updateOrder(orderId) {
      const status = document.getElementById("status_" + orderId).value;
      const paymentStatus = document.getElementById("payment_" + orderId).value;
      const commissionStatus = document.getElementById("commission_" + orderId).value;
      const payoutStatus = document.getElementById("payout_" + orderId).value;

      const res = await apiPost("/api/admin/update-order", {
        tenantId: TENANT,
        orderId: orderId,
        status: status,
        paymentStatus: paymentStatus,
        commissionStatus: commissionStatus,
        payoutStatus: payoutStatus,
        updatedBy: currentUid || "dashboard_admin"
      });

      setStatus("訂單更新結果：\n" + JSON.stringify(res, null, 2));
      await loadDashboard();
    }

    async function loadDashboard() {
      if (!currentUid) {
        document.getElementById("promoInfo").textContent = "尚未登入，暫無推廣資訊。";
        document.getElementById("kpiOrders").textContent = "0";
        document.getElementById("kpiRevenue").textContent = "0";
        document.getElementById("kpiCommission").textContent = "0";
        document.getElementById("kpiUsers").textContent = "0";
        document.getElementById("orderTable").innerHTML = "<tr><td colspan='10' class='empty'>尚未登入</td></tr>";
        return;
      }

      const res = await apiGet(`/api/distributor/dashboard?tenantId=${TENANT}&uid=${encodeURIComponent(currentUid)}`);
      const summary = res && res.data ? (res.data.summary || {}) : {};
      const orders = res && res.data ? (res.data.orders || []) : [];
      const users = res && res.data ? (res.data.users || []) : [];

      document.getElementById("kpiOrders").textContent = formatNumber(summary.orderCount || 0);
      document.getElementById("kpiRevenue").textContent = formatNumber(summary.totalRevenue || 0);
      document.getElementById("kpiCommission").textContent = formatNumber(summary.totalCommission || 0);
      document.getElementById("kpiUsers").textContent = formatNumber(summary.referredUsers || users.length || 0);

      document.getElementById("promoInfo").textContent =
        "分銷商 UID： " + currentUid + "\n" +
        "推廣方式： 複製下方各行程連結分享給客戶\n" +
        "訂單歸因： 客戶從你的連結進站並下單後，會回寫到你的 Dashboard";

      const orderHtml = orders.length
        ? orders.map(o => `
          <tr>
            <td>${escapeHtml(o.orderId)}</td>
            <td>${escapeHtml(o.customerName || "")}</td>
            <td>${formatNumber(o.totalAmount || 0)}</td>
            <td>${escapeHtml(o.commissionRate || 0)}%</td>
            <td>${formatNumber(o.commissionAmount || 0)}</td>
            <td>
              <div>${statusPill(o.status || "pending")}</div>
              <div style="margin-top:6px;">
                <select id="status_${escapeHtml(o.orderId)}" class="order-select">
                  <option value="pending" ${o.status === "pending" ? "selected" : ""}>pending</option>
                  <option value="confirmed" ${o.status === "confirmed" ? "selected" : ""}>confirmed</option>
                  <option value="cancelled" ${o.status === "cancelled" ? "selected" : ""}>cancelled</option>
                  <option value="completed" ${o.status === "completed" ? "selected" : ""}>completed</option>
                </select>
              </div>
            </td>
            <td>
              <div>${paymentPill(o.paymentStatus || "unpaid")}</div>
              <div style="margin-top:6px;">
                <select id="payment_${escapeHtml(o.orderId)}" class="order-select">
                  <option value="unpaid" ${o.paymentStatus === "unpaid" ? "selected" : ""}>unpaid</option>
                  <option value="paid" ${o.paymentStatus === "paid" ? "selected" : ""}>paid</option>
                  <option value="refunded" ${o.paymentStatus === "refunded" ? "selected" : ""}>refunded</option>
                </select>
              </div>
            </td>
            <td>
              <div>${statusPill(o.commissionStatus || "not_ready")}</div>
              <div style="margin-top:6px;">
                <select id="commission_${escapeHtml(o.orderId)}" class="order-select">
                  <option value="not_ready" ${o.commissionStatus === "not_ready" ? "selected" : ""}>not_ready</option>
                  <option value="pending" ${o.commissionStatus === "pending" ? "selected" : ""}>pending</option>
                  <option value="approved" ${o.commissionStatus === "approved" ? "selected" : ""}>approved</option>
                  <option value="paid" ${o.commissionStatus === "paid" ? "selected" : ""}>paid</option>
                </select>
              </div>
            </td>
            <td>
              <div>${payoutPill(o.payoutStatus || "unpaid")}</div>
              <div style="margin-top:6px;">
                <select id="payout_${escapeHtml(o.orderId)}" class="order-select">
                  <option value="unpaid" ${o.payoutStatus === "unpaid" ? "selected" : ""}>unpaid</option>
                  <option value="processing" ${o.payoutStatus === "processing" ? "selected" : ""}>processing</option>
                  <option value="paid" ${o.payoutStatus === "paid" ? "selected" : ""}>paid</option>
                </select>
              </div>
            </td>
            <td>
              <div class="small">${escapeHtml(o.attributionSource || "-")}</div>
              <div class="small">行程：${escapeHtml(o.itineraryId || "")}</div>
              <div class="small">${escapeHtml(o.createdAt || o.orderDate || "")}</div>
              <div class="order-actions">
                <button class="btn btn-primary btn-small" onclick="updateOrder('${escapeHtml(o.orderId)}')">更新</button>
              </div>
            </td>
          </tr>
        `).join("")
        : "<tr><td colspan='10' class='empty'>目前尚無訂單</td></tr>";

      document.getElementById("orderTable").innerHTML = orderHtml;
    }

    async function loadTrips() {
      const res = await apiGet(`/api/public/itineraries?tenantId=${TENANT}`);
      const list = res && res.data ? (res.data.items || []) : [];

      if (!list.length) {
        document.getElementById("tripTableBody").innerHTML =
          "<tr><td colspan='5' class='empty'>目前尚無可推廣行程</td></tr>";
        return;
      }

      const html = list.map(it => {
        const link = currentUid ? buildPromoLink(it.itineraryId) : "";
        return `
          <tr>
            <td>
              <img class="thumb" src="${it.coverImageUrl || "https://picsum.photos/300/200"}" alt="trip">
            </td>
            <td>
              <div><b>${escapeHtml(it.title || "未命名行程")}</b></div>
              <div class="small">${escapeHtml(it.country || "")} ${escapeHtml(it.city || "")}</div>
              <div class="small">ID：${escapeHtml(it.itineraryId || "")}</div>
            </td>
            <td>NT$ ${formatNumber(it.price || 0)}</td>
            <td>
              ${
                currentUid
                  ? `
                    <div class="actions">
                      <button class="mini-btn primary" onclick="copyText('${link.replace(/'/g, "\\'")}')">複製連結</button>
                      <button class="mini-btn" onclick="window.open('${link.replace(/'/g, "\\'")}', '_blank')">開啟頁面</button>
                    </div>
                  `
                  : `<span class="small">請先登入</span>`
              }
            </td>
            <td class="link-cell">
              ${
                currentUid
                  ? escapeHtml(link)
                  : "登入後才會顯示個人專屬推廣連結"
              }
            </td>
          </tr>
        `;
      }).join("");

      document.getElementById("tripTableBody").innerHTML = html;
    }

    async function refreshDashboard() {
      updateProfileUi();
      await loadDashboard();
      await loadTrips();
    }

    document.getElementById("btnLogin").addEventListener("click", loginDistributor);
    document.getElementById("btnRefresh").addEventListener("click", refreshDashboard);

    async function boot() {
      updateProfileUi();
      await loadTenant();

      try {
        await initLiffOnly();
      } catch (err) {
        setStatus("初始化 LIFF 狀態時略過：\n" + (err.message || String(err)), true);
      }

      await refreshDashboard();
    }

    boot();
  </script>
</body>
</html>
