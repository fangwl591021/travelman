<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行管家 - 行程轉換工具</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-[#f8fafc] min-h-screen font-sans p-6 text-slate-800">
  <div id="app" class="max-w-md mx-auto">
    <!-- 讀取畫面 -->
    <div v-if="loading" class="mt-20 text-center animate-pulse text-slate-400">
      正在連線雲端系統...
    </div>

    <!-- 主畫面 -->
    <div v-else class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 p-8">
      <div v-if="!modeUpload">
          <h1 class="text-3xl font-black text-[#174a5a] mb-6">專屬數位名片</h1>
          <div class="bg-slate-50 rounded-3xl p-6 mb-8 border border-slate-100">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-[#174a5a] rounded-2xl flex items-center justify-center text-white font-bold text-xl">{{ profile.displayName?.[0] }}</div>
              <div>
                <div class="font-bold text-slate-800">{{ profile.displayName }}</div>
                <div class="text-[10px] font-bold text-[#174a5a] tracking-widest uppercase mt-1">代碼：READY</div>
              </div>
            </div>
          </div>
          <button @click="share" class="w-full bg-[#174a5a] text-white py-4 rounded-2xl font-bold shadow-xl">選擇好友分享行程</button>
      </div>

      <!-- PDF 上傳專區 (由 ?mode=upload 觸發) -->
      <div v-else>
        <h1 class="text-2xl font-black text-[#174a5a] mb-2">自動生成行程網站</h1>
        <p class="text-slate-400 text-xs mb-8">請選擇行程 PDF 或 圖片，AI 將為您自動拆解內容並建立專屬網站。</p>
        
        <div v-if="!processing">
            <div @click="$refs.fileInput.click()" class="border-4 border-dashed border-slate-100 rounded-[2rem] p-10 text-center hover:bg-slate-50 transition-all cursor-pointer">
                <div class="text-4xl mb-4">📄</div>
                <div class="font-bold text-slate-400">點擊選擇檔案</div>
                <div class="text-[10px] text-slate-300 mt-2">支援 PDF, JPG, PNG (最大 5MB)</div>
                <input type="file" ref="fileInput" class="hidden" accept="application/pdf,image/*" @change="handleFile">
            </div>
            <div v-if="selectedFile" class="mt-6 p-4 bg-teal-50 rounded-2xl flex items-center justify-between border border-teal-100">
                <span class="text-xs font-bold text-teal-700 truncate mr-4">{{ selectedFile.name }}</span>
                <button @click="uploadFile" class="bg-teal-600 text-white px-4 py-2 rounded-xl text-xs font-bold">開始轉換</button>
            </div>
        </div>

        <div v-else class="text-center py-10">
            <div class="inline-block animate-spin w-8 h-8 border-4 border-teal-500 border-t-transparent rounded-full mb-4"></div>
            <div class="font-bold text-teal-600">AI 正在努力拆解中...</div>
            <p class="text-[10px] text-slate-400 mt-2">這可能需要 15-30 秒，請勿關閉視窗</p>
        </div>

        <!-- 成功結果 -->
        <div v-if="resultUrl" class="mt-10 p-6 bg-green-50 rounded-3xl border border-green-100 text-center">
            <div class="text-3xl mb-4">🎉</div>
            <div class="font-bold text-green-700 mb-4">網站生成成功！</div>
            <button @click="openSite" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-sm mb-3">立即預覽網站</button>
            <button @click="closeLiff" class="text-slate-400 text-xs">返回聊天室</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    const liffId = "2008729640-bptxTkoO"; // 您的 LIFF ID

    createApp({
      data() {
        return {
          loading: true,
          modeUpload: false,
          profile: {},
          selectedFile: null,
          processing: false,
          resultUrl: null,
          courseId: null
        }
      },
      async mounted() {
        try {
          await liff.init({ liffId });
          if (!liff.isLoggedIn()) { liff.login(); return; }
          this.profile = await liff.getProfile();
          
          // 檢查是否有上傳模式
          const params = new URLSearchParams(window.location.search);
          this.modeUpload = params.get('mode') === 'upload';
          
          this.loading = false;
        } catch (e) { alert("LIFF 初始化失敗"); }
      },
      methods: {
        handleFile(e) {
          const file = e.target.files[0];
          if (file && file.size > 5 * 1024 * 1024) {
            alert("檔案太大囉！請選擇 5MB 以下的檔案。");
            return;
          }
          this.selectedFile = file;
        },
        async uploadFile() {
          this.processing = true;
          const reader = new FileReader();
          reader.readAsDataURL(this.selectedFile);
          reader.onload = async () => {
            const base64Data = reader.result.split(',')[1];
            try {
              const res = await fetch('https://travelkeeper-saas-worker.fangwl591021.workers.dev/api/upload-pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  fileData: base64Data,
                  fileName: this.selectedFile.name,
                  mimeType: this.selectedFile.type
                })
              });
              const data = await res.json();
              if (data.success) {
                this.courseId = data.courseId;
                this.resultUrl = `https://fangwl591021.github.io/travelman/travel_website.html?id=${data.courseId}`;
              } else {
                alert("AI 轉換失敗：" + data.msg);
              }
            } catch (e) {
              alert("伺服器連線失敗");
            } finally {
              this.processing = false;
            }
          };
        },
        openSite() {
          liff.openWindow({ url: this.resultUrl, external: true });
        },
        closeLiff() { liff.closeWindow(); }
      }
    }).mount('#app');
  </script>
</body>
</html>
